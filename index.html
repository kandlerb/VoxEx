<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEx - System Check</title>
    <meta name="description" content="VoxEx - A fully-featured browser-based voxel exploration game engine">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            padding: 1rem;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(20, 20, 20, 0.9);
            border-radius: 12px;
            border: 1px solid #444;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 48px;
            text-align: center;
            margin-bottom: 0.25rem;
            color: #4caf50;
            text-shadow: 2px 2px 0 #000;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 1.5rem;
            font-size: 14px;
        }
        .status {
            text-align: center;
            font-size: 16px;
            margin-bottom: 1.5rem;
            min-height: 1.5em;
            color: #ccc;
        }
        .tests {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 1.5rem;
        }
        .test {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: #333;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
        }
        .test-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .test-icon.pending { background: #555; color: #888; }
        .test-icon.pass { background: #4caf50; color: #fff; }
        .test-icon.fail { background: #f44336; color: #fff; }
        .test-icon.warn { background: #ff9800; color: #fff; }
        .test-name { flex: 1; color: #ccc; }
        .test-detail {
            font-size: 12px;
            color: #666;
            max-width: 150px;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .benchmark {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .benchmark-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }
        .benchmark-result {
            font-size: 24px;
            font-weight: 600;
        }
        .benchmark-suggestion {
            font-size: 13px;
            color: #aaa;
            margin-top: 8px;
        }
        .error-box {
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid rgba(244, 67, 54, 0.4);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 1.5rem;
        }
        .error-box h3 {
            color: #f44336;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .error-box p {
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
            background: #333;
            border: 1px solid #555;
            border-radius: 6px;
        }
        .btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-primary {
            background: #4caf50;
            border-color: #4caf50;
        }
        .btn-primary:not(:disabled):hover {
            background: #45a049;
            transform: scale(1.02);
        }
        .btn-secondary {
            background: #333;
            border: 1px solid #555;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #444;
            border-color: #666;
        }
        .hidden { display: none !important; }
        .progress-bar {
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .progress-fill {
            height: 100%;
            background: #4caf50;
            transition: width 0.3s ease;
        }
        #benchmark-canvas {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 256px;
            height: 256px;
        }
        noscript .container {
            text-align: center;
        }
        noscript h2 {
            color: #f44336;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <noscript>
        <div class="container">
            <h1>VoxEx</h1>
            <div class="error-box">
                <h2>JavaScript Required</h2>
                <p>VoxEx is a browser-based 3D voxel game that requires JavaScript to run.
                   Please enable JavaScript in your browser settings and reload this page.</p>
                <p style="margin-top: 1rem; opacity: 0.7;">
                    <strong>Why?</strong> The entire game engine, including 3D rendering,
                    world generation, and physics, runs in JavaScript using WebGL.
                </p>
            </div>
        </div>
    </noscript>

    <div class="container" id="main-container">
        <h1>VoxEx</h1>
        <p class="subtitle">Single-File Voxel Explorer</p>

        <div class="progress-bar">
            <div class="progress-fill" id="progress" style="width: 0%"></div>
        </div>

        <p class="status" id="status">Checking system compatibility...</p>

        <div class="tests" id="tests"></div>

        <div class="benchmark hidden" id="benchmark">
            <div class="benchmark-title">Estimated Performance</div>
            <div class="benchmark-result" id="benchmark-result">--</div>
            <div class="benchmark-suggestion" id="benchmark-suggestion"></div>
        </div>

        <div id="error-container"></div>

        <button class="btn btn-primary" id="play-btn" disabled>Checking...</button>
        <button class="btn btn-secondary hidden" id="skip-btn">Continue Anyway</button>
    </div>

    <canvas id="benchmark-canvas"></canvas>

    <script>
        // ==== Test Configuration ====
        const TESTS = [
            { id: 'webgl', name: 'WebGL Graphics', critical: true },
            { id: 'webgl2', name: 'WebGL 2.0', critical: false },
            { id: 'canvas', name: 'Canvas API', critical: true },
            { id: 'modules', name: 'ES6 Modules', critical: true },
            { id: 'pointerlock', name: 'Pointer Lock', critical: true },
            { id: 'indexeddb', name: 'IndexedDB Storage', critical: false },
            { id: 'localstorage', name: 'Local Storage', critical: false },
            { id: 'audio', name: 'Web Audio', critical: false },
        ];

        const ERRORS = {
            webgl: {
                title: 'WebGL Not Supported',
                message: 'Your browser or device does not support WebGL, which is required for 3D graphics. Try updating your browser, enabling hardware acceleration in settings, or using a different device. Integrated graphics on older devices may not support WebGL.'
            },
            canvas: {
                title: 'Canvas API Not Available',
                message: 'Your browser does not support the HTML5 Canvas API, which is needed for texture generation. Please use a modern browser like Chrome, Firefox, Edge, or Safari.'
            },
            modules: {
                title: 'ES6 Modules Not Supported',
                message: 'Your browser does not support JavaScript ES6 modules. VoxEx requires a modern browser. Please update your browser to the latest version.'
            },
            pointerlock: {
                title: 'Pointer Lock Not Available',
                message: 'Your browser does not support Pointer Lock API, which is required for first-person camera controls. This is often disabled in embedded browsers or iframes. Try opening VoxEx directly in a new browser tab.'
            }
        };

        // ==== State ====
        let results = {};
        let gpuInfo = null;
        let benchmarkFPS = null;

        // ==== DOM Elements ====
        const testsContainer = document.getElementById('tests');
        const statusEl = document.getElementById('status');
        const progressEl = document.getElementById('progress');
        const playBtn = document.getElementById('play-btn');
        const skipBtn = document.getElementById('skip-btn');
        const benchmarkEl = document.getElementById('benchmark');
        const benchmarkResultEl = document.getElementById('benchmark-result');
        const benchmarkSuggestionEl = document.getElementById('benchmark-suggestion');
        const errorContainer = document.getElementById('error-container');

        // ==== Initialize Test UI ====
        TESTS.forEach(test => {
            const div = document.createElement('div');
            div.className = 'test';
            div.id = `test-${test.id}`;
            div.innerHTML = `
                <div class="test-icon pending" id="icon-${test.id}">?</div>
                <span class="test-name">${test.name}${test.critical ? '' : ' (optional)'}</span>
                <span class="test-detail" id="detail-${test.id}"></span>
            `;
            testsContainer.appendChild(div);
        });

        // ==== Test Functions ====
        function testWebGL() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return { pass: false };

                // Get GPU info
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) {
                    gpuInfo = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                }

                return { pass: true, detail: gpuInfo ? gpuInfo.substring(0, 30) : 'OK' };
            } catch (e) {
                return { pass: false };
            }
        }

        function testWebGL2() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl2');
                return { pass: !!gl, detail: gl ? 'Available' : 'Not available' };
            } catch (e) {
                return { pass: false, detail: 'Not available' };
            }
        }

        function testCanvas() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                if (!ctx) return { pass: false };
                // Test drawing capability
                ctx.fillRect(0, 0, 1, 1);
                return { pass: true, detail: 'OK' };
            } catch (e) {
                return { pass: false };
            }
        }

        function testModules() {
            try {
                // Check if dynamic import is available (indicates module support)
                const hasModules = 'noModule' in HTMLScriptElement.prototype;
                return { pass: hasModules, detail: hasModules ? 'OK' : 'Not supported' };
            } catch (e) {
                return { pass: false };
            }
        }

        function testPointerLock() {
            const hasPointerLock = 'pointerLockElement' in document ||
                                   'mozPointerLockElement' in document ||
                                   'webkitPointerLockElement' in document;
            return { pass: hasPointerLock, detail: hasPointerLock ? 'OK' : 'Not supported' };
        }

        function testIndexedDB() {
            try {
                const hasIDB = !!window.indexedDB;
                return { pass: hasIDB, detail: hasIDB ? 'OK' : 'Not available' };
            } catch (e) {
                return { pass: false, detail: 'Blocked' };
            }
        }

        function testLocalStorage() {
            try {
                localStorage.setItem('voxex_test', '1');
                localStorage.removeItem('voxex_test');
                return { pass: true, detail: 'OK' };
            } catch (e) {
                return { pass: false, detail: 'Blocked' };
            }
        }

        function testAudio() {
            try {
                const hasAudio = !!(window.AudioContext || window.webkitAudioContext);
                return { pass: hasAudio, detail: hasAudio ? 'OK' : 'Not available' };
            } catch (e) {
                return { pass: false, detail: 'Not available' };
            }
        }

        // ==== Benchmark ====
        async function runBenchmark() {
            return new Promise((resolve) => {
                const canvas = document.getElementById('benchmark-canvas');
                const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

                if (!gl) {
                    resolve(null);
                    return;
                }

                // Simple triangle benchmark
                const vertices = new Float32Array([
                    -1, -1, 0,  1, -1, 0,  0, 1, 0
                ]);

                const buffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

                const vsSource = `
                    attribute vec3 position;
                    void main() { gl_Position = vec4(position, 1.0); }
                `;
                const fsSource = `
                    precision mediump float;
                    void main() { gl_FragColor = vec4(0.5, 0.7, 1.0, 1.0); }
                `;

                function createShader(type, source) {
                    const shader = gl.createShader(type);
                    gl.shaderSource(shader, source);
                    gl.compileShader(shader);
                    return shader;
                }

                const program = gl.createProgram();
                gl.attachShader(program, createShader(gl.VERTEX_SHADER, vsSource));
                gl.attachShader(program, createShader(gl.FRAGMENT_SHADER, fsSource));
                gl.linkProgram(program);
                gl.useProgram(program);

                const posLoc = gl.getAttribLocation(program, 'position');
                gl.enableVertexAttribArray(posLoc);
                gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);

                // Warm up
                for (let i = 0; i < 10; i++) {
                    gl.clear(gl.COLOR_BUFFER_BIT);
                    for (let j = 0; j < 1000; j++) {
                        gl.drawArrays(gl.TRIANGLES, 0, 3);
                    }
                }
                gl.finish();

                // Benchmark
                const iterations = 50;
                const drawsPerIteration = 5000;
                const start = performance.now();

                for (let i = 0; i < iterations; i++) {
                    gl.clear(gl.COLOR_BUFFER_BIT);
                    for (let j = 0; j < drawsPerIteration; j++) {
                        gl.drawArrays(gl.TRIANGLES, 0, 3);
                    }
                }
                gl.finish();

                const elapsed = performance.now() - start;
                const fps = Math.round((iterations / elapsed) * 1000);

                // Cleanup
                gl.deleteBuffer(buffer);
                gl.deleteProgram(program);

                resolve(fps);
            });
        }

        // ==== Update UI ====
        function updateTest(id, pass, detail, isWarning = false) {
            const icon = document.getElementById(`icon-${id}`);
            const detailEl = document.getElementById(`detail-${id}`);

            icon.className = `test-icon ${pass ? 'pass' : (isWarning ? 'warn' : 'fail')}`;
            icon.textContent = pass ? '✓' : (isWarning ? '!' : '✗');
            if (detail) detailEl.textContent = detail;
        }

        function showError(testId) {
            const error = ERRORS[testId];
            if (!error) return;

            const div = document.createElement('div');
            div.className = 'error-box';
            div.innerHTML = `<h3>${error.title}</h3><p>${error.message}</p>`;
            errorContainer.appendChild(div);
        }

        function getPerformanceTier(fps) {
            if (fps >= 800) return { tier: 'High', color: '#10b981', suggestion: 'Max settings recommended: Render Distance 16+, Shadows On, All Effects' };
            if (fps >= 400) return { tier: 'Medium', color: '#f59e0b', suggestion: 'Balanced settings recommended: Render Distance 10-12, Shadows On, Volumetrics Off' };
            if (fps >= 150) return { tier: 'Low', color: '#f97316', suggestion: 'Performance settings recommended: Render Distance 6-8, Shadows Off, Minimal Effects' };
            return { tier: 'Very Low', color: '#ef4444', suggestion: 'Minimum settings recommended: Render Distance 4-6, All Effects Off. Expect reduced FPS.' };
        }

        // ==== Main Test Runner ====
        async function runTests() {
            const testFunctions = {
                webgl: testWebGL,
                webgl2: testWebGL2,
                canvas: testCanvas,
                modules: testModules,
                pointerlock: testPointerLock,
                indexeddb: testIndexedDB,
                localstorage: testLocalStorage,
                audio: testAudio,
            };

            let criticalFailed = [];
            let completed = 0;

            // Run tests sequentially with visual feedback
            for (const test of TESTS) {
                await new Promise(r => setTimeout(r, 80)); // Visual pacing

                const result = testFunctions[test.id]();
                results[test.id] = result;

                const isWarning = !result.pass && !test.critical;
                updateTest(test.id, result.pass, result.detail, isWarning);

                if (!result.pass && test.critical) {
                    criticalFailed.push(test.id);
                }

                completed++;
                progressEl.style.width = `${(completed / TESTS.length) * 80}%`;
            }

            // Run benchmark if WebGL available
            if (results.webgl?.pass) {
                statusEl.textContent = 'Running performance benchmark...';
                benchmarkFPS = await runBenchmark();
                progressEl.style.width = '100%';

                if (benchmarkFPS) {
                    const perf = getPerformanceTier(benchmarkFPS);
                    benchmarkResultEl.textContent = perf.tier;
                    benchmarkResultEl.style.color = perf.color;
                    benchmarkSuggestionEl.textContent = perf.suggestion;
                    benchmarkEl.classList.remove('hidden');
                }
            } else {
                progressEl.style.width = '100%';
            }

            // Show results
            if (criticalFailed.length > 0) {
                statusEl.textContent = 'System check failed';
                criticalFailed.forEach(showError);
                playBtn.textContent = 'Cannot Play';
                playBtn.disabled = true;

                // Show skip button only if it's just pointer lock (might work in some contexts)
                if (criticalFailed.length === 1 && criticalFailed[0] === 'pointerlock') {
                    skipBtn.classList.remove('hidden');
                }
            } else {
                statusEl.textContent = 'All checks passed!';
                playBtn.textContent = 'Play VoxEx';
                playBtn.disabled = false;
            }
        }

        // ==== Event Handlers ====
        playBtn.addEventListener('click', () => {
            window.location.href = 'voxEx.html';
        });

        skipBtn.addEventListener('click', () => {
            if (confirm('Some features may not work correctly. Continue anyway?')) {
                window.location.href = 'voxEx.html';
            }
        });

        // ==== Start ====
        runTests();
    </script>
</body>
</html>
