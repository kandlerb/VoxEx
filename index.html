<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEx - Voxel Explorer</title>
    <link rel="stylesheet" href="styles/main.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="game-container"></div>

    <!-- Blocker overlay for menus -->
    <div id="blocker">
        <div id="instructions">
            <h1>VoxEx</h1>
            <p>Click to play</p>
        </div>
    </div>

    <!-- HUD Elements -->
    <div id="crosshair"></div>
    <div id="debug-overlay"></div>
    <div id="perf-overlay"></div>
    <div id="hotbar"></div>
    <div id="block-name-display"></div>
    <div id="flight-indicator" style="display: none;">Flying</div>
    <div id="movement-indicators">
        <div id="sprint-indicator" style="display: none;">Sprint</div>
        <div id="crouch-indicator" style="display: none;">Crouch</div>
    </div>
    <div id="loading-spinner">
        <div class="spinner-icon"></div>
        <span class="spinner-text">Loading <span class="spinner-count">0</span> chunks</span>
    </div>
    <div id="toast-container"></div>

    <!-- Inventory Overlay -->
    <div id="inventory-overlay">
        <div id="inventory-container">
            <div id="inventory-title">Inventory</div>
            <div id="inventory-grid"></div>
            <div id="inventory-hotbar-label">Hotbar</div>
            <div id="inventory-hotbar"></div>
            <div id="inventory-hint">Drag blocks to hotbar • Press E to close</div>
        </div>
    </div>

    <!-- Seed Menu -->
    <div id="seed-menu" style="display: none;">
        <h1>World Seed</h1>
        <input type="text" id="seed-input" placeholder="Enter seed or leave blank">
        <button id="btn-random-seed">Random</button>
        <button id="btn-start-game">Play</button>
    </div>

    <!-- Settings Menu -->
    <div id="settings-menu" style="display: none;">
        <div class="settings-panel">
            <h1>Settings</h1>
            <div id="settings-profiles">
                <div id="settings-profiles-label">Profiles</div>
                <div class="profile-grid">
                    <button class="profile-btn" data-profile="performance">Performance</button>
                    <button class="profile-btn" data-profile="balanced">Balanced</button>
                    <button class="profile-btn" data-profile="quality">Quality</button>
                    <button class="profile-btn custom" data-profile="custom">Custom</button>
                </div>
            </div>
            <button class="menu-btn" id="btn-back-from-settings">Back</button>
        </div>
    </div>

    <!-- Main Pause Menu -->
    <div id="main-pause-menu" style="display: none;">
        <div id="pause-seed-display">
            <span class="seed-label">Seed:</span>
            <span class="seed-value">---</span>
            <span class="copy-hint">(click to copy)</span>
        </div>
        <button class="menu-btn" id="btn-resume">Resume</button>
        <button class="menu-btn" id="btn-settings-main">Settings</button>
        <button class="menu-btn" id="btn-quit">Quit to Menu</button>
    </div>

    <!-- Pose Debug Panel -->
    <div id="pose-debug-panel"></div>

    <!-- Create World Panel -->
    <div id="create-world-panel"></div>

    <!-- World Management Modal -->
    <div id="world-manage-modal"></div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
