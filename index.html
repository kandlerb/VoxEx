<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEx - Voxel Explorer</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
        }

        /* UI Layer */
        .ui-element {
            position: absolute;
            pointer-events: none;
            user-select: none;
        }

        .ui-interactive {
            pointer-events: auto;
        }

        /* Crosshair */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            pointer-events: none;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }

        .crosshair::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }

        .crosshair::after {
            height: 2px;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Hotbar */
        .hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }

        .hotbar-slot {
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.1s;
        }

        .hotbar-slot.selected {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
        }

        .hotbar-slot-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Debug Overlay */
        .debug-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-family: monospace;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 4px;
            pointer-events: none;
            display: none;
        }

        .debug-overlay.visible {
            display: block;
        }

        .debug-line {
            margin: 2px 0;
        }

        /* Status Indicators */
        .status-indicators {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .status-indicator {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }

        .status-indicator.visible {
            display: block;
        }

        .status-indicator.sprint { color: #4CAF50; }
        .status-indicator.crouch { color: #2196F3; }
        .status-indicator.flight { color: #9C27B0; }

        /* Menu Overlays */
        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .menu-overlay.hidden {
            display: none;
        }

        .menu-title {
            font-size: 48px;
            color: #ff6b35;
            margin-bottom: 32px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .menu-btn {
            background: rgba(255, 107, 53, 0.9);
            border: none;
            color: #fff;
            padding: 12px 32px;
            margin: 8px 0;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            min-width: 200px;
            transition: background 0.2s, transform 0.1s;
        }

        .menu-btn:hover {
            background: rgba(255, 140, 95, 0.9);
            transform: scale(1.02);
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        .menu-input {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 4px;
            font-size: 16px;
            min-width: 200px;
            text-align: center;
        }

        .menu-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .menu-input:focus {
            outline: none;
            border-color: #ff6b35;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .loading-title {
            font-size: 36px;
            color: #ff6b35;
            margin-bottom: 24px;
        }

        .loading-bar-container {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #ff9e35);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        /* Chunk Loading Indicator */
        .chunk-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #4CAF50;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            display: none;
        }

        .chunk-indicator.visible {
            display: block;
        }

        /* Inventory */
        .inventory-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 150;
        }

        .inventory-overlay.hidden {
            display: none;
        }

        .inventory-container {
            background: rgba(50, 50, 60, 0.95);
            padding: 24px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .inventory-title {
            color: #fff;
            font-size: 20px;
            margin-bottom: 16px;
            text-align: center;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(8, 48px);
            gap: 4px;
        }

        .inventory-slot {
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.1s;
        }

        .inventory-slot:hover {
            border-color: rgba(255, 255, 255, 0.6);
        }

        /* Settings */
        .settings-panel {
            background: rgba(50, 50, 60, 0.95);
            padding: 24px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 16px;
        }

        .settings-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .settings-slider {
            width: 100%;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="game-container"></div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
