<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEx - Voxel Explorer</title>
    <meta http-equiv="refresh" content="0; url=voxEx.html">
    <meta name="description" content="VoxEx - A fully-featured browser-based voxel exploration game engine in a single HTML file">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e8e8e8;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }
        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }
        a {
            display: inline-block;
            padding: 1rem 2rem;
            background: #4a9eff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(74, 158, 255, 0.4);
        }
    </style>
    <script>
        window.location.replace('voxEx.html');
    </script>
</head>
<body>
    <div class="container">
        <h1>VoxEx</h1>
        <p>Loading Voxel Explorer...</p>
        <a href="voxEx.html">Click here if not redirected</a>
    </div>
</body>
</html>
