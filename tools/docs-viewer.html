<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEx - Documentation</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Segoe UI', sans-serif;
            color: #ddd;
            padding: 2rem 1rem;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(20, 20, 20, 0.95);
            border-radius: 12px;
            border: 1px solid #444;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #333;
        }
        .back-btn {
            padding: 8px 14px;
            background: #333;
            border: 1px solid #555;
            border-radius: 6px;
            color: #ccc;
            text-decoration: none;
            font-size: 13px;
            transition: background 0.2s, border-color 0.2s;
        }
        .back-btn:hover {
            background: #444;
            border-color: #4caf50;
            color: #fff;
        }
        .doc-title {
            font-size: 14px;
            color: #888;
            flex: 1;
        }
        .doc-nav {
            display: flex;
            gap: 8px;
        }
        .doc-nav a {
            padding: 6px 10px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            color: #aaa;
            text-decoration: none;
            font-size: 12px;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .doc-nav a:hover, .doc-nav a.active {
            background: rgba(76, 175, 80, 0.15);
            border-color: #4caf50;
            color: #4caf50;
        }

        /* Markdown rendered content */
        .content h1 {
            font-size: 28px;
            color: #4caf50;
            margin: 24px 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .content h1:first-child { margin-top: 0; }
        .content h2 {
            font-size: 22px;
            color: #81c784;
            margin: 20px 0 10px 0;
        }
        .content h3 {
            font-size: 17px;
            color: #a5d6a7;
            margin: 16px 0 8px 0;
        }
        .content h4 {
            font-size: 15px;
            color: #c8e6c9;
            margin: 14px 0 6px 0;
        }
        .content p {
            margin: 8px 0;
            color: #ccc;
        }
        .content ul, .content ol {
            margin: 8px 0 8px 24px;
            color: #ccc;
        }
        .content li {
            margin: 4px 0;
        }
        .content code {
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #e0e0e0;
        }
        .content pre {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 6px;
            padding: 14px;
            overflow-x: auto;
            margin: 12px 0;
        }
        .content pre code {
            background: none;
            padding: 0;
            font-size: 12px;
            line-height: 1.5;
        }
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }
        .content th {
            background: #2a2a2a;
            padding: 8px 10px;
            text-align: left;
            border: 1px solid #3a3a3a;
            color: #aaa;
            font-weight: 600;
        }
        .content td {
            padding: 6px 10px;
            border: 1px solid #333;
            color: #ccc;
        }
        .content tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.02);
        }
        .content a {
            color: #4caf50;
            text-decoration: none;
        }
        .content a:hover {
            text-decoration: underline;
        }
        .content strong {
            color: #fff;
        }
        .content blockquote {
            border-left: 3px solid #4caf50;
            margin: 12px 0;
            padding: 8px 16px;
            background: rgba(76, 175, 80, 0.05);
            color: #aaa;
        }
        .content hr {
            border: none;
            border-top: 1px solid #333;
            margin: 20px 0;
        }

        .error {
            background: rgba(244, 67, 54, 0.12);
            border: 1px solid rgba(244, 67, 54, 0.35);
            border-radius: 6px;
            padding: 16px;
            color: #ef9a9a;
            text-align: center;
        }
        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <a href="../index.html" class="back-btn">Back</a>
            <span class="doc-title" id="doc-title">Loading...</span>
            <div class="doc-nav">
                <a href="?file=README.md" id="nav-readme">README</a>
                <a href="?file=futureFeatures.md" id="nav-roadmap">Roadmap</a>
            </div>
        </div>
        <div class="content" id="content">
            <div class="loading">Loading document...</div>
        </div>
    </div>

    <script>
        const DOCS = {
            'README.md': { title: 'README', path: '../README.md' },
            'futureFeatures.md': { title: 'Feature Roadmap', path: '../futureFeatures.md' }
        };

        /**
         * Parses a subset of markdown into HTML.
         * Handles headers, bold, italic, inline code, code blocks,
         * lists, tables, links, blockquotes, and horizontal rules.
         * @param {string} md - Raw markdown string.
         * @returns {string} Rendered HTML string.
         */
        function renderMarkdown(md) {
            const lines = md.split('\n');
            const html = [];
            let inCodeBlock = false;
            let codeBlockContent = [];
            let inTable = false;
            let tableRows = [];
            let inList = false;
            let listType = 'ul';
            let listItems = [];

            function flushList() {
                if (!inList) return;
                html.push(`<${listType}>${listItems.join('')}</${listType}>`);
                listItems = [];
                inList = false;
            }

            function flushTable() {
                if (!inTable) return;
                let tableHtml = '<table>';
                for (let i = 0; i < tableRows.length; i++) {
                    // Skip separator rows (|---|---|)
                    if (/^\|[\s\-:]+\|/.test(tableRows[i])) continue;
                    const cells = tableRows[i].split('|').filter((c, idx, arr) => idx > 0 && idx < arr.length - 1);
                    const tag = i === 0 ? 'th' : 'td';
                    tableHtml += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c.trim())}</${tag}>`).join('') + '</tr>';
                }
                tableHtml += '</table>';
                html.push(tableHtml);
                tableRows = [];
                inTable = false;
            }

            function escapeHtml(str) {
                return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            function inlineFormat(str) {
                // Inline code (must be first to prevent inner formatting)
                str = str.replace(/`([^`]+)`/g, '<code>$1</code>');
                // Bold
                str = str.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                // Italic
                str = str.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                // Links
                str = str.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
                return str;
            }

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                // Code blocks
                if (line.trim().startsWith('```')) {
                    if (inCodeBlock) {
                        html.push('<pre><code>' + escapeHtml(codeBlockContent.join('\n')) + '</code></pre>');
                        codeBlockContent = [];
                        inCodeBlock = false;
                    } else {
                        flushList();
                        flushTable();
                        inCodeBlock = true;
                    }
                    continue;
                }
                if (inCodeBlock) {
                    codeBlockContent.push(line);
                    continue;
                }

                // Table rows
                if (line.trim().startsWith('|')) {
                    flushList();
                    inTable = true;
                    tableRows.push(line.trim());
                    continue;
                } else if (inTable) {
                    flushTable();
                }

                // Blank line
                if (line.trim() === '') {
                    flushList();
                    continue;
                }

                // Horizontal rule
                if (/^---+$/.test(line.trim())) {
                    flushList();
                    html.push('<hr>');
                    continue;
                }

                // Headers
                const headerMatch = line.match(/^(#{1,4})\s+(.+)$/);
                if (headerMatch) {
                    flushList();
                    const level = headerMatch[1].length;
                    html.push(`<h${level}>${inlineFormat(headerMatch[2])}</h${level}>`);
                    continue;
                }

                // Blockquotes
                if (line.trim().startsWith('>')) {
                    flushList();
                    html.push(`<blockquote>${inlineFormat(line.trim().slice(1).trim())}</blockquote>`);
                    continue;
                }

                // Unordered list
                const ulMatch = line.match(/^(\s*)[-*]\s+(.+)$/);
                if (ulMatch) {
                    if (!inList || listType !== 'ul') {
                        flushList();
                        inList = true;
                        listType = 'ul';
                    }
                    listItems.push(`<li>${inlineFormat(ulMatch[2])}</li>`);
                    continue;
                }

                // Ordered list
                const olMatch = line.match(/^(\s*)\d+\.\s+(.+)$/);
                if (olMatch) {
                    if (!inList || listType !== 'ol') {
                        flushList();
                        inList = true;
                        listType = 'ol';
                    }
                    listItems.push(`<li>${inlineFormat(olMatch[2])}</li>`);
                    continue;
                }

                // Paragraph
                flushList();
                html.push(`<p>${inlineFormat(line)}</p>`);
            }

            // Flush remaining
            if (inCodeBlock) {
                html.push('<pre><code>' + escapeHtml(codeBlockContent.join('\n')) + '</code></pre>');
            }
            flushList();
            flushTable();

            return html.join('\n');
        }

        /**
         * Loads and renders a documentation file.
         * @param {string} fileName - The markdown file name to load.
         */
        async function loadDoc(fileName) {
            const contentEl = document.getElementById('content');
            const titleEl = document.getElementById('doc-title');

            const docInfo = DOCS[fileName];
            if (!docInfo) {
                contentEl.innerHTML = '<div class="error">Unknown document. Choose one from the navigation above.</div>';
                titleEl.textContent = 'Unknown';
                return;
            }

            // Highlight active nav
            document.getElementById('nav-readme').classList.toggle('active', fileName === 'README.md');
            document.getElementById('nav-roadmap').classList.toggle('active', fileName === 'futureFeatures.md');

            titleEl.textContent = docInfo.title;
            document.title = `VoxEx - ${docInfo.title}`;

            try {
                const response = await fetch(docInfo.path);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const md = await response.text();
                contentEl.innerHTML = renderMarkdown(md);
            } catch (err) {
                contentEl.innerHTML = `<div class="error">Failed to load ${fileName}: ${err.message}<br><br>If running from file://, try using a local HTTP server.</div>`;
            }
        }

        // Determine which file to show
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file') || 'README.md';
        loadDoc(file);
    </script>
</body>
</html>
