        // ========================================
        // INITIALIZATION
        // ========================================
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
            camera.position.set(2, 1.5, 2);
            
            // Renderer
            const container = document.getElementById('canvas-container');
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 0.9, 0);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.update();
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            scene.add(directionalLight);
            
            // Ground grid
            const gridHelper = new THREE.GridHelper(4, 20, 0x4ecca3, 0x333344);
            scene.add(gridHelper);
            
            // Axes helper
            const axesHelper = new THREE.AxesHelper(0.5);
            axesHelper.position.set(-1.5, 0, -1.5);
            scene.add(axesHelper);
            
            // Build player mesh
            buildPlayerMesh();
            
            // Initialize with one keyframe
            addKeyframe();
            
            // Handle resize
            window.addEventListener('resize', onResize);
            onResize();
            
            // Start animation loop
            animate();
        }
        
        function onResize() {
            const container = document.getElementById('canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            
            // Handle playback
            if (isPlaying && keyframes.length > 1) {
                const now = performance.now();
                const delta = (now - lastFrameTime) * playbackSpeed;
                lastFrameTime = now;
                
                playbackTime += delta * playbackDirection;
                
                const totalDuration = getTotalDuration();
                
                // Handle loop modes
                if (playbackTime >= totalDuration) {
                    if (loopMode === 'loop') {
                        playbackTime = 0;
                    } else if (loopMode === 'pingpong') {
                        playbackTime = totalDuration;
                        playbackDirection = -1;
                    } else {
                        playbackTime = totalDuration;
                        stopPlayback();
                    }
                } else if (playbackTime <= 0 && playbackDirection === -1) {
                    if (loopMode === 'pingpong') {
                        playbackTime = 0;
                        playbackDirection = 1;
                    }
                }
                
                // Interpolate pose
                const pose = interpolatePose(playbackTime);
                applyPoseToMesh(pose);
                updatePlayhead();
            }
            
            renderer.render(scene, camera);
        }
        
        // ========================================
        // PLAYER MESH BUILDING
        // ========================================
        function buildPlayerMesh() {
            const proportions = PLAYER_PROPORTIONS;
            const { head, body, leg, arm, hipY } = proportions;
            const segmentHeight = body.segmentHeight;
            
            const group = new THREE.Group();
            
            // Materials with distinct colors for each part
            const materials = {
                body: new THREE.MeshLambertMaterial({ color: 0x3498db }),      // Blue body
                head: new THREE.MeshLambertMaterial({ color: 0xf5cba7 }),      // Skin head
                upperArm: new THREE.MeshLambertMaterial({ color: 0x2ecc71 }), // Green upper arm
                forearm: new THREE.MeshLambertMaterial({ color: 0xf5cba7 }),  // Skin forearm
                leg: new THREE.MeshLambertMaterial({ color: 0x2c3e50 }),      // Dark blue legs
                eye: new THREE.MeshBasicMaterial({ color: 0x000000 }),        // Black eyes
                nose: new THREE.MeshLambertMaterial({ color: 0xd4a574 }),     // Darker skin for nose
            };
            
            // Lower spine pivot (pelvis) - at hip level, root of spine chain
            const lowerSpinePivot = new THREE.Group();
            lowerSpinePivot.position.set(0, hipY, 0);
            
            // Lower spine mesh (pelvis/lower back) - offset forward, back at pivot
            const lowerSpineGeo = new THREE.BoxGeometry(body.width, segmentHeight, body.depth);
            const lowerSpineMesh = new THREE.Mesh(lowerSpineGeo, materials.body);
            lowerSpineMesh.position.y = segmentHeight * 0.5;  // Center above pivot
            lowerSpineMesh.position.z = body.depth * 0.5;     // Back aligns with pivot
            lowerSpinePivot.add(lowerSpineMesh);
            
            // Mid spine pivot - at top of lower segment
            const midSpinePivot = new THREE.Group();
            midSpinePivot.position.y = segmentHeight;  // Local to lowerSpinePivot
            lowerSpinePivot.add(midSpinePivot);
            
            // Mid spine mesh (abdomen) - offset forward, back at pivot
            const midSpineGeo = new THREE.BoxGeometry(body.width, segmentHeight, body.depth);
            const midSpineMesh = new THREE.Mesh(midSpineGeo, materials.body);
            midSpineMesh.position.y = segmentHeight * 0.5;
            midSpineMesh.position.z = body.depth * 0.5;
            midSpinePivot.add(midSpineMesh);
            
            // Upper spine pivot - at top of mid segment
            const upperSpinePivot = new THREE.Group();
            upperSpinePivot.position.y = segmentHeight;  // Local to midSpinePivot
            midSpinePivot.add(upperSpinePivot);
            
            // Upper spine mesh (chest/shoulders) - offset forward, back at pivot
            const upperSpineGeo = new THREE.BoxGeometry(body.width, segmentHeight, body.depth);
            const upperSpineMesh = new THREE.Mesh(upperSpineGeo, materials.body);
            upperSpineMesh.position.y = segmentHeight * 0.5;
            upperSpineMesh.position.z = body.depth * 0.5;
            upperSpinePivot.add(upperSpineMesh);
            
            // Head - create a group to hold head mesh and face features
            const headGroup = new THREE.Group();
            
            // Head mesh
            const headGeo = new THREE.BoxGeometry(head.size, head.height, head.size);
            const headMesh = new THREE.Mesh(headGeo, materials.head);
            headGroup.add(headMesh);
            
            // Face features (positioned relative to head center)
            // Left eye
            const eyeGeo = new THREE.BoxGeometry(0.08, 0.08, 0.02);
            const leftEye = new THREE.Mesh(eyeGeo, materials.eye);
            leftEye.position.set(0.1, 0.05, head.size * 0.5 + 0.01);  // Front of head
            headGroup.add(leftEye);
            
            // Right eye
            const rightEye = new THREE.Mesh(eyeGeo, materials.eye);
            rightEye.position.set(-0.1, 0.05, head.size * 0.5 + 0.01);
            headGroup.add(rightEye);
            
            // Nose (small bump)
            const noseGeo = new THREE.BoxGeometry(0.06, 0.08, 0.04);
            const nose = new THREE.Mesh(noseGeo, materials.nose);
            nose.position.set(0, -0.02, head.size * 0.5 + 0.02);
            headGroup.add(nose);
            
            // Position the head group - starts at idle position (headY: 0.5, headZ: 0.1)
            headGroup.position.y = 0.5;  // This matches POSE_PRESETS.stand_idle.headY
            headGroup.position.z = 0.1;  // This matches POSE_PRESETS.stand_idle.headZ
            upperSpinePivot.add(headGroup);
            
            // Arms
            const armOffsetX = body.width * 0.5 + arm.thickness * 0.5;
            const shoulderLocalY = segmentHeight;  // Top of upper spine segment
            
            // Left arm pivot at shoulder - match torso Z offset
            const leftArmPivot = new THREE.Group();
            leftArmPivot.position.set(armOffsetX, shoulderLocalY, body.depth * 0.5);
            upperSpinePivot.add(leftArmPivot);
            
            // Left upper arm mesh
            const leftUpperArmGeo = new THREE.BoxGeometry(arm.thickness, arm.upperHeight, arm.thickness);
            const leftUpperArmMesh = new THREE.Mesh(leftUpperArmGeo, materials.upperArm);
            leftUpperArmMesh.position.y = -arm.upperHeight * 0.5;
            leftArmPivot.add(leftUpperArmMesh);
            
            // Left elbow pivot - at BACK of upper arm
            const leftElbowPivot = new THREE.Group();
            leftElbowPivot.position.y = -arm.upperHeight;
            leftElbowPivot.position.z = -arm.thickness * 0.5;  // At back
            leftArmPivot.add(leftElbowPivot);
            
            // Left forearm mesh - back at elbow pivot
            const leftForearmGeo = new THREE.BoxGeometry(arm.thickness * 0.9, arm.forearmHeight, arm.thickness * 0.9);
            const leftForearmMesh = new THREE.Mesh(leftForearmGeo, materials.forearm);
            leftForearmMesh.position.y = -arm.forearmHeight * 0.5;
            leftForearmMesh.position.z = arm.thickness * 0.5;  // Offset forward
            leftElbowPivot.add(leftForearmMesh);
            
            // Right arm (mirror of left) - match torso Z offset
            const rightArmPivot = new THREE.Group();
            rightArmPivot.position.set(-armOffsetX, shoulderLocalY, body.depth * 0.5);
            upperSpinePivot.add(rightArmPivot);
            
            const rightUpperArmGeo = new THREE.BoxGeometry(arm.thickness, arm.upperHeight, arm.thickness);
            const rightUpperArmMesh = new THREE.Mesh(rightUpperArmGeo, materials.upperArm);
            rightUpperArmMesh.position.y = -arm.upperHeight * 0.5;
            rightArmPivot.add(rightUpperArmMesh);
            
            // Right elbow pivot - at BACK of upper arm
            const rightElbowPivot = new THREE.Group();
            rightElbowPivot.position.y = -arm.upperHeight;
            rightElbowPivot.position.z = -arm.thickness * 0.5;  // At back
            rightArmPivot.add(rightElbowPivot);
            
            // Right forearm mesh - back at elbow pivot
            const rightForearmGeo = new THREE.BoxGeometry(arm.thickness * 0.9, arm.forearmHeight, arm.thickness * 0.9);
            const rightForearmMesh = new THREE.Mesh(rightForearmGeo, materials.forearm);
            rightForearmMesh.position.y = -arm.forearmHeight * 0.5;
            rightForearmMesh.position.z = arm.thickness * 0.5;  // Offset forward
            rightElbowPivot.add(rightForearmMesh);
            
            // Legs
            const legOffsetX = body.width * 0.5 - leg.thickness * 0.5;
            
            // Left leg pivot at hip - match torso Z offset
            const leftLegPivot = new THREE.Group();
            leftLegPivot.position.set(legOffsetX, 0, body.depth * 0.5);
            lowerSpinePivot.add(leftLegPivot);
            
            // Left thigh
            const leftThighGeo = new THREE.BoxGeometry(leg.thickness, leg.thighHeight, leg.thickness);
            const leftThighMesh = new THREE.Mesh(leftThighGeo, materials.leg);
            leftThighMesh.position.y = -leg.thighHeight * 0.5;
            leftLegPivot.add(leftThighMesh);
            
            // Left knee pivot - at FRONT of thigh
            const leftKneePivot = new THREE.Group();
            leftKneePivot.position.y = -leg.thighHeight;
            leftKneePivot.position.z = leg.thickness * 0.5;  // At front (kneecap)
            leftLegPivot.add(leftKneePivot);
            
            // Left shin - front at knee pivot
            const leftShinGeo = new THREE.BoxGeometry(leg.thickness * 0.9, leg.shinHeight, leg.thickness * 0.9);
            const leftShinMesh = new THREE.Mesh(leftShinGeo, materials.leg);
            leftShinMesh.position.y = -leg.shinHeight * 0.5;
            leftShinMesh.position.z = -leg.thickness * 0.5;  // Offset backward
            leftKneePivot.add(leftShinMesh);
            
            // Right leg (mirror) - match torso Z offset
            const rightLegPivot = new THREE.Group();
            rightLegPivot.position.set(-legOffsetX, 0, body.depth * 0.5);
            lowerSpinePivot.add(rightLegPivot);
            
            const rightThighGeo = new THREE.BoxGeometry(leg.thickness, leg.thighHeight, leg.thickness);
            const rightThighMesh = new THREE.Mesh(rightThighGeo, materials.leg);
            rightThighMesh.position.y = -leg.thighHeight * 0.5;
            rightLegPivot.add(rightThighMesh);
            
            // Right knee pivot - at FRONT of thigh
            const rightKneePivot = new THREE.Group();
            rightKneePivot.position.y = -leg.thighHeight;
            rightKneePivot.position.z = leg.thickness * 0.5;  // At front (kneecap)
            rightLegPivot.add(rightKneePivot);
            
            // Right shin - front at knee pivot
            const rightShinGeo = new THREE.BoxGeometry(leg.thickness * 0.9, leg.shinHeight, leg.thickness * 0.9);
            const rightShinMesh = new THREE.Mesh(rightShinGeo, materials.leg);
            rightShinMesh.position.y = -leg.shinHeight * 0.5;
            rightShinMesh.position.z = -leg.thickness * 0.5;  // Offset backward
            rightKneePivot.add(rightShinMesh);
            
            // Add spine chain to group
            group.add(lowerSpinePivot);
            
            // Store parts for animation (headGroup instead of headMesh for positioning)
            playerParts = {
                lowerSpine: lowerSpinePivot,
                midSpine: midSpinePivot,
                upperSpine: upperSpinePivot,
                head: headGroup,  // Use headGroup for position/rotation control
                leftArm: leftArmPivot,
                leftElbow: leftElbowPivot,
                rightArm: rightArmPivot,
                rightElbow: rightElbowPivot,
                leftLeg: leftLegPivot,
                leftKnee: leftKneePivot,
                rightLeg: rightLegPivot,
                rightKnee: rightKneePivot,
            };
            
            playerMesh = group;
            scene.add(playerMesh);
        }
        
        // ========================================
        // POSE APPLICATION
        // ========================================
        function applyPoseToMesh(pose, parts = playerParts) {
            if (!parts) return;
            
            // Body position
            if (pose.bodyY !== undefined) {
                parts.lowerSpine.position.y = pose.bodyY;
            }
            
            // Spine rotations
            if (pose.lowerSpineX !== undefined) parts.lowerSpine.rotation.x = pose.lowerSpineX;
            if (pose.lowerSpineZ !== undefined) parts.lowerSpine.rotation.z = pose.lowerSpineZ;
            if (pose.lowerSpineY !== undefined) parts.lowerSpine.rotation.y = pose.lowerSpineY;
            
            if (pose.midSpineX !== undefined) parts.midSpine.rotation.x = pose.midSpineX;
            if (pose.midSpineZ !== undefined) parts.midSpine.rotation.z = pose.midSpineZ;
            if (pose.midSpineY !== undefined) parts.midSpine.rotation.y = pose.midSpineY;
            
            if (pose.upperSpineX !== undefined) parts.upperSpine.rotation.x = pose.upperSpineX;
            if (pose.upperSpineZ !== undefined) parts.upperSpine.rotation.z = pose.upperSpineZ;
            if (pose.upperSpineY !== undefined) parts.upperSpine.rotation.y = pose.upperSpineY;
            
            // Head
            // Head position is absolute (headY=0.5 means position.y=0.5)
            if (pose.headY !== undefined) parts.head.position.y = pose.headY;
            if (pose.headZ !== undefined) parts.head.position.z = pose.headZ;
            if (pose.headX !== undefined) parts.head.rotation.x = pose.headX;
            
            // Arms - elbows are NEGATED for intuitive editing (positive = flexion)
            // VoxEx debug panel does the same: parts.leftElbow.rotation.x = -getRot('leftElbow')
            if (pose.leftArmX !== undefined) parts.leftArm.rotation.x = pose.leftArmX;
            if (pose.leftArmZ !== undefined) parts.leftArm.rotation.z = pose.leftArmZ;
            if (pose.leftArmY !== undefined) parts.leftArm.rotation.y = pose.leftArmY;
            if (pose.leftElbow !== undefined) parts.leftElbow.rotation.x = -pose.leftElbow;  // Negate for natural bend direction
            
            if (pose.rightArmX !== undefined) parts.rightArm.rotation.x = pose.rightArmX;
            if (pose.rightArmZ !== undefined) parts.rightArm.rotation.z = pose.rightArmZ;
            if (pose.rightArmY !== undefined) parts.rightArm.rotation.y = pose.rightArmY;
            if (pose.rightElbow !== undefined) parts.rightElbow.rotation.x = -pose.rightElbow;  // Negate for natural bend direction
            
            // Legs
            if (pose.leftLegX !== undefined) parts.leftLeg.rotation.x = pose.leftLegX;
            if (pose.leftLegZ !== undefined) parts.leftLeg.rotation.z = pose.leftLegZ;
            if (pose.leftKnee !== undefined) parts.leftKnee.rotation.x = pose.leftKnee;
            
            if (pose.rightLegX !== undefined) parts.rightLeg.rotation.x = pose.rightLegX;
            if (pose.rightLegZ !== undefined) parts.rightLeg.rotation.z = pose.rightLegZ;
            if (pose.rightKnee !== undefined) parts.rightKnee.rotation.x = pose.rightKnee;
        }
        
        function getCurrentPoseFromMesh() {
            if (!playerParts) return POSE_PRESETS.stand_idle;
            
            return {
                bodyY: playerParts.lowerSpine.position.y,
                lowerSpineX: playerParts.lowerSpine.rotation.x,
                lowerSpineZ: playerParts.lowerSpine.rotation.z,
                lowerSpineY: playerParts.lowerSpine.rotation.y,
                midSpineX: playerParts.midSpine.rotation.x,
                midSpineZ: playerParts.midSpine.rotation.z,
                midSpineY: playerParts.midSpine.rotation.y,
                upperSpineX: playerParts.upperSpine.rotation.x,
                upperSpineZ: playerParts.upperSpine.rotation.z,
                upperSpineY: playerParts.upperSpine.rotation.y,
                headY: playerParts.head.position.y,  // Direct value (matches applyPoseToMesh)
                headZ: playerParts.head.position.z,
                headX: playerParts.head.rotation.x,
                leftArmX: playerParts.leftArm.rotation.x,
                leftArmZ: playerParts.leftArm.rotation.z,
                leftArmY: playerParts.leftArm.rotation.y,
                leftElbow: -playerParts.leftElbow.rotation.x,  // Negate (we apply negated)
                rightArmX: playerParts.rightArm.rotation.x,
                rightArmZ: playerParts.rightArm.rotation.z,
                rightArmY: playerParts.rightArm.rotation.y,
                rightElbow: -playerParts.rightElbow.rotation.x,  // Negate (we apply negated)
                leftLegX: playerParts.leftLeg.rotation.x,
                leftLegZ: playerParts.leftLeg.rotation.z,
                leftKnee: playerParts.leftKnee.rotation.x,
                rightLegX: playerParts.rightLeg.rotation.x,
                rightLegZ: playerParts.rightLeg.rotation.z,
                rightKnee: playerParts.rightKnee.rotation.x,
            };
        }
        
        // ========================================
        // KEYFRAME MANAGEMENT
        // ========================================
        function addKeyframe() {
            const lastKeyframe = keyframes.length > 0 ? keyframes[keyframes.length - 1] : null;
            const defaultPose = lastKeyframe ? { ...lastKeyframe.pose } : { ...POSE_PRESETS.stand_idle };
            
            const newTime = lastKeyframe ? lastKeyframe.time + 500 : 0;
            const newName = `Frame ${keyframes.length + 1}`;
            
            keyframes.push({
                name: newName,
                time: newTime,
                pose: defaultPose,
                easing: 'easeInOutQuad'
            });
            
            selectedKeyframeIndex = keyframes.length - 1;
            renderTimeline();
            selectKeyframe(selectedKeyframeIndex);
            showToast(`Added ${newName}`);
        }
        
        function deleteKeyframe() {
            if (keyframes.length <= 1) {
                showToast('Cannot delete the only keyframe', 'error');
                return;
            }
            
            const name = keyframes[selectedKeyframeIndex].name;
            keyframes.splice(selectedKeyframeIndex, 1);
            
            if (selectedKeyframeIndex >= keyframes.length) {
                selectedKeyframeIndex = keyframes.length - 1;
            }
            
            renderTimeline();
            selectKeyframe(selectedKeyframeIndex);
            showToast(`Deleted ${name}`);
        }
        
        function duplicateKeyframe() {
            const source = keyframes[selectedKeyframeIndex];
            const newKeyframe = {
                name: `${source.name} (copy)`,
                time: source.time + 200,
                pose: { ...source.pose },
                easing: source.easing
            };
            
            keyframes.splice(selectedKeyframeIndex + 1, 0, newKeyframe);
            sortKeyframes();
            renderTimeline();
            selectKeyframe(selectedKeyframeIndex + 1);
            showToast('Duplicated keyframe');
        }
        
        function selectKeyframe(index) {
            if (index < 0 || index >= keyframes.length) return;
            
            selectedKeyframeIndex = index;
            const keyframe = keyframes[index];
            
            // Apply pose to mesh
            applyPoseToMesh(keyframe.pose);
            
            // Update UI controls
            updateUIFromPose(keyframe.pose);
            
            // Update keyframe properties panel
            document.getElementById('keyframe-name').value = keyframe.name;
            document.getElementById('keyframe-time').value = keyframe.time;
            document.getElementById('keyframe-easing').value = keyframe.easing;
            
            // Update timeline selection
            renderTimeline();
            
            // Update onion skin
            if (showOnionSkin) {
                updateOnionSkin();
            }
        }
        
        function sortKeyframes() {
            keyframes.sort((a, b) => a.time - b.time);
        }
        
        function getTotalDuration() {
            if (keyframes.length === 0) return 0;
            return keyframes[keyframes.length - 1].time;
        }
        
        // ========================================
        // INTERPOLATION
        // ========================================
        function interpolatePose(time) {
            if (keyframes.length === 0) return POSE_PRESETS.stand_idle;
            if (keyframes.length === 1) return keyframes[0].pose;
            
            // Find surrounding keyframes
            let prevIndex = 0;
            let nextIndex = keyframes.length - 1;
            
            for (let i = 0; i < keyframes.length; i++) {
                if (keyframes[i].time <= time) {
                    prevIndex = i;
                }
                if (keyframes[i].time >= time && nextIndex === keyframes.length - 1) {
                    nextIndex = i;
                    break;
                }
            }
            
            if (prevIndex === nextIndex) {
                return keyframes[prevIndex].pose;
            }
            
            const prevKF = keyframes[prevIndex];
            const nextKF = keyframes[nextIndex];
            
            // Calculate t value
            const duration = nextKF.time - prevKF.time;
            let t = duration > 0 ? (time - prevKF.time) / duration : 0;
            
            // Apply easing
            t = applyEasing(t, nextKF.easing);
            
            // Lerp all properties
            const result = {};
            for (const prop of JOINT_PROPERTIES) {
                const a = prevKF.pose[prop] ?? 0;
                const b = nextKF.pose[prop] ?? 0;
                result[prop] = a + (b - a) * t;
            }
            
            return result;
        }
        
        function applyEasing(t, easing) {
            const c1 = 1.70158;
            const c2 = c1 * 1.525;
            const c3 = c1 + 1;
            const c4 = (2 * Math.PI) / 3;
            const c5 = (2 * Math.PI) / 4.5;
            
            switch (easing) {
                // Quadratic
                case 'easeIn':
                case 'easeInQuad':
                    return t * t;
                case 'easeOut':
                case 'easeOutQuad':
                    return 1 - (1 - t) * (1 - t);
                case 'easeInOut':
                case 'easeInOutQuad':
                    return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                
                // Cubic
                case 'easeInCubic':
                    return t * t * t;
                case 'easeOutCubic':
                    return 1 - Math.pow(1 - t, 3);
                case 'easeInOutCubic':
                    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                
                // Sine
                case 'easeInSine':
                    return 1 - Math.cos((t * Math.PI) / 2);
                case 'easeOutSine':
                    return Math.sin((t * Math.PI) / 2);
                case 'easeInOutSine':
                    return -(Math.cos(Math.PI * t) - 1) / 2;
                
                // Exponential
                case 'easeInExpo':
                    return t === 0 ? 0 : Math.pow(2, 10 * t - 10);
                case 'easeOutExpo':
                    return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
                case 'easeInOutExpo':
                    return t === 0 ? 0 : t === 1 ? 1 : t < 0.5 
                        ? Math.pow(2, 20 * t - 10) / 2 
                        : (2 - Math.pow(2, -20 * t + 10)) / 2;
                
                // Back (overshoot)
                case 'easeInBack':
                    return c3 * t * t * t - c1 * t * t;
                case 'easeOutBack':
                    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
                case 'easeInOutBack':
                    return t < 0.5
                        ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
                        : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
                
                // Elastic
                case 'spring':
                case 'easeOutElastic':
                    return t === 0 ? 0 : t === 1 ? 1 
                        : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
                case 'easeInOutElastic':
                    return t === 0 ? 0 : t === 1 ? 1 : t < 0.5
                        ? -(Math.pow(2, 20 * t - 10) * Math.sin((20 * t - 11.125) * c5)) / 2
                        : (Math.pow(2, -20 * t + 10) * Math.sin((20 * t - 11.125) * c5)) / 2 + 1;
                
                // Bounce
                case 'easeOutBounce':
                    return easeOutBounce(t);
                case 'easeInOutBounce':
                    return t < 0.5
                        ? (1 - easeOutBounce(1 - 2 * t)) / 2
                        : (1 + easeOutBounce(2 * t - 1)) / 2;
                
                default:
                    return t; // linear
            }
        }
        
        function easeOutBounce(t) {
            const n1 = 7.5625;
            const d1 = 2.75;
            
            if (t < 1 / d1) {
                return n1 * t * t;
            } else if (t < 2 / d1) {
                return n1 * (t -= 1.5 / d1) * t + 0.75;
            } else if (t < 2.5 / d1) {
                return n1 * (t -= 2.25 / d1) * t + 0.9375;
            } else {
                return n1 * (t -= 2.625 / d1) * t + 0.984375;
            }
        }
        
        // ========================================
        // UI UPDATES
        // ========================================
        function updateUIFromPose(pose) {
            for (const prop of JOINT_PROPERTIES) {
                const value = pose[prop] ?? 0;
                const slider = document.getElementById(prop);
                const numInput = document.getElementById(`${prop}-num`);
                
                if (slider) slider.value = value;
                if (numInput) numInput.value = parseFloat(value.toFixed(4));
            }
        }
        
        function updateJoint(jointName, value) {
            const numValue = parseFloat(value);
            
            // Update the slider and number input
            const slider = document.getElementById(jointName);
            const numInput = document.getElementById(`${jointName}-num`);
            
            if (slider) slider.value = numValue;
            if (numInput) numInput.value = parseFloat(numValue.toFixed(4));
            
            // Update current keyframe
            if (keyframes[selectedKeyframeIndex]) {
                keyframes[selectedKeyframeIndex].pose[jointName] = numValue;
            }
            
            // Apply to mesh
            const pose = {};
            pose[jointName] = numValue;
            applyPoseToMesh(pose);
        }
        
        function updateKeyframeName(name) {
            if (keyframes[selectedKeyframeIndex]) {
                keyframes[selectedKeyframeIndex].name = name;
                renderTimeline();
            }
        }
        
        function updateKeyframeTime(time) {
            if (keyframes[selectedKeyframeIndex]) {
                keyframes[selectedKeyframeIndex].time = parseInt(time);
                sortKeyframes();
                renderTimeline();
            }
        }
        
        function updateKeyframeEasing(easing) {
            if (keyframes[selectedKeyframeIndex]) {
                keyframes[selectedKeyframeIndex].easing = easing;
            }
        }
        
        // ========================================
        // TIMELINE RENDERING
        // ========================================
        function renderTimeline() {
            const container = document.getElementById('timeline-keyframes');
            const ruler = document.getElementById('timeline-ruler');
            
            const totalDuration = Math.max(getTotalDuration(), 1000);
            
            // Render ruler marks
            ruler.innerHTML = '';
            const markInterval = totalDuration <= 2000 ? 200 : totalDuration <= 5000 ? 500 : 1000;
            for (let t = 0; t <= totalDuration; t += markInterval) {
                const percent = (t / totalDuration) * 100;
                const mark = document.createElement('div');
                mark.className = 'timeline-ruler-mark';
                mark.style.left = `${percent}%`;
                mark.textContent = `${t}ms`;
                ruler.appendChild(mark);
            }
            
            // Render keyframes
            container.innerHTML = '';
            keyframes.forEach((kf, index) => {
                const percent = (kf.time / totalDuration) * 100;
                
                const marker = document.createElement('div');
                marker.className = 'keyframe-marker' + (index === selectedKeyframeIndex ? ' selected' : '');
                marker.style.left = `${percent}%`;
                marker.title = `${kf.name} (${kf.time}ms) - Drag to move`;
                marker.dataset.index = index;
                
                // Mousedown to potentially start drag
                marker.onmousedown = (e) => {
                    e.preventDefault();
                    prepareKeyframeDrag(index, e.clientX);
                };
                
                container.appendChild(marker);
                
                const label = document.createElement('div');
                label.className = 'keyframe-label';
                label.style.left = `${percent}%`;
                label.textContent = kf.name;
                container.appendChild(label);
            });
        }
        
        function prepareKeyframeDrag(index, clientX) {
            // Select the keyframe immediately
            selectKeyframe(index);
            
            // Store drag start info
            dragKeyframeIndex = index;
            dragStartX = clientX;
            dragStartTime = keyframes[index].time;
            isDraggingKeyframe = false;  // Not actually dragging yet
            
            // Add global listeners
            document.addEventListener('mousemove', onKeyframeDragStart);
            document.addEventListener('mouseup', onKeyframeMouseUp);
            document.addEventListener('mouseleave', onKeyframeMouseLeave);
        }
        
        function onKeyframeDragStart(e) {
            // Only start drag if mouse moved more than 5 pixels
            const distance = Math.abs(e.clientX - dragStartX);
            if (distance > 5 && !isDraggingKeyframe) {
                isDraggingKeyframe = true;
                const markers = document.querySelectorAll('.keyframe-marker');
                if (markers[dragKeyframeIndex]) {
                    markers[dragKeyframeIndex].classList.add('dragging');
                }
            }
            
            if (isDraggingKeyframe) {
                onKeyframeDrag(e);
            }
        }
        
        function onKeyframeDrag(e) {
            if (!isDraggingKeyframe || dragKeyframeIndex < 0) return;
            
            const track = document.getElementById('timeline-track');
            const rect = track.getBoundingClientRect();
            const totalDuration = Math.max(getTotalDuration(), 1000);
            
            // Calculate new time based on mouse position
            const relativeX = e.clientX - rect.left;
            const percent = Math.max(0, Math.min(1, relativeX / rect.width));
            let newTime = Math.round(percent * totalDuration);
            
            // Snap to 10ms increments for precision
            newTime = Math.round(newTime / 10) * 10;
            newTime = Math.max(0, newTime);
            
            // Update keyframe time
            keyframes[dragKeyframeIndex].time = newTime;
            
            // Update the marker position visually without full re-render
            const markers = document.querySelectorAll('.keyframe-marker');
            const labels = document.querySelectorAll('.keyframe-label');
            const newPercent = (newTime / totalDuration) * 100;
            
            if (markers[dragKeyframeIndex]) {
                markers[dragKeyframeIndex].style.left = `${newPercent}%`;
                markers[dragKeyframeIndex].title = `${keyframes[dragKeyframeIndex].name} (${newTime}ms) - Drag to move`;
            }
            if (labels[dragKeyframeIndex]) {
                labels[dragKeyframeIndex].style.left = `${newPercent}%`;
            }
            
            // Update the time input if this is the selected keyframe
            if (dragKeyframeIndex === selectedKeyframeIndex) {
                document.getElementById('keyframe-time').value = newTime;
            }
        }
        
        function onKeyframeMouseLeave(e) {
            // End drag when mouse leaves the document/window
            if (isDraggingKeyframe) {
                finalizeDrag();
            } else {
                cleanupDragListeners();
            }
        }
        
        function onKeyframeMouseUp(e) {
            if (isDraggingKeyframe) {
                finalizeDrag();
            } else {
                cleanupDragListeners();
            }
        }
        
        function finalizeDrag() {
            // Remove dragging class
            const markers = document.querySelectorAll('.keyframe-marker');
            markers.forEach(m => m.classList.remove('dragging'));
            
            // Sort keyframes by time
            const draggedKeyframeName = keyframes[dragKeyframeIndex].name;
            sortKeyframes();
            
            // Find the new index of the dragged keyframe
            const newIndex = keyframes.findIndex(kf => kf.name === draggedKeyframeName);
            if (newIndex >= 0) {
                selectedKeyframeIndex = newIndex;
            }
            
            // Full re-render to update positions and labels
            renderTimeline();
            showToast('Keyframe moved');
            
            cleanupDragListeners();
        }
        
        function cleanupDragListeners() {
            isDraggingKeyframe = false;
            dragKeyframeIndex = -1;
            document.removeEventListener('mousemove', onKeyframeDragStart);
            document.removeEventListener('mouseup', onKeyframeMouseUp);
            document.removeEventListener('mouseleave', onKeyframeMouseLeave);
        }
        
        function updatePlayhead() {
            const totalDuration = Math.max(getTotalDuration(), 1);
            const percent = (playbackTime / totalDuration) * 100;
            document.getElementById('timeline-playhead').style.left = `${percent}%`;
        }
        
        // ========================================
        // PLAYBACK CONTROLS
        // ========================================
        function togglePlay() {
            if (isPlaying) {
                stopPlayback();
            } else {
                startPlayback();
            }
        }
        
        function startPlayback() {
            if (keyframes.length < 2) {
                showToast('Need at least 2 keyframes to play');
                return;
            }
            
            isPlaying = true;
            lastFrameTime = performance.now();
            playbackDirection = 1;
            document.getElementById('btn-play').textContent = '⏸';
            document.getElementById('btn-play').classList.add('active');
        }
        
        function stopPlayback() {
            isPlaying = false;
            document.getElementById('btn-play').textContent = '▶';
            document.getElementById('btn-play').classList.remove('active');
        }
        
        function goToStart() {
            playbackTime = 0;
            updatePlayhead();
            if (!isPlaying && keyframes.length > 0) {
                const pose = interpolatePose(0);
                applyPoseToMesh(pose);
            }
        }
        
        function goToEnd() {
            playbackTime = getTotalDuration();
            updatePlayhead();
            if (!isPlaying && keyframes.length > 0) {
                const pose = interpolatePose(playbackTime);
                applyPoseToMesh(pose);
            }
        }
        
        function prevFrame() {
            if (selectedKeyframeIndex > 0) {
                selectKeyframe(selectedKeyframeIndex - 1);
                playbackTime = keyframes[selectedKeyframeIndex].time;
                updatePlayhead();
            }
        }
        
        function nextFrame() {
            if (selectedKeyframeIndex < keyframes.length - 1) {
                selectKeyframe(selectedKeyframeIndex + 1);
                playbackTime = keyframes[selectedKeyframeIndex].time;
                updatePlayhead();
            }
        }
        
        function setPlaybackSpeed(speed) {
            playbackSpeed = parseFloat(speed);
        }
        
        // ========================================
        // QUICK ACTIONS
        // ========================================
        function resetPose() {
            const pose = { ...POSE_PRESETS.stand_idle };
            applyPoseToMesh(pose);
            updateUIFromPose(pose);
            
            if (keyframes[selectedKeyframeIndex]) {
                keyframes[selectedKeyframeIndex].pose = pose;
            }
            
            showToast('Reset to T-Pose');
        }
        
        function mirrorPose() {
            if (!keyframes[selectedKeyframeIndex]) return;
            
            const pose = keyframes[selectedKeyframeIndex].pose;
            
            // Swap left/right values
            const swaps = [
                ['leftArmX', 'rightArmX'],
                ['leftArmZ', 'rightArmZ'],
                ['leftArmY', 'rightArmY'],
                ['leftElbow', 'rightElbow'],
                ['leftLegX', 'rightLegX'],
                ['leftLegZ', 'rightLegZ'],
                ['leftKnee', 'rightKnee'],
            ];
            
            for (const [left, right] of swaps) {
                const temp = pose[left];
                pose[left] = pose[right];
                pose[right] = temp;
            }
            
            // Negate Z rotations (side-to-side lean) for proper mirroring
            pose.leftArmZ = -pose.leftArmZ;
            pose.rightArmZ = -pose.rightArmZ;
            pose.leftLegZ = -pose.leftLegZ;
            pose.rightLegZ = -pose.rightLegZ;
            pose.lowerSpineZ = -pose.lowerSpineZ;
            pose.midSpineZ = -pose.midSpineZ;
            pose.upperSpineZ = -pose.upperSpineZ;
            
            // Negate Y rotations (twist) for proper mirroring
            pose.leftArmY = -pose.leftArmY;
            pose.rightArmY = -pose.rightArmY;
            pose.lowerSpineY = -pose.lowerSpineY;
            pose.midSpineY = -pose.midSpineY;
            pose.upperSpineY = -pose.upperSpineY;
            
            applyPoseToMesh(pose);
            updateUIFromPose(pose);
            showToast('Mirrored pose');
        }
        
        function applyPreset() {
            const presetName = document.getElementById('preset-select').value;
            if (!presetName || !POSE_PRESETS[presetName]) return;
            
            const pose = { ...POSE_PRESETS[presetName] };
            applyPoseToMesh(pose);
            updateUIFromPose(pose);
            
            if (keyframes[selectedKeyframeIndex]) {
                keyframes[selectedKeyframeIndex].pose = pose;
            }
            
            showToast(`Applied ${presetName}`);
            document.getElementById('preset-select').value = '';
        }
        
        // ========================================
        // CAMERA CONTROLS
        // ========================================
        function setCamera(view) {
            // Remove active class from all buttons
            document.querySelectorAll('.viewport-controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`view-${view}`).classList.add('active');
            
            const target = new THREE.Vector3(0, 0.9, 0);
            controls.target.copy(target);
            
            switch (view) {
                case 'front':
                    camera.position.set(0, 1, 3);
                    break;
                case 'side':
                    camera.position.set(3, 1, 0);
                    break;
                case 'back':
                    camera.position.set(0, 1, -3);
                    break;
                case 'top':
                    camera.position.set(0, 3, 0.01);
                    break;
                case 'free':
                    camera.position.set(2, 1.5, 2);
                    break;
            }
            
            controls.update();
        }
        
        // ========================================
        // ONION SKIN
        // ========================================
        function toggleOnionSkin(enabled) {
            showOnionSkin = enabled;
            
            // Clear existing onion skin meshes
            for (const mesh of onionSkinMeshes) {
                scene.remove(mesh);
            }
            onionSkinMeshes = [];
            
            if (enabled) {
                updateOnionSkin();
            }
        }
        
        function updateOnionSkin() {
            // Clear existing
            for (const mesh of onionSkinMeshes) {
                scene.remove(mesh);
            }
            onionSkinMeshes = [];
            
            if (!showOnionSkin) return;
            
            // Create ghost meshes for previous and next keyframes
            const prevIndex = selectedKeyframeIndex - 1;
            const nextIndex = selectedKeyframeIndex + 1;
            
            if (prevIndex >= 0) {
                const ghostMesh = createGhostMesh(keyframes[prevIndex].pose, 0x4ecca3, 0.2);
                onionSkinMeshes.push(ghostMesh);
                scene.add(ghostMesh);
            }
            
            if (nextIndex < keyframes.length) {
                const ghostMesh = createGhostMesh(keyframes[nextIndex].pose, 0xe94560, 0.2);
                onionSkinMeshes.push(ghostMesh);
                scene.add(ghostMesh);
            }
        }
        
        function createGhostMesh(pose, color, opacity) {
            // Create a simplified wireframe representation
            const group = new THREE.Group();
            const material = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: opacity,
                wireframe: true
            });
            
            // Clone the player mesh structure with the ghost material
            // For simplicity, create basic shapes at key positions
            const proportions = PLAYER_PROPORTIONS;
            const { head, body, leg, arm, hipY } = proportions;
            const segmentHeight = body.segmentHeight;
            
            // Body (simplified - just main body box)
            const bodyGeo = new THREE.BoxGeometry(body.width, body.height, body.depth);
            const bodyMesh = new THREE.Mesh(bodyGeo, material);
            bodyMesh.position.y = (pose.bodyY || hipY) + body.height / 2;
            bodyMesh.position.z = body.depth / 2;
            group.add(bodyMesh);
            
            // Head
            const headGeo = new THREE.BoxGeometry(head.size, head.height, head.size);
            const headMesh = new THREE.Mesh(headGeo, material);
            headMesh.position.y = (pose.bodyY || hipY) + body.height + head.height / 2;
            headMesh.position.z = (pose.headZ || 0.1);
            headMesh.rotation.x = pose.headX || 0;
            group.add(headMesh);
            
            return group;
        }
        
        // ========================================
        // IMPORT / EXPORT
        // ========================================
        function showExportModal() {
            // Convert poses to VoxEx keyframe format
            // Note: Elbow values are negated because our editor uses UI-friendly convention
            // (positive = flexion) but VoxEx keyframes use raw mesh rotation (negative = flexion)
            const exportData = {
                name: 'Custom Animation',
                totalDuration: getTotalDuration(),
                keyframes: keyframes.map(kf => {
                    const exportPose = { ...kf.pose };
                    // Negate elbows for VoxEx keyframe compatibility
                    if (exportPose.leftElbow !== undefined) exportPose.leftElbow = -exportPose.leftElbow;
                    if (exportPose.rightElbow !== undefined) exportPose.rightElbow = -exportPose.rightElbow;
                    return {
                        time: kf.time,
                        pose: exportPose,
                        easing: kf.easing
                    };
                })
            };
            
            document.getElementById('export-output').value = JSON.stringify(exportData, null, 2);
            document.getElementById('export-modal').classList.add('visible');
        }
        
        function showImportModal() {
            document.getElementById('import-input').value = '';
            document.getElementById('import-modal').classList.add('visible');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('visible');
        }
        
        function copyExport() {
            const textarea = document.getElementById('export-output');
            textarea.select();
            document.execCommand('copy');
            showToast('Copied to clipboard!');
        }
        
        function downloadExport() {
            const data = document.getElementById('export-output').value;
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'voxex-animation.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Downloaded!');
        }
        
        function doImport() {
            try {
                const input = document.getElementById('import-input').value;
                const data = JSON.parse(input);
                
                if (data.keyframes && Array.isArray(data.keyframes)) {
                    // Convert from VoxEx keyframe format to editor format
                    // Negate elbow values (VoxEx uses raw mesh rotation, we use UI-friendly convention)
                    keyframes = data.keyframes.map((kf, i) => {
                        const importPose = { ...kf.pose };
                        // Negate elbows for editor display
                        if (importPose.leftElbow !== undefined) importPose.leftElbow = -importPose.leftElbow;
                        if (importPose.rightElbow !== undefined) importPose.rightElbow = -importPose.rightElbow;
                        return {
                            name: kf.name || `Frame ${i + 1}`,
                            time: kf.time,
                            pose: importPose,
                            easing: kf.easing || 'linear'
                        };
                    });
                    
                    sortKeyframes();
                    selectedKeyframeIndex = 0;
                    renderTimeline();
                    selectKeyframe(0);
                    closeModal('import-modal');
                    showToast('Animation imported!');
                } else {
                    throw new Error('Invalid format');
                }
            } catch (e) {
                showToast('Invalid JSON format', 'error');
            }
        }
        
        // ========================================
        // UI HELPERS
        // ========================================
        function toggleSection(header) {
            header.classList.toggle('collapsed');
            const content = header.nextElementSibling;
            content.classList.toggle('collapsed');
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'error' ? '#e94560' : '#4ecca3';
            toast.classList.add('visible');
            
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 2000);
        }
        
        // ========================================
        // EVENT LISTENERS
        // ========================================
        document.querySelectorAll('input[name="loop"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                loopMode = e.target.value;
            });
        });
        
        // Expose functions to window for onclick handlers
        window.toggleSection = toggleSection;
        window.updateJoint = updateJoint;
        window.setCamera = setCamera;
        window.togglePlay = togglePlay;
        window.goToStart = goToStart;
        window.goToEnd = goToEnd;
        window.prevFrame = prevFrame;
        window.nextFrame = nextFrame;
        window.setPlaybackSpeed = setPlaybackSpeed;
        window.addKeyframe = addKeyframe;
        window.deleteKeyframe = deleteKeyframe;
        window.duplicateKeyframe = duplicateKeyframe;
        window.updateKeyframeName = updateKeyframeName;
        window.updateKeyframeTime = updateKeyframeTime;
        window.updateKeyframeEasing = updateKeyframeEasing;
        window.resetPose = resetPose;
        window.mirrorPose = mirrorPose;
        window.applyPreset = applyPreset;
        window.toggleOnionSkin = toggleOnionSkin;
        window.showExportModal = showExportModal;
        window.showImportModal = showImportModal;
        window.closeModal = closeModal;
        window.copyExport = copyExport;
        window.downloadExport = downloadExport;
        window.doImport = doImport;
        window.loadPreset = () => showToast('Use Quick Actions panel to load presets');
        
        // Initialize
        init();
    </script>
</body>
