<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEx Terrain Parameter Editor</title>
    <style>
        /* ============================================
           CSS RESET & VARIABLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Colors matching voxEx.html UI */
            --bg-primary: #1a1a1a;
            --bg-secondary: #141414;
            --bg-tertiary: #222;
            --bg-input: #222;
            --border-color: #444;
            --border-hover: #666;
            --accent: #4caf50;
            --accent-hover: #5cbf60;
            --accent-dark: #388e3c;
            --danger: #f44;
            --danger-hover: #f55;
            --warning: #ff0;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --text-muted: #666;
            --text-value: #ff0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* ============================================
           MAIN LAYOUT
           ============================================ */
        .app-container {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 1.4rem;
            color: var(--accent);
            text-shadow: 1px 1px 0 #000;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        /* Main Content - Three Columns */
        .main-content {
            display: grid;
            grid-template-columns: 320px 1fr 280px;
            overflow: hidden;
        }

        /* ============================================
           BUTTON STYLES (matching voxEx.html)
           ============================================ */
        button {
            padding: 8px 16px;
            border: 1px solid var(--border-hover);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.15s;
            background: #333;
            color: var(--text-primary);
        }

        button:hover {
            background: #444;
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-secondary {
            background: #333;
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #444;
        }

        .btn-danger {
            background: #522;
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: #633;
        }

        .btn-small {
            padding: 4px 8px;
            font-size: 0.8rem;
        }

        .btn-icon {
            padding: 6px 10px;
            min-width: 34px;
        }

        /* ============================================
           PARAMETERS PANEL (LEFT)
           ============================================ */
        .params-panel {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 15px;
        }

        .param-section {
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--border-color);
        }

        .section-header:hover {
            background: rgba(76, 175, 80, 0.1);
        }

        .section-title {
            font-size: 0.95rem;
            color: var(--accent);
            font-weight: 600;
        }

        .collapse-icon {
            color: var(--text-secondary);
            transition: transform 0.2s;
            font-size: 0.8rem;
        }

        .param-section.collapsed .collapse-icon {
            transform: rotate(-90deg);
        }

        .param-section.collapsed .section-content {
            display: none;
        }

        .section-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .subsection {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }

        .subsection-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Parameter Controls */
        .param-row {
            display: grid;
            grid-template-columns: 100px 1fr 60px;
            align-items: center;
            gap: 8px;
        }

        .param-row.wide-label {
            grid-template-columns: 120px 1fr 60px;
        }

        .param-row label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .param-row input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .param-row input[type="number"],
        .param-row input[type="text"] {
            width: 100%;
            padding: 6px 8px;
            background: var(--bg-input);
            border: 1px solid #555;
            border-radius: 3px;
            color: var(--text-value);
            font-family: monospace;
            font-size: 0.85rem;
            text-align: right;
        }

        .param-row input[type="number"]:focus,
        .param-row input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .param-row-full {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .param-row-full label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .param-row-full input[type="text"] {
            width: 100%;
            padding: 8px;
            background: var(--bg-input);
            border: 1px solid #555;
            border-radius: 3px;
            color: var(--text-value);
            font-family: monospace;
            font-size: 0.9rem;
            text-align: left;
        }

        .seed-row {
            display: flex;
            gap: 8px;
        }

        .seed-row input {
            flex: 1;
        }

        /* Checkbox styling */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .checkbox-row label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* ============================================
           PREVIEW PANEL (CENTER)
           ============================================ */
        .preview-panel {
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .preview-modes {
            display: flex;
            gap: 5px;
        }

        .preview-modes button {
            padding: 6px 14px;
            background: #333;
            border: 1px solid var(--border-color);
            color: #aaa;
        }

        .preview-modes button:hover {
            background: #444;
            color: #fff;
        }

        .preview-modes button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 500;
        }

        .preview-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .preview-controls label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .preview-controls select {
            padding: 6px 10px;
            background: #222;
            border: 1px solid #555;
            border-radius: 3px;
            color: var(--text-value);
            font-family: monospace;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: #0f0f1a;
        }

        #preview-canvas {
            cursor: grab;
            image-rendering: pixelated;
        }

        #preview-canvas:active {
            cursor: grabbing;
        }

        .preview-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #fff;
            font-family: monospace;
            border: 1px solid var(--border-color);
        }

        .preview-info span {
            margin-right: 15px;
        }

        .preview-info .label {
            color: #888;
        }

        .cursor-info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #fff;
            font-family: monospace;
            min-width: 180px;
            border: 1px solid var(--border-color);
        }

        .cursor-info .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .cursor-info .info-row:last-child {
            margin-bottom: 0;
        }

        .cursor-info .label {
            color: #888;
        }

        .cursor-info .value {
            color: var(--text-value);
        }

        .zoom-controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .zoom-controls button {
            width: 32px;
            height: 32px;
            padding: 0;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
            color: #fff;
        }

        .zoom-controls button:hover {
            background: rgba(76, 175, 80, 0.3);
            color: #fff;
        }

        /* Y-level slider for cave view */
        .y-level-slider {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .y-level-slider input[type="range"] {
            writing-mode: vertical-lr;
            direction: rtl;
            height: 200px;
            accent-color: var(--accent);
        }

        .y-level-slider span {
            font-size: 12px;
            color: #fff;
            font-family: monospace;
        }

        /* ============================================
           PRESETS PANEL (RIGHT)
           ============================================ */
        .presets-panel {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .presets-header {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .presets-header h2 {
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .presets-actions {
            display: flex;
            gap: 8px;
        }

        .presets-actions button {
            flex: 1;
        }

        .presets-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .preset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .preset-item:hover {
            background: rgba(76, 175, 80, 0.1);
        }

        .preset-item.active {
            border-left: 3px solid var(--accent);
        }

        .preset-name {
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .preset-type {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .preset-actions {
            display: flex;
            gap: 5px;
        }

        .preset-actions button {
            padding: 4px 8px;
            font-size: 0.75rem;
        }

        /* Export Section */
        .export-section {
            border-top: 1px solid var(--border-color);
            padding: 15px;
        }

        .export-section h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .export-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .json-preview {
            margin-top: 10px;
        }

        .json-preview textarea {
            width: 100%;
            height: 150px;
            background: #111;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 8px;
            resize: vertical;
        }

        /* ============================================
           BIOME EDITOR
           ============================================ */
        .biome-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .biome-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            padding: 10px;
            border-left: 4px solid #666;
            border: 1px solid var(--border-color);
            border-left-width: 4px;
        }

        .biome-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .biome-header input[type="text"] {
            flex: 1;
            padding: 4px 8px;
            background: #222;
            border: 1px solid #555;
            border-radius: 3px;
            color: var(--text-value);
            font-family: monospace;
            font-size: 0.85rem;
        }

        .biome-header input[type="color"] {
            width: 32px;
            height: 26px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            padding: 0;
        }

        .biome-ranges {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 0.8rem;
        }

        .biome-range-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .biome-range-row label {
            color: var(--text-muted);
            width: 45px;
        }

        .biome-range-row input {
            width: 45px;
            padding: 3px 4px;
            background: #222;
            border: 1px solid #555;
            border-radius: 3px;
            color: var(--text-value);
            font-family: monospace;
            font-size: 0.75rem;
            text-align: center;
        }

        .biome-range-row select {
            padding: 3px 4px;
            background: #222;
            border: 1px solid #555;
            border-radius: 3px;
            color: var(--text-value);
            font-family: monospace;
            font-size: 0.75rem;
        }

        .biome-range-row span {
            color: var(--text-muted);
        }

        .biome-delete {
            padding: 2px 6px;
            font-size: 0.75rem;
        }

        .add-biome-btn {
            margin-top: 8px;
            width: 100%;
        }

        /* Biome threshold chart */
        .biome-chart {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .biome-chart-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        #biome-chart-canvas {
            width: 100%;
            height: 150px;
            border-radius: 4px;
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
            backdrop-filter: blur(2px);
        }

        .loading-overlay.visible {
            display: flex;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           TOOLTIP
           ============================================ */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-primary);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 1000;
        }

        .tooltip:hover::after {
            opacity: 1;
        }

        /* ============================================
           SCROLLBAR
           ============================================ */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-input);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }

        /* ============================================
           LAYER TOGGLES
           ============================================ */
        .layer-toggles {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .layer-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .layer-toggle input {
            accent-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>VoxEx Terrain Parameter Editor</h1>
            <div class="header-buttons">
                <button class="btn-secondary" id="btn-randomize-all">Randomize All</button>
                <button class="btn-secondary" id="btn-reset-all">Reset to Defaults</button>
                <button class="btn-primary" id="btn-undo" disabled>Undo</button>
                <button class="btn-primary" id="btn-redo" disabled>Redo</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Parameters Panel (Left) -->
            <aside class="params-panel" id="params-panel">
                <!-- Sections will be generated by JavaScript -->
            </aside>

            <!-- Preview Panel (Center) -->
            <section class="preview-panel">
                <div class="preview-toolbar">
                    <div class="preview-modes">
                        <button class="active" data-mode="heightmap">Heightmap</button>
                        <button data-mode="biome">Biomes</button>
                        <button data-mode="caves">Caves</button>
                        <button data-mode="combined">Combined</button>
                    </div>
                    <div class="preview-controls">
                        <div class="layer-toggles" id="layer-toggles" style="display: none;">
                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-terrain" checked>
                                Terrain
                            </label>
                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-biomes" checked>
                                Biomes
                            </label>
                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-caves" checked>
                                Caves
                            </label>
                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-rivers" checked>
                                Rivers
                            </label>
                        </div>
                        <label>Quality:</label>
                        <select id="preview-quality">
                            <option value="256">Low (256px)</option>
                            <option value="512" selected>Medium (512px)</option>
                            <option value="1024">High (1024px)</option>
                        </select>
                    </div>
                </div>
                <div class="preview-container">
                    <canvas id="preview-canvas" width="512" height="512"></canvas>
                    <div class="cursor-info" id="cursor-info">
                        <div class="info-row">
                            <span class="label">Position:</span>
                            <span class="value" id="cursor-pos">X: 0, Z: 0</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Height:</span>
                            <span class="value" id="cursor-height">--</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Biome:</span>
                            <span class="value" id="cursor-biome">--</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Noise/Weight:</span>
                            <span class="value" id="cursor-climate">--</span>
                        </div>
                    </div>
                    <div class="preview-info">
                        <span><span class="label">Offset:</span> <span id="view-offset">0, 0</span></span>
                        <span><span class="label">Zoom:</span> <span id="view-zoom">1.0x</span></span>
                    </div>
                    <div class="y-level-slider" id="y-level-slider" style="display: none;">
                        <span id="y-level-value">64</span>
                        <input type="range" id="y-level" min="0" max="320" value="64">
                        <span>Y Level</span>
                    </div>
                    <div class="zoom-controls">
                        <button id="zoom-in" class="tooltip" data-tooltip="Zoom In">+</button>
                        <button id="zoom-out" class="tooltip" data-tooltip="Zoom Out">-</button>
                        <button id="zoom-reset" class="tooltip" data-tooltip="Reset View">R</button>
                    </div>
                    <div class="loading-overlay" id="loading-overlay">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </section>

            <!-- Presets Panel (Right) -->
            <aside class="presets-panel">
                <div class="presets-header">
                    <h2>Presets</h2>
                    <div class="presets-actions">
                        <button class="btn-primary btn-small" id="btn-save-preset">Save Preset</button>
                    </div>
                </div>
                <div class="presets-list" id="presets-list">
                    <!-- Presets will be generated by JavaScript -->
                </div>
                <div class="export-section">
                    <h3>Export / Import</h3>
                    <div class="export-actions">
                        <button class="btn-secondary" id="btn-export-json">Export JSON</button>
                        <button class="btn-secondary" id="btn-copy-json">Copy to Clipboard</button>
                        <button class="btn-secondary" id="btn-copy-voxex">Copy for VoxEx</button>
                        <button class="btn-secondary" id="btn-import-json">Import JSON</button>
                        <input type="file" id="import-file" accept=".json" style="display: none;">
                    </div>
                    <div class="json-preview">
                        <textarea id="json-preview" readonly></textarea>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
    // ============================================
    // SEEDED PSEUDO-RANDOM NUMBER GENERATOR
    // ============================================

    /**
     * Mulberry32 PRNG - fast, seedable, good distribution
     * @param {number} seed - Seed value
     * @returns {function(): number} Random number generator function returning 0-1
     */
    function mulberry32(seed) {
        return function() {
            let t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
    }

    /**
     * Convert string seed to numeric seed.
     * Matches voxEx.html hashSeed() algorithm exactly for consistent terrain generation.
     * @param {string|number} seed - Seed input
     * @returns {number} Numeric seed
     */
    function hashSeed(seed) {
        if (typeof seed === 'number') return seed;
        const str = String(seed);
        let hash = 0xdeadbeef;
        for (let i = 0; i < str.length; i++) {
            hash = Math.imul(hash ^ str.charCodeAt(i), 2654435761);
            hash = (hash ^ (hash >>> 16)) >>> 0;
        }
        return hash;
    }

    // ============================================
    // SEEDED 2D/3D PERLIN NOISE
    // ============================================

    /**
     * Seeded Perlin Noise implementation
     */
    class SeededNoise {
        /**
         * @param {number} seed - Seed for the noise generator
         */
        constructor(seed) {
            this.seed = seed;
            this.permutation = this.generatePermutation(seed);
        }

        /**
         * Generate seeded permutation table using Fisher-Yates shuffle
         * MUST match voxEx.html initNoise() exactly for consistent terrain!
         * @param {number} seed - Seed value
         * @returns {number[]} Permutation table (512 elements)
         */
        generatePermutation(seed) {
            const rng = mulberry32(seed);
            const p = Array.from({ length: 256 }, (_, i) => i);

            // CRITICAL: Consume first RNG call - this is worldConfig.seed in main game
            // The main game does: worldConfig.seed = rng.next(); before the shuffle
            this.numericSeed = rng();

            // Fisher-Yates shuffle - MUST match voxEx.html forward loop exactly!
            // Main game: for (let i = 0; i < 256; i++) { let r = Math.floor(rng.next() * (256 - i)) + i; [p[i], p[r]] = [p[r], p[i]]; }
            for (let i = 0; i < 256; i++) {
                const r = Math.floor(rng() * (256 - i)) + i;
                [p[i], p[r]] = [p[r], p[i]];
            }

            // Double for wrapping
            return [...p, ...p];
        }

        /**
         * Smoothstep fade function
         * @param {number} t - Input value
         * @returns {number} Faded value
         */
        fade(t) {
            return t * t * t * (t * (t * 6 - 15) + 10);
        }

        /**
         * Linear interpolation
         * @param {number} t - Interpolation factor
         * @param {number} a - Start value
         * @param {number} b - End value
         * @returns {number} Interpolated value
         */
        lerp(t, a, b) {
            return a + t * (b - a);
        }

        /**
         * 2D gradient function - MUST match voxEx.html grad() exactly!
         * @param {number} hash - Hash value
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @returns {number} Gradient contribution
         */
        grad2D(hash, x, y) {
            // Match voxEx.html: const grad = (h, x, y) => { const u = h < 8 ? x : y; const v = h < 4 ? y : (h === 12 || h === 14 ? x : 0); return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v); };
            const h = hash & 15;
            const u = h < 8 ? x : y;
            const v = h < 4 ? y : (h === 12 || h === 14 ? x : 0);
            return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
        }

        /**
         * 3D gradient function
         * @param {number} hash - Hash value
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @param {number} z - Z coordinate
         * @returns {number} Gradient contribution
         */
        grad3D(hash, x, y, z) {
            const h = hash & 15;
            const u = h < 8 ? x : y;
            const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
            return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
        }

        /**
         * 2D Perlin noise
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @returns {number} Noise value (-1 to 1)
         */
        noise2D(x, y) {
            const X = Math.floor(x) & 255;
            const Y = Math.floor(y) & 255;

            x -= Math.floor(x);
            y -= Math.floor(y);

            const u = this.fade(x);
            const v = this.fade(y);

            const p = this.permutation;
            const A = p[X] + Y;
            const B = p[X + 1] + Y;

            return this.lerp(v,
                this.lerp(u, this.grad2D(p[A], x, y), this.grad2D(p[B], x - 1, y)),
                this.lerp(u, this.grad2D(p[A + 1], x, y - 1), this.grad2D(p[B + 1], x - 1, y - 1))
            );
        }

        /**
         * 3D Perlin noise
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @param {number} z - Z coordinate
         * @returns {number} Noise value (-1 to 1)
         */
        noise3D(x, y, z) {
            const X = Math.floor(x) & 255;
            const Y = Math.floor(y) & 255;
            const Z = Math.floor(z) & 255;

            x -= Math.floor(x);
            y -= Math.floor(y);
            z -= Math.floor(z);

            const u = this.fade(x);
            const v = this.fade(y);
            const w = this.fade(z);

            const p = this.permutation;
            const A = p[X] + Y;
            const AA = p[A] + Z;
            const AB = p[A + 1] + Z;
            const B = p[X + 1] + Y;
            const BA = p[B] + Z;
            const BB = p[B + 1] + Z;

            return this.lerp(w,
                this.lerp(v,
                    this.lerp(u, this.grad3D(p[AA], x, y, z), this.grad3D(p[BA], x - 1, y, z)),
                    this.lerp(u, this.grad3D(p[AB], x, y - 1, z), this.grad3D(p[BB], x - 1, y - 1, z))
                ),
                this.lerp(v,
                    this.lerp(u, this.grad3D(p[AA + 1], x, y, z - 1), this.grad3D(p[BA + 1], x - 1, y, z - 1)),
                    this.lerp(u, this.grad3D(p[AB + 1], x, y - 1, z - 1), this.grad3D(p[BB + 1], x - 1, y - 1, z - 1))
                )
            );
        }

        /**
         * Fractal Brownian Motion 2D (multiple octaves)
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @param {number} octaves - Number of octaves
         * @param {number} frequency - Base frequency
         * @param {number} lacunarity - Frequency multiplier per octave
         * @param {number} persistence - Amplitude multiplier per octave
         * @returns {number} Noise value (-1 to 1)
         */
        fractal2D(x, y, octaves, frequency, lacunarity, persistence) {
            let value = 0;
            let amplitude = 1;
            let maxAmplitude = 0;
            let freq = frequency;

            for (let i = 0; i < octaves; i++) {
                value += this.noise2D(x * freq, y * freq) * amplitude;
                maxAmplitude += amplitude;
                amplitude *= persistence;
                freq *= lacunarity;
            }

            return value / maxAmplitude;
        }

        /**
         * Fractal Brownian Motion 3D (multiple octaves)
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @param {number} z - Z coordinate
         * @param {number} octaves - Number of octaves
         * @param {number} frequency - Base frequency
         * @param {number} lacunarity - Frequency multiplier per octave
         * @param {number} persistence - Amplitude multiplier per octave
         * @returns {number} Noise value (-1 to 1)
         */
        fractal3D(x, y, z, octaves, frequency, lacunarity, persistence) {
            let value = 0;
            let amplitude = 1;
            let maxAmplitude = 0;
            let freq = frequency;

            for (let i = 0; i < octaves; i++) {
                value += this.noise3D(x * freq, y * freq, z * freq) * amplitude;
                maxAmplitude += amplitude;
                amplitude *= persistence;
                freq *= lacunarity;
            }

            return value / maxAmplitude;
        }

        /**
         * FBM 2D matching voxEx.html signature exactly.
         * IMPORTANT: Starts with frequency=1 (coordinates should be pre-scaled)
         * @param {number} x - X coordinate (pre-scaled by roughness)
         * @param {number} z - Z coordinate (pre-scaled by roughness)
         * @param {number} octaves - Number of octaves (default 4)
         * @param {number} persistence - Amplitude multiplier (default 0.5)
         * @param {number} lacunarity - Frequency multiplier (default 2.0)
         * @returns {number} Noise value (-1 to 1)
         */
        fbm2D(x, z, octaves = 4, persistence = 0.5, lacunarity = 2.0) {
            let total = 0, frequency = 1, amplitude = 1, maxValue = 0;
            for (let i = 0; i < octaves; i++) {
                total += this.noise2D(x * frequency, z * frequency) * amplitude;
                maxValue += amplitude;
                amplitude *= persistence;
                frequency *= lacunarity;
            }
            return total / maxValue;
        }

        /**
         * FBM with domain warping - matches voxEx.html fbmWithDomainWarp()
         * @param {number} x - X coordinate
         * @param {number} z - Z coordinate
         * @param {number} octaves - Number of octaves
         * @param {number} persistence - Amplitude multiplier
         * @param {number} lacunarity - Frequency multiplier
         * @returns {number} Noise value
         */
        fbmWithDomainWarp(x, z, octaves, persistence, lacunarity) {
            const warpScale = 0.03;
            const offsetX = this.fbm2D(x * warpScale, z * warpScale, 3, 0.5, 2.0) * 20;
            const offsetZ = this.fbm2D((x + 100) * warpScale, (z + 100) * warpScale, 3, 0.5, 2.0) * 20;
            return this.fbm2D(x + offsetX, z + offsetZ, octaves, persistence, lacunarity);
        }
    }

    /**
     * TerrainParams class - holds and manages all terrain parameters
     */
    class TerrainParams {
        constructor() {
            this.params = JSON.parse(JSON.stringify(DEFAULT_PARAMS));
            this.listeners = [];
        }

        /**
         * Get a parameter value by path
         * @param {string} path - Dot-separated path to parameter
         * @returns {*} Parameter value
         */
        get(path) {
            return path.split('.').reduce((obj, key) => obj?.[key], this.params);
        }

        /**
         * Set a parameter value by path
         * @param {string} path - Dot-separated path to parameter
         * @param {*} value - New value
         */
        set(path, value) {
            const keys = path.split('.');
            const lastKey = keys.pop();
            const obj = keys.reduce((o, k) => o[k], this.params);
            obj[lastKey] = value;
            this.notifyListeners(path, value);
        }

        /**
         * Get numeric seed from current seed value
         * @returns {number} Numeric seed
         */
        getNumericSeed() {
            return hashSeed(this.params.seed);
        }

        /**
         * Load parameters from JSON object
         * @param {Object} json - Parameters object
         */
        loadFromJSON(json) {
            this.params = JSON.parse(JSON.stringify(json));
            this.notifyListeners('*', null);
        }

        /**
         * Export parameters to JSON object
         * @returns {Object} Parameters object
         */
        toJSON() {
            return JSON.parse(JSON.stringify(this.params));
        }

        /**
         * Reset to defaults
         */
        reset() {
            this.params = JSON.parse(JSON.stringify(DEFAULT_PARAMS));
            this.notifyListeners('*', null);
        }

        /**
         * Add change listener
         * @param {function(string, *): void} listener - Callback function
         */
        addListener(listener) {
            this.listeners.push(listener);
        }

        /**
         * Remove change listener
         * @param {function(string, *): void} listener - Callback function
         */
        removeListener(listener) {
            const idx = this.listeners.indexOf(listener);
            if (idx !== -1) this.listeners.splice(idx, 1);
        }

        /**
         * Notify all listeners of change
         * @param {string} path - Changed parameter path
         * @param {*} value - New value
         */
        notifyListeners(path, value) {
            this.listeners.forEach(listener => listener(path, value));
        }
    }

    // ============================================
    // TERRAIN GENERATOR CLASS
    // ============================================

    /**
     * TerrainGenerator - generates terrain data from parameters
     */
    class TerrainGenerator {
        /**
         * @param {TerrainParams} params - Terrain parameters
         */
        constructor(params) {
            this.params = params;
            this.updateNoise();

            params.addListener((path) => {
                if (path === 'seed' || path === '*') {
                    this.updateNoise();
                } else if (path.startsWith('biomes')) {
                    // Rebuild biome table when biome settings change
                    this.buildBiomeTable();
                    this.biomeCellCache.clear();
                }
            });
        }

        /**
         * Update noise generators when seed changes.
         * CRITICAL: Must match voxEx.html noise initialization!
         * Main game uses SAME noise function for terrain AND biome selection.
         */
        updateNoise() {
            const seed = this.params.getNumericSeed();
            this.terrainNoise = new SeededNoise(seed);
            // NOTE: Main game uses same noise for biome selection, no separate biomeNoise!
            // Cave noise uses different seeds to avoid correlation
            this.caveNoise1 = new SeededNoise(seed + 3000);
            this.caveNoise2 = new SeededNoise(seed + 4000);
            this.riverNoise = new SeededNoise(seed + 5000);
            // Build biome weight table for fast lookup
            this.buildBiomeTable();
            // Clear biome cell cache
            this.biomeCellCache = new Map();
        }

        /**
         * Build cumulative weight table for biome selection.
         * Matches voxEx.html biomeTable structure.
         */
        buildBiomeTable() {
            const biomes = this.params.params.biomes.types;
            let totalWeight = 0;
            const cumulative = [];

            for (const biome of biomes) {
                totalWeight += biome.weight || 1;
                cumulative.push({
                    threshold: totalWeight,
                    biome: biome
                });
            }

            this.biomeTable = { totalWeight, cumulative };
        }

        /**
         * Get terrain height at world coordinates using full biome blending.
         * Matches voxEx.html blendedHeight() with 4-cell biome interpolation.
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {number} Terrain height
         */
        getHeight(wx, wz) {
            return this.blendedHeight(wx, wz);
        }

        /**
         * Get raw biome height without blending (used internally for cell sampling).
         * @param {number} gx - World X
         * @param {number} gz - World Z
         * @param {Object} biome - Biome configuration
         * @param {number} seed - Numeric seed
         * @returns {number} Raw terrain height
         */
        getRawBiomeHeight(gx, gz, biome, seed) {
            const biomeName = biome?.id || 'plains';
            switch (biomeName) {
                case 'plains':
                    return this.plainsHeight(gx, gz, biome, seed);
                case 'hills':
                    return this.hillsHeight(gx, gz, biome, seed);
                case 'mountains':
                    return this.mountainsHeight(gx, gz, biome, seed);
                case 'forests':
                case 'swamp':
                case 'longwoods':
                default:
                    return this.defaultHeight(gx, gz, biome, seed);
            }
        }

        /**
         * Continental height factor (-1 to 1) for ocean vs inland.
         * Matches voxEx.html continentalHeight()
         * @param {number} gx - World X
         * @param {number} gz - World Z
         * @param {number} seed - Numeric seed
         * @returns {number} Continental factor (-1 to 1)
         */
        continentalHeight(gx, gz, seed) {
            const base = this.terrainNoise.fbmWithDomainWarp(gx * 0.002, gz * 0.002, 4, 0.5, 2.0);
            const erosion = this.terrainNoise.fbm2D(gx * 0.004 + seed * 3.17, gz * 0.004 - seed * 5.41, 3, 0.6, 1.8);
            let c = base * 0.7 + erosion * 0.3;
            c += 0.3;
            return Math.max(-1, Math.min(1, c));
        }

        /**
         * Get biome height at a cell center with continental scaling.
         * Matches voxEx.html getBiomeHeightAtCell()
         * @param {number} cx - Cell X
         * @param {number} cz - Cell Z
         * @param {number} gx - World X
         * @param {number} gz - World Z
         * @param {number} seed - Numeric seed
         * @param {number} continentFactor - Continental factor (-1 to 1)
         * @returns {number} Height at cell
         */
        getBiomeHeightAtCell(cx, cz, gx, gz, seed, continentFactor) {
            const cellSize = this.params.params.biomes.cellSize;
            const centerX = cx * cellSize + cellSize * 0.5;
            const centerZ = cz * cellSize + cellSize * 0.5;
            const biome = this.getBiome(centerX, centerZ);
            let h = this.getRawBiomeHeight(gx, gz, biome, seed);
            // Apply continental scaling (ocean = 0.3x, inland = 1.0x)
            const t = (continentFactor + 1) * 0.5; // -1..1 → 0..1
            const factor = 0.3 + t * 0.7;
            h = biome.baseHeight + (h - biome.baseHeight) * factor;
            // Add height boost for inland areas (mountains)
            h += Math.max(0, continentFactor - 0.15) * 10;
            return h;
        }

        /**
         * Get ocean factor at position (0 = deep ocean, 1 = land).
         * Matches voxEx.html getOceanFactor()
         * @param {number} gx - World X
         * @param {number} gz - World Z
         * @param {number} seed - Numeric seed
         * @returns {number} Ocean factor (0-1)
         */
        getOceanFactor(gx, gz, seed) {
            const oceanScale = 0.0008;
            const oceanNoise = this.terrainNoise.noise2D(gx * oceanScale + seed * 1.5, gz * oceanScale - seed * 0.8);
            const coastScale = 0.004;
            const coastNoise = this.terrainNoise.noise2D(gx * coastScale + seed * 2.1, gz * coastScale + seed * 1.3);
            const detailScale = 0.02;
            const detailNoise = this.terrainNoise.noise2D(gx * detailScale - seed * 0.5, gz * detailScale + seed * 0.9) * 0.1;
            const combined = oceanNoise + coastNoise * 0.3 + detailNoise;
            const oceanThreshold = -0.3;
            const shallowThreshold = -0.1;
            if (combined < oceanThreshold) {
                return 0.0; // Deep ocean
            } else if (combined < shallowThreshold) {
                let t = (combined - oceanThreshold) / (shallowThreshold - oceanThreshold);
                return t * t * (3 - 2 * t);
            }
            return 1.0; // Land
        }

        /**
         * Get ocean depth at position.
         * Matches voxEx.html getOceanDepth()
         * @param {number} oceanFactor - Ocean factor (0-1)
         * @param {number} gx - World X
         * @param {number} gz - World Z
         * @param {number} seed - Numeric seed
         * @returns {number} Ocean depth
         */
        getOceanDepth(oceanFactor, gx, gz, seed) {
            const baseOceanDepth = 20;
            const depthNoise = this.terrainNoise.noise2D(gx * 0.008 + seed * 0.9, gz * 0.008 - seed * 0.6);
            const depthVariation = (depthNoise + 1) * 0.5 * 15;
            const centerFactor = 1.0 - oceanFactor;
            return baseOceanDepth + depthVariation * centerFactor;
        }

        /**
         * Get river factor at position (0 = river center, 1 = land).
         * Matches voxEx.html getRiverFactor()
         * @param {number} gx - World X
         * @param {number} gz - World Z
         * @param {number} seed - Numeric seed
         * @returns {number} River factor (0-1)
         */
        getRiverFactor(gx, gz, seed) {
            const warpScale = 0.004;
            const warpStrength = 20.0;
            const wx = gx + this.terrainNoise.noise2D(gx * warpScale, gz * warpScale) * warpStrength;
            const wz = gz + this.terrainNoise.noise2D(gx * warpScale + 100, gz * warpScale + 100) * warpStrength;
            const scale = 0.001;
            const n = Math.abs(this.terrainNoise.noise2D(wx * scale + seed * 0.1, wz * scale - seed * 0.1));
            const coastNoiseScale = 0.05;
            const coastNoise = this.terrainNoise.noise2D(gx * coastNoiseScale + seed * 0.7, gz * coastNoiseScale - seed * 0.3);
            const coastVariation = coastNoise * 0.02;
            const riverThreshold = 0.02 + coastVariation;
            const bankThreshold = 0.05 + coastVariation * 2;
            if (n < riverThreshold) {
                return 0.0; // River center
            } else if (n < bankThreshold) {
                let t = (n - riverThreshold) / (bankThreshold - riverThreshold);
                return t * t * (3 - 2 * t);
            }
            return 1.0; // Land
        }

        /**
         * Get river depth at position.
         * Matches voxEx.html getRiverDepth()
         * @param {number} riverFactor - River factor (0-1)
         * @param {number} gx - World X
         * @param {number} gz - World Z
         * @param {number} seed - Numeric seed
         * @returns {number} River depth
         */
        getRiverDepth(riverFactor, gx, gz, seed) {
            const baseRiverDepth = 6;
            const depthNoise = this.terrainNoise.noise2D(gx * 0.03 + seed * 0.4, gz * 0.03 - seed * 0.2);
            const depthVariation = (depthNoise + 1) * 0.5 * 3;
            const centerFactor = 1.0 - riverFactor;
            return baseRiverDepth + depthVariation * centerFactor;
        }

        /**
         * Full blended height with 4-cell biome interpolation.
         * Matches voxEx.html blendedHeight() exactly!
         * @param {number} gx - World X
         * @param {number} gz - World Z
         * @returns {number} Blended terrain height
         */
        blendedHeight(gx, gz) {
            const seed = this.terrainNoise.numericSeed;
            const seaLevel = this.params.params.terrain.seaLevel;
            const cellSize = this.params.params.biomes.cellSize;

            // 1. Get continentalness (-1 to 1)
            const c = this.continentalHeight(gx, gz, seed);

            // 2. Biome grid interpolation (4-cell smoothstep)
            const u = gx / cellSize - 0.5;
            const v = gz / cellSize - 0.5;
            const x0 = Math.floor(u);
            const z0 = Math.floor(v);
            const x1 = x0 + 1;
            const z1 = z0 + 1;
            const wx = u - x0;
            const wz = v - z0;
            const sx = wx * wx * (3 - 2 * wx); // smoothstep
            const sz = wz * wz * (3 - 2 * wz);

            // 3. Sample 4 biomes and calculate heights
            const h00 = this.getBiomeHeightAtCell(x0, z0, gx, gz, seed, c);
            const h10 = this.getBiomeHeightAtCell(x1, z0, gx, gz, seed, c);
            const h01 = this.getBiomeHeightAtCell(x0, z1, gx, gz, seed, c);
            const h11 = this.getBiomeHeightAtCell(x1, z1, gx, gz, seed, c);
            const h0 = h00 + sx * (h10 - h00);
            const h1 = h01 + sx * (h11 - h01);
            let finalHeight = h0 + sz * (h1 - h0);

            // 4. Apply oceans first (larger scale feature)
            const oceanFactor = this.getOceanFactor(gx, gz, seed);
            if (oceanFactor < 1.0) {
                const oceanDepth = this.getOceanDepth(oceanFactor, gx, gz, seed);
                const oceanFloor = seaLevel - oceanDepth;
                const bank = oceanFactor * oceanFactor * (3 - 2 * oceanFactor);
                finalHeight = oceanFloor + bank * (finalHeight - oceanFloor);
            }

            // 5. Apply rivers (can carve through ocean edges too)
            const r = this.getRiverFactor(gx, gz, seed);
            if (r < 1.0) {
                const riverDepth = this.getRiverDepth(r, gx, gz, seed);
                const riverBed = seaLevel - riverDepth;
                const bank = r * r * (3 - 2 * r);
                const carvedHeight = Math.min(finalHeight, riverBed);
                finalHeight = carvedHeight + bank * (finalHeight - carvedHeight);
            }

            return Math.floor(finalHeight);
        }

        /**
         * Default height function - rolling noise (Forests, Swamp, Longwoods)
         * Matches voxEx.html defaultHeightFunc()
         */
        defaultHeight(gx, gz, biome, seed) {
            const n = this.terrainNoise.fbm2D(gx * biome.roughness, gz * biome.roughness, 4, 0.5, 2.0);
            return Math.floor(biome.baseHeight + n * biome.amplitude);
        }

        /**
         * Hills height function - "billowy" rounded hills
         * Matches voxEx.html hillsHeightFunc()
         */
        hillsHeight(gx, gz, biome, seed) {
            let n = Math.abs(this.terrainNoise.noise2D(gx * biome.roughness, gz * biome.roughness));
            n = n * n;
            return Math.floor(biome.baseHeight + n * biome.amplitude);
        }

        /**
         * Plains height function - gentle rolling terrain
         * Matches voxEx.html plainsHeightFunc()
         */
        plainsHeight(gx, gz, biome, seed) {
            const base = this.terrainNoise.noise2D(gx * 0.003, gz * 0.003);
            const detail = this.terrainNoise.noise2D(gx * 0.05, gz * 0.05) * 0.1;
            return Math.floor(biome.baseHeight + (base + detail) * biome.amplitude);
        }

        /**
         * Mountains height function - complex terrain with ridges, valleys, peaks
         * Matches voxEx.html mountainsHeightFunc()
         */
        mountainsHeight(gx, gz, biome, seed) {
            // Domain warping for winding ridge lines
            const warpScale = 0.0015;
            const warpStrength = 80;
            const warpX = gx + this.terrainNoise.noise2D(gx * warpScale + seed, gz * warpScale) * warpStrength;
            const warpZ = gz + this.terrainNoise.noise2D(gx * warpScale + 100, gz * warpScale + seed) * warpStrength;

            // Regional variation (foothills vs major peaks)
            const regionNoise = this.terrainNoise.noise2D(gx * 0.0006 + seed * 0.3, gz * 0.0006 - seed * 0.3);
            const regionNoise2 = this.terrainNoise.noise2D(gx * 0.001 + seed * 0.7, gz * 0.001 + seed * 0.2);
            const regionScale = 0.15 + Math.pow((regionNoise + 1) * 0.5, 0.8) * 0.55 +
                               Math.pow((regionNoise2 + 1) * 0.5, 1.2) * 0.30;

            // Main ridge system with ridged noise
            const rx = warpX * biome.roughness;
            const rz = warpZ * biome.roughness;
            let ridgeSum = 0;
            let amp = 1.0;
            let freq = 1.0;
            for (let i = 0; i < 6; i++) {
                let n = 1.0 - Math.abs(this.terrainNoise.noise2D(rx * freq + seed * 10, rz * freq + seed * 10));
                const sharpness = i < 2 ? 1.5 : 1.2;
                n = Math.pow(n, sharpness);
                ridgeSum += n * amp;
                freq *= 2.0;
                amp *= 0.52;
            }
            ridgeSum = ridgeSum / 2.2;

            // Valley carving
            const valleyNoise = this.terrainNoise.noise2D(gx * 0.003 + seed * 5, gz * 0.003 - seed * 5);
            const valleyNoise2 = this.terrainNoise.noise2D(gx * 0.006 - seed * 2, gz * 0.006 + seed * 2);
            const valleyFactor = Math.max(0, -valleyNoise * 0.5 - valleyNoise2 * 0.3);
            const valleyCarve = valleyFactor * 0.35;

            // Saddles and passes
            const saddleNoise = this.terrainNoise.noise2D(gx * 0.008 + seed * 8, gz * 0.008 - seed * 8);
            const saddleFactor = saddleNoise > 0.6 ? (saddleNoise - 0.6) * 0.5 : 0;

            // Peak variation
            const peakTypeNoise = this.terrainNoise.noise2D(gx * 0.004 + seed * 12, gz * 0.004 - seed * 12);
            let peakBonus = 0;
            if (peakTypeNoise > 0.5 && ridgeSum > 0.6) {
                const spireNoise = this.terrainNoise.noise2D(gx * 0.02 + seed * 15, gz * 0.02 - seed * 15);
                if (spireNoise > 0.6) {
                    peakBonus = Math.pow((spireNoise - 0.6) * 2.5, 2) * 0.25;
                }
            } else if (peakTypeNoise < -0.3 && ridgeSum > 0.5) {
                peakBonus = ridgeSum * 0.1;
            }

            // Cliff bands
            const preHeight = ridgeSum - valleyCarve - saddleFactor + peakBonus;
            const cliffBandNoise = this.terrainNoise.noise2D(gx * 0.05 + seed * 20, gz * 0.05);
            let cliffBonus = 0;
            if (preHeight > 0.35 && preHeight < 0.45 && cliffBandNoise > 0.3) {
                cliffBonus = (cliffBandNoise - 0.3) * 0.08;
            } else if (preHeight > 0.65 && preHeight < 0.75 && cliffBandNoise > 0.2) {
                cliffBonus = (cliffBandNoise - 0.2) * 0.1;
            }

            // Erosion detail
            const erosionNoise = this.terrainNoise.noise2D(gx * 0.08 + seed * 3, gz * 0.08 - seed * 3);
            const erosionNoise2 = this.terrainNoise.noise2D(gx * 0.15 - seed * 4, gz * 0.15 + seed * 4);
            const erosionAmount = (Math.abs(erosionNoise) * 0.04 + Math.abs(erosionNoise2) * 0.02) *
                                 (0.5 + ridgeSum * 0.5);

            // Gullies
            const gullyNoise = 1.0 - Math.abs(this.terrainNoise.noise2D(gx * 0.025 + seed * 25, gz * 0.025 - seed * 25));
            const gullyCarve = gullyNoise > 0.85 ? (gullyNoise - 0.85) * 0.15 : 0;

            // Combine all factors
            let totalHeight = ridgeSum - valleyCarve - saddleFactor + peakBonus + cliffBonus +
                             erosionAmount - gullyCarve;
            totalHeight *= regionScale;

            // Foothill transition
            const baseNoise = this.terrainNoise.noise2D(gx * 0.002, gz * 0.002);
            const foothillBase = (baseNoise + 1) * 0.5 * 0.15;
            totalHeight = foothillBase + totalHeight * 0.85;

            const rawHeight = biome.baseHeight + totalHeight * biome.amplitude;
            return Math.floor(Math.min(Math.max(rawHeight, biome.baseHeight - 10), 285));
        }

        /**
         * Get biome at world coordinates using cell-based weighted selection.
         * MUST match voxEx.html getBiomeParams() / getBiomeCellValue() exactly!
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {Object|null} Biome object or null
         */
        getBiome(wx, wz) {
            const cellSize = this.params.params.biomes.cellSize;
            const cellX = Math.floor(wx / cellSize);
            const cellZ = Math.floor(wz / cellSize);
            const key = `${cellX},${cellZ}`;

            // Check cell cache
            if (this.biomeCellCache.has(key)) {
                return this.biomeCellCache.get(key);
            }

            // Calculate biome using cell coordinates (NOT world coordinates!)
            // MUST match voxEx.html getBiomeCellValue(): noise2D(cellX * 0.1 + 1000, cellZ * 0.1 + 1000)
            const biome = this.getBiomeCellValue(cellX, cellZ);

            this.biomeCellCache.set(key, biome);
            return biome;
        }

        /**
         * Get biome for a cell using noise-weighted selection.
         * MUST match voxEx.html getBiomeCellValue() exactly!
         * @param {number} cellX - Cell X coordinate
         * @param {number} cellZ - Cell Z coordinate
         * @returns {Object} Biome object
         */
        getBiomeCellValue(cellX, cellZ) {
            // CRITICAL: Match voxEx.html exactly - use SAME noise function (terrainNoise)
            // with cell coordinates, 0.1 frequency, and +1000 offset
            const cellNoise = this.terrainNoise.noise2D(cellX * 0.1 + 1000, cellZ * 0.1 + 1000);
            const normalizedNoise = (cellNoise + 1) * 0.5;

            // Find biome by cumulative weight (normalized to 0-1 range)
            let accumulated = 0;
            for (const entry of this.biomeTable.cumulative) {
                accumulated = entry.threshold / this.biomeTable.totalWeight;
                if (normalizedNoise <= accumulated) {
                    return entry.biome;
                }
            }

            return this.biomeTable.cumulative[0].biome;
        }

        /**
         * Legacy method for compatibility - now redirects to getBiomeCellValue
         * @deprecated Use getBiome() instead
         */
        getRawBiome(wx, wz) {
            const cellSize = this.params.params.biomes.cellSize;
            const cellX = Math.floor(wx / cellSize);
            const cellZ = Math.floor(wz / cellSize);
            return this.getBiomeCellValue(cellX, cellZ);
        }

        /**
         * Get biome noise value at coordinates (for debugging/visualization).
         * MUST match voxEx.html getBiomeCellValue() algorithm!
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {number} Noise value 0-1
         */
        getBiomeNoiseValue(wx, wz) {
            const cellSize = this.params.params.biomes.cellSize;
            const cellX = Math.floor(wx / cellSize);
            const cellZ = Math.floor(wz / cellSize);
            // Match voxEx.html: noise2D(cellX * 0.1 + 1000, cellZ * 0.1 + 1000)
            const cellNoise = this.terrainNoise.noise2D(cellX * 0.1 + 1000, cellZ * 0.1 + 1000);
            return (cellNoise + 1) * 0.5;
        }

        /**
         * Check if position is a cave
         * @param {number} wx - World X
         * @param {number} wy - World Y
         * @param {number} wz - World Z
         * @returns {boolean} True if cave
         */
        isCave(wx, wy, wz) {
            const caves = this.params.params.caves;
            if (!caves.enabled) return false;
            if (wy < caves.minY || wy > caves.maxY) return false;

            const scale = caves.scale;
            const n1 = this.caveNoise1.fractal3D(
                wx * scale, wy * scale * 1.5, wz * scale,
                caves.octaves, 1, caves.lacunarity, caves.persistence
            );
            const n2 = this.caveNoise2.fractal3D(
                (wx + 123.45) * scale, (wy + 456.78) * scale * 1.5, (wz + 789.01) * scale,
                caves.octaves, 1, caves.lacunarity, caves.persistence
            );

            // Use squared sum for interesting cave shapes
            const caveValue = n1 * n1 + n2 * n2;
            return caveValue < (1 - caves.threshold) * 0.5;
        }

        /**
         * Check if position is a river
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {boolean} True if river
         */
        isRiver(wx, wz) {
            const rivers = this.params.params.rivers;
            if (!rivers.enabled) return false;

            const n = this.riverNoise.fractal2D(
                wx * rivers.frequency, wz * rivers.frequency,
                2, 1, 2, 0.5
            );

            // Rivers form along ridges (high absolute noise values)
            return Math.abs(n) > rivers.threshold;
        }

        /**
         * Get river value for rendering (0-1)
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {number} River intensity
         */
        getRiverValue(wx, wz) {
            const rivers = this.params.params.rivers;
            if (!rivers.enabled) return 0;

            const n = this.riverNoise.fractal2D(
                wx * rivers.frequency, wz * rivers.frequency,
                2, 1, 2, 0.5
            );

            const absN = Math.abs(n);
            if (absN > rivers.threshold) {
                return Math.min(1, (absN - rivers.threshold) / (1 - rivers.threshold) * 3);
            }
            return 0;
        }
    }

    /**
     * Create a collapsible section
     * @param {string} title - Section title
     * @param {boolean} collapsed - Initial collapsed state
     * @returns {HTMLElement} Section element
     */
    function createSection(title, collapsed = false) {

        });

    }

    /**
     * Create a slider parameter control
     * @param {string} label - Parameter label
     * @param {number} min - Minimum value
     * @param {number} max - Maximum value
     * @param {number} value - Current value
     * @param {number} step - Step value
     * @param {function(number): void} onChange - Change callback
     * @returns {HTMLElement} Control element
     */
    function createSlider(label, min, max, value, step, onChange) {
        const row = document.createElement('div');
        row.className = 'param-row';

        const labelEl = document.createElement('label');
        labelEl.textContent = label;

        const slider = document.createElement('input');
        slider.type = 'range';
        slider.min = min;
        slider.max = max;
        slider.step = step;
        slider.value = value;

        const numInput = document.createElement('input');
        numInput.type = 'number';
        numInput.min = min;
        numInput.max = max;
        numInput.step = step;
        numInput.value = value;

        // Sync slider and number input
        slider.addEventListener('input', () => {
            numInput.value = slider.value;
            onChange(parseFloat(slider.value));
        });

        numInput.addEventListener('change', () => {
            let val = parseFloat(numInput.value);
            val = Math.max(min, Math.min(max, val));
            numInput.value = val;
            slider.value = val;
            onChange(val);
        });

        row.appendChild(labelEl);
        row.appendChild(slider);
        row.appendChild(numInput);

        // Store reference for external updates
        row.updateValue = (newVal) => {
            slider.value = newVal;
            numInput.value = newVal;
        };

        return row;
    }

    /**
     * Create a number input parameter control
     * @param {string} label - Parameter label
     * @param {number} value - Current value
     * @param {number} min - Minimum value
     * @param {number} max - Maximum value
     * @param {number} step - Step value
     * @param {function(number): void} onChange - Change callback
     * @returns {HTMLElement} Control element
     */
    function createNumberInput(label, value, min, max, step, onChange) {
        const row = document.createElement('div');
        row.className = 'param-row';

        const labelEl = document.createElement('label');
        labelEl.textContent = label;

        const numInput = document.createElement('input');
        numInput.type = 'number';
        numInput.min = min;
        numInput.max = max;
        numInput.step = step;
        numInput.value = value;

        numInput.addEventListener('change', () => {
            let val = parseFloat(numInput.value);
            val = Math.max(min, Math.min(max, val));
            numInput.value = val;
            onChange(val);
        });

        row.appendChild(labelEl);
        row.appendChild(document.createElement('span')); // Empty for grid
        row.appendChild(numInput);

        row.updateValue = (newVal) => {
            numInput.value = newVal;
        };

        return row;
    }

    /**
     * Create a checkbox control
     * @param {string} label - Checkbox label
     * @param {boolean} checked - Initial checked state
     * @param {function(boolean): void} onChange - Change callback
     * @returns {HTMLElement} Control element
     */
    function createCheckbox(label, checked, onChange) {
        const row = document.createElement('div');
        row.className = 'checkbox-row';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = checked;
        checkbox.id = 'cb-' + label.toLowerCase().replace(/\s+/g, '-');

        const labelEl = document.createElement('label');
        labelEl.textContent = label;
        labelEl.htmlFor = checkbox.id;

        row.appendChild(checkbox);
        row.appendChild(labelEl);

        row.updateValue = (newVal) => {
            checkbox.checked = newVal;
        };

        return row;
    }

    /**
     * Create a text input control
     * @param {string} label - Input label
     * @param {string} value - Current value
     * @param {function(string): void} onChange - Change callback
     * @param {boolean} showRandomize - Show randomize button
     * @returns {HTMLElement} Control element
     */
    function createTextInput(label, value, onChange, showRandomize = false) {
        const row = document.createElement('div');
        row.className = 'param-row-full';

        const labelEl = document.createElement('label');
        labelEl.textContent = label;

        const inputRow = document.createElement('div');
        inputRow.className = 'seed-row';

        const textInput = document.createElement('input');
        textInput.type = 'text';
        textInput.value = value;

        textInput.addEventListener('change', () => {
            onChange(textInput.value);
        });

        inputRow.appendChild(textInput);

        if (showRandomize) {
            const randomBtn = document.createElement('button');
            randomBtn.className = 'btn-secondary btn-small';

        row.appendChild(labelEl);
        row.appendChild(inputRow);

        row.updateValue = (newVal) => {
            textInput.value = newVal;
        };

        return row;
    }

    /**
     * Convert hex color to RGB object
     * @param {string} hex - Hex color string
     * @returns {{r: number, g: number, b: number}} RGB object (0-255)
     */
    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : { r: 255, g: 0, b: 255 };
    }

    /**
     * Blend two colors
     * @param {{r: number, g: number, b: number}} c1 - First color
     * @param {{r: number, g: number, b: number}} c2 - Second color
     * @param {number} factor - Blend factor (0-1)
     * @returns {{r: number, g: number, b: number}} Blended color
     */
    function blendColors(c1, c2, factor) {
        return {
            r: Math.round(c1.r * (1 - factor) + c2.r * factor),
            g: Math.round(c1.g * (1 - factor) + c2.g * factor),
            b: Math.round(c1.b * (1 - factor) + c2.b * factor)
        };
    }
