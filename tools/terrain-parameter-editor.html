<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxEx Terrain Parameter Editor</title>
    <style>
        /* ============================================
           CSS RESET & VARIABLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #252540;
            --bg-input: #0f3460;
            --border-color: #0f3460;
            --border-hover: #1a4980;
            --accent: #4ecca3;
            --accent-hover: #3db892;
            --danger: #e94560;
            --danger-hover: #d63050;
            --warning: #f39c12;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --text-muted: #666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* ============================================
           MAIN LAYOUT
           ============================================ */
        .app-container {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 1.4rem;
            color: var(--accent);
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        /* Main Content - Three Columns */
        .main-content {
            display: grid;
            grid-template-columns: 320px 1fr 280px;
            overflow: hidden;
        }

        /* ============================================
           BUTTON STYLES
           ============================================ */
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border-hover);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .btn-small {
            padding: 4px 8px;
            font-size: 0.8rem;
        }

        .btn-icon {
            padding: 6px 10px;
            min-width: 34px;
        }

        /* ============================================
           PARAMETERS PANEL (LEFT)
           ============================================ */
        .params-panel {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 15px;
        }

        .param-section {
            margin-bottom: 15px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--bg-input);
            cursor: pointer;
            user-select: none;
        }

        .section-header:hover {
            background: var(--border-hover);
        }

        .section-title {
            font-size: 0.95rem;
            color: var(--accent);
            font-weight: 600;
        }

        .collapse-icon {
            color: var(--text-secondary);
            transition: transform 0.2s;
            font-size: 0.8rem;
        }

        .param-section.collapsed .collapse-icon {
            transform: rotate(-90deg);
        }

        .param-section.collapsed .section-content {
            display: none;
        }

        .section-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .subsection {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }

        .subsection-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Parameter Controls */
        .param-row {
            display: grid;
            grid-template-columns: 100px 1fr 60px;
            align-items: center;
            gap: 8px;
        }

        .param-row.wide-label {
            grid-template-columns: 120px 1fr 60px;
        }

        .param-row label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .param-row input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .param-row input[type="number"],
        .param-row input[type="text"] {
            width: 100%;
            padding: 6px 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 0.85rem;
            text-align: right;
        }

        .param-row input[type="number"]:focus,
        .param-row input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .param-row-full {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .param-row-full label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .param-row-full input[type="text"] {
            width: 100%;
            padding: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 0.9rem;
            text-align: left;
        }

        .seed-row {
            display: flex;
            gap: 8px;
        }

        .seed-row input {
            flex: 1;
        }

        /* Checkbox styling */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .checkbox-row label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* ============================================
           PREVIEW PANEL (CENTER)
           ============================================ */
        .preview-panel {
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .preview-modes {
            display: flex;
            gap: 5px;
        }

        .preview-modes button {
            padding: 6px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .preview-modes button:hover {
            background: var(--border-hover);
            color: var(--text-primary);
        }

        .preview-modes button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .preview-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .preview-controls label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .preview-controls select {
            padding: 6px 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: #0f0f1a;
        }

        #preview-canvas {
            cursor: grab;
            image-rendering: pixelated;
        }

        #preview-canvas:active {
            cursor: grabbing;
        }

        .preview-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(22, 33, 62, 0.9);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'Consolas', monospace;
        }

        .preview-info span {
            margin-right: 15px;
        }

        .preview-info .label {
            color: var(--text-muted);
        }

        .cursor-info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(22, 33, 62, 0.9);
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'Consolas', monospace;
            min-width: 180px;
        }

        .cursor-info .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .cursor-info .info-row:last-child {
            margin-bottom: 0;
        }

        .cursor-info .label {
            color: var(--text-muted);
        }

        .cursor-info .value {
            color: var(--accent);
        }

        .zoom-controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .zoom-controls button {
            width: 32px;
            height: 32px;
            padding: 0;
            font-size: 1.2rem;
            background: rgba(22, 33, 62, 0.9);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .zoom-controls button:hover {
            background: var(--border-hover);
            color: var(--text-primary);
        }

        /* Y-level slider for cave view */
        .y-level-slider {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: rgba(22, 33, 62, 0.9);
            padding: 10px 8px;
            border-radius: 4px;
        }

        .y-level-slider input[type="range"] {
            writing-mode: vertical-lr;
            direction: rtl;
            height: 200px;
            accent-color: var(--accent);
        }

        .y-level-slider span {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* ============================================
           PRESETS PANEL (RIGHT)
           ============================================ */
        .presets-panel {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .presets-header {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .presets-header h2 {
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .presets-actions {
            display: flex;
            gap: 8px;
        }

        .presets-actions button {
            flex: 1;
        }

        .presets-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .preset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .preset-item:hover {
            background: var(--bg-input);
        }

        .preset-item.active {
            border-left: 3px solid var(--accent);
        }

        .preset-name {
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .preset-type {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .preset-actions {
            display: flex;
            gap: 5px;
        }

        .preset-actions button {
            padding: 4px 8px;
            font-size: 0.75rem;
        }

        /* Export Section */
        .export-section {
            border-top: 1px solid var(--border-color);
            padding: 15px;
        }

        .export-section h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .export-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .json-preview {
            margin-top: 10px;
        }

        .json-preview textarea {
            width: 100%;
            height: 150px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: 'Consolas', monospace;
            font-size: 0.75rem;
            padding: 8px;
            resize: vertical;
        }

        /* ============================================
           BIOME EDITOR
           ============================================ */
        .biome-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .biome-item {
            background: var(--bg-input);
            border-radius: 4px;
            padding: 10px;
            border-left: 4px solid #666;
        }

        .biome-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .biome-header input[type="text"] {
            flex: 1;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .biome-header input[type="color"] {
            width: 32px;
            height: 26px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            padding: 0;
        }

        .biome-ranges {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 0.8rem;
        }

        .biome-range-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .biome-range-row label {
            color: var(--text-muted);
            width: 45px;
        }

        .biome-range-row input {
            width: 45px;
            padding: 3px 4px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            color: var(--text-primary);
            font-size: 0.75rem;
            text-align: center;
        }

        .biome-range-row span {
            color: var(--text-muted);
        }

        .biome-delete {
            padding: 2px 6px;
            font-size: 0.75rem;
        }

        .add-biome-btn {
            margin-top: 8px;
            width: 100%;
        }

        /* Biome threshold chart */
        .biome-chart {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .biome-chart-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        #biome-chart-canvas {
            width: 100%;
            height: 150px;
            border-radius: 4px;
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
        }

        .loading-overlay.visible {
            display: flex;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           TOOLTIP
           ============================================ */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-primary);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 1000;
        }

        .tooltip:hover::after {
            opacity: 1;
        }

        /* ============================================
           SCROLLBAR
           ============================================ */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-input);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }

        /* ============================================
           LAYER TOGGLES
           ============================================ */
        .layer-toggles {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .layer-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .layer-toggle input {
            accent-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>VoxEx Terrain Parameter Editor</h1>
            <div class="header-buttons">
                <button class="btn-secondary" id="btn-randomize-all">Randomize All</button>
                <button class="btn-secondary" id="btn-reset-all">Reset to Defaults</button>
                <button class="btn-primary" id="btn-undo" disabled>Undo</button>
                <button class="btn-primary" id="btn-redo" disabled>Redo</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Parameters Panel (Left) -->
            <aside class="params-panel" id="params-panel">
                <!-- Sections will be generated by JavaScript -->
            </aside>

            <!-- Preview Panel (Center) -->
            <section class="preview-panel">
                <div class="preview-toolbar">
                    <div class="preview-modes">
                        <button class="active" data-mode="heightmap">Heightmap</button>
                        <button data-mode="biome">Biomes</button>
                        <button data-mode="caves">Caves</button>
                        <button data-mode="combined">Combined</button>
                    </div>
                    <div class="preview-controls">
                        <div class="layer-toggles" id="layer-toggles" style="display: none;">
                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-terrain" checked>
                                Terrain
                            </label>
                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-biomes" checked>
                                Biomes
                            </label>
                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-caves" checked>
                                Caves
                            </label>
                            <label class="layer-toggle">
                                <input type="checkbox" id="layer-rivers" checked>
                                Rivers
                            </label>
                        </div>
                        <label>Quality:</label>
                        <select id="preview-quality">
                            <option value="256">Low (256px)</option>
                            <option value="512" selected>Medium (512px)</option>
                            <option value="1024">High (1024px)</option>
                        </select>
                    </div>
                </div>
                <div class="preview-container">
                    <canvas id="preview-canvas" width="512" height="512"></canvas>
                    <div class="cursor-info" id="cursor-info">
                        <div class="info-row">
                            <span class="label">Position:</span>
                            <span class="value" id="cursor-pos">X: 0, Z: 0</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Height:</span>
                            <span class="value" id="cursor-height">--</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Biome:</span>
                            <span class="value" id="cursor-biome">--</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Temp/Humid:</span>
                            <span class="value" id="cursor-climate">--</span>
                        </div>
                    </div>
                    <div class="preview-info">
                        <span><span class="label">Offset:</span> <span id="view-offset">0, 0</span></span>
                        <span><span class="label">Zoom:</span> <span id="view-zoom">1.0x</span></span>
                    </div>
                    <div class="y-level-slider" id="y-level-slider" style="display: none;">
                        <span id="y-level-value">64</span>
                        <input type="range" id="y-level" min="0" max="320" value="64">
                        <span>Y Level</span>
                    </div>
                    <div class="zoom-controls">
                        <button id="zoom-in" class="tooltip" data-tooltip="Zoom In">+</button>
                        <button id="zoom-out" class="tooltip" data-tooltip="Zoom Out">-</button>
                        <button id="zoom-reset" class="tooltip" data-tooltip="Reset View">R</button>
                    </div>
                    <div class="loading-overlay" id="loading-overlay">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </section>

            <!-- Presets Panel (Right) -->
            <aside class="presets-panel">
                <div class="presets-header">
                    <h2>Presets</h2>
                    <div class="presets-actions">
                        <button class="btn-primary btn-small" id="btn-save-preset">Save Preset</button>
                    </div>
                </div>
                <div class="presets-list" id="presets-list">
                    <!-- Presets will be generated by JavaScript -->
                </div>
                <div class="export-section">
                    <h3>Export / Import</h3>
                    <div class="export-actions">
                        <button class="btn-secondary" id="btn-export-json">Export JSON</button>
                        <button class="btn-secondary" id="btn-copy-json">Copy to Clipboard</button>
                        <button class="btn-secondary" id="btn-copy-voxex">Copy for VoxEx</button>
                        <button class="btn-secondary" id="btn-import-json">Import JSON</button>
                        <input type="file" id="import-file" accept=".json" style="display: none;">
                    </div>
                    <div class="json-preview">
                        <textarea id="json-preview" readonly></textarea>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
    // ============================================
    // SEEDED PSEUDO-RANDOM NUMBER GENERATOR
    // ============================================

    /**
     * Mulberry32 PRNG - fast, seedable, good distribution
     * @param {number} seed - Seed value
     * @returns {function(): number} Random number generator function returning 0-1
     */
    function mulberry32(seed) {
        return function() {
            let t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
    }

    /**
     * Convert string seed to numeric seed
     * @param {string|number} seed - Seed input
     * @returns {number} Numeric seed
     */
    function hashSeed(seed) {
        if (typeof seed === 'number') return seed;
        let hash = 0;
        for (let i = 0; i < seed.length; i++) {
            const char = seed.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash;
    }

    // ============================================
    // SEEDED 2D/3D PERLIN NOISE
    // ============================================

    /**
     * Seeded Perlin Noise implementation
     */
    class SeededNoise {
        /**
         * @param {number} seed - Seed for the noise generator
         */
        constructor(seed) {
            this.seed = seed;
            this.permutation = this.generatePermutation(seed);
        }

        /**
         * Generate seeded permutation table using Fisher-Yates shuffle
         * @param {number} seed - Seed value
         * @returns {number[]} Permutation table (512 elements)
         */
        generatePermutation(seed) {
            const rng = mulberry32(seed);
            const p = Array.from({ length: 256 }, (_, i) => i);

            // Fisher-Yates shuffle
            for (let i = 255; i > 0; i--) {
                const j = Math.floor(rng() * (i + 1));
                [p[i], p[j]] = [p[j], p[i]];
            }

            // Double for wrapping
            return [...p, ...p];
        }

        /**
         * Smoothstep fade function
         * @param {number} t - Input value
         * @returns {number} Faded value
         */
        fade(t) {
            return t * t * t * (t * (t * 6 - 15) + 10);
        }

        /**
         * Linear interpolation
         * @param {number} t - Interpolation factor
         * @param {number} a - Start value
         * @param {number} b - End value
         * @returns {number} Interpolated value
         */
        lerp(t, a, b) {
            return a + t * (b - a);
        }

        /**
         * 2D gradient function
         * @param {number} hash - Hash value
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @returns {number} Gradient contribution
         */
        grad2D(hash, x, y) {
            const h = hash & 3;
            const u = h < 2 ? x : y;
            const v = h < 2 ? y : x;
            return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
        }

        /**
         * 3D gradient function
         * @param {number} hash - Hash value
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @param {number} z - Z coordinate
         * @returns {number} Gradient contribution
         */
        grad3D(hash, x, y, z) {
            const h = hash & 15;
            const u = h < 8 ? x : y;
            const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
            return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
        }

        /**
         * 2D Perlin noise
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @returns {number} Noise value (-1 to 1)
         */
        noise2D(x, y) {
            const X = Math.floor(x) & 255;
            const Y = Math.floor(y) & 255;

            x -= Math.floor(x);
            y -= Math.floor(y);

            const u = this.fade(x);
            const v = this.fade(y);

            const p = this.permutation;
            const A = p[X] + Y;
            const B = p[X + 1] + Y;

            return this.lerp(v,
                this.lerp(u, this.grad2D(p[A], x, y), this.grad2D(p[B], x - 1, y)),
                this.lerp(u, this.grad2D(p[A + 1], x, y - 1), this.grad2D(p[B + 1], x - 1, y - 1))
            );
        }

        /**
         * 3D Perlin noise
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @param {number} z - Z coordinate
         * @returns {number} Noise value (-1 to 1)
         */
        noise3D(x, y, z) {
            const X = Math.floor(x) & 255;
            const Y = Math.floor(y) & 255;
            const Z = Math.floor(z) & 255;

            x -= Math.floor(x);
            y -= Math.floor(y);
            z -= Math.floor(z);

            const u = this.fade(x);
            const v = this.fade(y);
            const w = this.fade(z);

            const p = this.permutation;
            const A = p[X] + Y;
            const AA = p[A] + Z;
            const AB = p[A + 1] + Z;
            const B = p[X + 1] + Y;
            const BA = p[B] + Z;
            const BB = p[B + 1] + Z;

            return this.lerp(w,
                this.lerp(v,
                    this.lerp(u, this.grad3D(p[AA], x, y, z), this.grad3D(p[BA], x - 1, y, z)),
                    this.lerp(u, this.grad3D(p[AB], x, y - 1, z), this.grad3D(p[BB], x - 1, y - 1, z))
                ),
                this.lerp(v,
                    this.lerp(u, this.grad3D(p[AA + 1], x, y, z - 1), this.grad3D(p[BA + 1], x - 1, y, z - 1)),
                    this.lerp(u, this.grad3D(p[AB + 1], x, y - 1, z - 1), this.grad3D(p[BB + 1], x - 1, y - 1, z - 1))
                )
            );
        }

        /**
         * Fractal Brownian Motion 2D (multiple octaves)
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @param {number} octaves - Number of octaves
         * @param {number} frequency - Base frequency
         * @param {number} lacunarity - Frequency multiplier per octave
         * @param {number} persistence - Amplitude multiplier per octave
         * @returns {number} Noise value (-1 to 1)
         */
        fractal2D(x, y, octaves, frequency, lacunarity, persistence) {
            let value = 0;
            let amplitude = 1;
            let maxAmplitude = 0;
            let freq = frequency;

            for (let i = 0; i < octaves; i++) {
                value += this.noise2D(x * freq, y * freq) * amplitude;
                maxAmplitude += amplitude;
                amplitude *= persistence;
                freq *= lacunarity;
            }

            return value / maxAmplitude;
        }

        /**
         * Fractal Brownian Motion 3D (multiple octaves)
         * @param {number} x - X coordinate
         * @param {number} y - Y coordinate
         * @param {number} z - Z coordinate
         * @param {number} octaves - Number of octaves
         * @param {number} frequency - Base frequency
         * @param {number} lacunarity - Frequency multiplier per octave
         * @param {number} persistence - Amplitude multiplier per octave
         * @returns {number} Noise value (-1 to 1)
         */
        fractal3D(x, y, z, octaves, frequency, lacunarity, persistence) {
            let value = 0;
            let amplitude = 1;
            let maxAmplitude = 0;
            let freq = frequency;

            for (let i = 0; i < octaves; i++) {
                value += this.noise3D(x * freq, y * freq, z * freq) * amplitude;
                maxAmplitude += amplitude;
                amplitude *= persistence;
                freq *= lacunarity;
            }

            return value / maxAmplitude;
        }
    }

    /**
     * TerrainParams class - holds and manages all terrain parameters
     */
    class TerrainParams {
        constructor() {
            this.params = JSON.parse(JSON.stringify(DEFAULT_PARAMS));
            this.listeners = [];
        }

        /**
         * Get a parameter value by path
         * @param {string} path - Dot-separated path to parameter
         * @returns {*} Parameter value
         */
        get(path) {
            return path.split('.').reduce((obj, key) => obj?.[key], this.params);
        }

        /**
         * Set a parameter value by path
         * @param {string} path - Dot-separated path to parameter
         * @param {*} value - New value
         */
        set(path, value) {
            const keys = path.split('.');
            const lastKey = keys.pop();
            const obj = keys.reduce((o, k) => o[k], this.params);
            obj[lastKey] = value;
            this.notifyListeners(path, value);
        }

        /**
         * Get numeric seed from current seed value
         * @returns {number} Numeric seed
         */
        getNumericSeed() {
            return hashSeed(this.params.seed);
        }

        /**
         * Load parameters from JSON object
         * @param {Object} json - Parameters object
         */
        loadFromJSON(json) {
            this.params = JSON.parse(JSON.stringify(json));
            this.notifyListeners('*', null);
        }

        /**
         * Export parameters to JSON object
         * @returns {Object} Parameters object
         */
        toJSON() {
            return JSON.parse(JSON.stringify(this.params));
        }

        /**
         * Reset to defaults
         */
        reset() {
            this.params = JSON.parse(JSON.stringify(DEFAULT_PARAMS));
            this.notifyListeners('*', null);
        }

        /**
         * Add change listener
         * @param {function(string, *): void} listener - Callback function
         */
        addListener(listener) {
            this.listeners.push(listener);
        }

        /**
         * Remove change listener
         * @param {function(string, *): void} listener - Callback function
         */
        removeListener(listener) {
            const idx = this.listeners.indexOf(listener);
            if (idx !== -1) this.listeners.splice(idx, 1);
        }

        /**
         * Notify all listeners of change
         * @param {string} path - Changed parameter path
         * @param {*} value - New value
         */
        notifyListeners(path, value) {
            this.listeners.forEach(listener => listener(path, value));
        }
    }

    /**
     * TerrainGenerator - generates terrain data from parameters
     */
    class TerrainGenerator {
        /**
         * @param {TerrainParams} params - Terrain parameters
         */
        constructor(params) {
            this.params = params;
            this.updateNoise();

            params.addListener((path) => {
                if (path === 'seed' || path === '*') {
                    this.updateNoise();
                }
            });
        }

        /**
         * Update noise generators when seed changes
         */
        updateNoise() {
            const seed = this.params.getNumericSeed();
            this.terrainNoise = new SeededNoise(seed);
            this.tempNoise = new SeededNoise(seed + 1000);
            this.humidNoise = new SeededNoise(seed + 2000);
            this.caveNoise1 = new SeededNoise(seed + 3000);
            this.caveNoise2 = new SeededNoise(seed + 4000);
            this.riverNoise = new SeededNoise(seed + 5000);
        }

        /**
         * Get terrain height at world coordinates
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {number} Terrain height
         */
        getHeight(wx, wz) {
            const p = this.params.params;
            const noise = p.terrain.noise;

            const n = this.terrainNoise.fractal2D(
                wx, wz,
                noise.octaves,
                noise.frequency,
                noise.lacunarity,
                noise.persistence
            );

            // Get biome and apply height modifier
            const biome = this.getBiome(wx, wz);
            const heightMod = biome ? biome.heightMod : 0;

            return p.terrain.baseHeight + n * p.terrain.heightAmplitude + heightMod;
        }

        /**
         * Get temperature at world coordinates (0-1)
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {number} Temperature value
         */
        getTemperature(wx, wz) {
            const tempNoise = this.params.params.biomes.tempNoise;
            const n = this.tempNoise.fractal2D(
                wx, wz,
                tempNoise.octaves,
                tempNoise.frequency,
                tempNoise.lacunarity,
                tempNoise.persistence
            );
            return (n + 1) / 2; // Map -1..1 to 0..1
        }

        /**
         * Get humidity at world coordinates (0-1)
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {number} Humidity value
         */
        getHumidity(wx, wz) {
            const humidNoise = this.params.params.biomes.humidNoise;
            const n = this.humidNoise.fractal2D(
                wx, wz,
                humidNoise.octaves,
                humidNoise.frequency,
                humidNoise.lacunarity,
                humidNoise.persistence
            );
            return (n + 1) / 2; // Map -1..1 to 0..1
        }

        /**
         * Get biome at world coordinates
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {Object|null} Biome object or null
         */
        getBiome(wx, wz) {
            const temp = this.getTemperature(wx, wz);
            const humid = this.getHumidity(wx, wz);
            const biomes = this.params.params.biomes.types;

            // Find matching biome
            const matches = biomes.filter(b =>
                temp >= b.tempMin && temp <= b.tempMax &&
                humid >= b.humidMin && humid <= b.humidMax
            );

            if (matches.length === 0) {
                // No match - find nearest
                return this.findNearestBiome(temp, humid, biomes);
            }

            if (matches.length === 1) {
                return matches[0];
            }

            // Multiple matches - use smallest range (most specific)
            return matches.reduce((best, b) => {
                const rangeSize = (b.tempMax - b.tempMin) * (b.humidMax - b.humidMin);
                const bestSize = (best.tempMax - best.tempMin) * (best.humidMax - best.humidMin);
                return rangeSize < bestSize ? b : best;
            });
        }

        /**
         * Find nearest biome when no exact match
         * @param {number} temp - Temperature value
         * @param {number} humid - Humidity value
         * @param {Array} biomes - Biome array
         * @returns {Object} Nearest biome
         */
        findNearestBiome(temp, humid, biomes) {
            let nearest = biomes[0];
            let minDist = Infinity;

            for (const b of biomes) {
                const tempCenter = (b.tempMin + b.tempMax) / 2;
                const humidCenter = (b.humidMin + b.humidMax) / 2;
                const dist = Math.sqrt(
                    Math.pow(temp - tempCenter, 2) +
                    Math.pow(humid - humidCenter, 2)
                );
                if (dist < minDist) {
                    minDist = dist;
                    nearest = b;
                }
            }

            return nearest;
        }

        /**
         * Check if position is a cave
         * @param {number} wx - World X
         * @param {number} wy - World Y
         * @param {number} wz - World Z
         * @returns {boolean} True if cave
         */
        isCave(wx, wy, wz) {
            const caves = this.params.params.caves;
            if (!caves.enabled) return false;
            if (wy < caves.minY || wy > caves.maxY) return false;

            const scale = caves.scale;
            const n1 = this.caveNoise1.fractal3D(
                wx * scale, wy * scale * 1.5, wz * scale,
                caves.octaves, 1, caves.lacunarity, caves.persistence
            );
            const n2 = this.caveNoise2.fractal3D(
                (wx + 123.45) * scale, (wy + 456.78) * scale * 1.5, (wz + 789.01) * scale,
                caves.octaves, 1, caves.lacunarity, caves.persistence
            );

            // Use squared sum for interesting cave shapes
            const caveValue = n1 * n1 + n2 * n2;
            return caveValue < (1 - caves.threshold) * 0.5;
        }

        /**
         * Check if position is a river
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {boolean} True if river
         */
        isRiver(wx, wz) {
            const rivers = this.params.params.rivers;
            if (!rivers.enabled) return false;

            const n = this.riverNoise.fractal2D(
                wx * rivers.frequency, wz * rivers.frequency,
                2, 1, 2, 0.5
            );

            // Rivers form along ridges (high absolute noise values)
            return Math.abs(n) > rivers.threshold;
        }

        /**
         * Get river value for rendering (0-1)
         * @param {number} wx - World X
         * @param {number} wz - World Z
         * @returns {number} River intensity
         */
        getRiverValue(wx, wz) {
            const rivers = this.params.params.rivers;
            if (!rivers.enabled) return 0;

            const n = this.riverNoise.fractal2D(
                wx * rivers.frequency, wz * rivers.frequency,
                2, 1, 2, 0.5
            );

            const absN = Math.abs(n);
            if (absN > rivers.threshold) {
                return Math.min(1, (absN - rivers.threshold) / (1 - rivers.threshold) * 3);
            }
            return 0;
        }
    }

    /**

    /**
     * Create a slider parameter control
     * @param {string} label - Parameter label
     * @param {number} min - Minimum value
     * @param {number} max - Maximum value
     * @param {number} value - Current value
     * @param {number} step - Step value
     * @param {function(number): void} onChange - Change callback
     * @returns {HTMLElement} Control element
     */
    function createSlider(label, min, max, value, step, onChange) {
        const row = document.createElement('div');
        row.className = 'param-row';

        const labelEl = document.createElement('label');
        labelEl.textContent = label;

        const slider = document.createElement('input');
        slider.type = 'range';
        slider.min = min;
        slider.max = max;
        slider.step = step;
        slider.value = value;

        const numInput = document.createElement('input');
        numInput.type = 'number';
        numInput.min = min;
        numInput.max = max;
        numInput.step = step;
        numInput.value = value;

        // Sync slider and number input
        slider.addEventListener('input', () => {
            numInput.value = slider.value;
            onChange(parseFloat(slider.value));
        });

        numInput.addEventListener('change', () => {
            let val = parseFloat(numInput.value);
            val = Math.max(min, Math.min(max, val));
            numInput.value = val;
            slider.value = val;
            onChange(val);
        });

        row.appendChild(labelEl);
        row.appendChild(slider);
        row.appendChild(numInput);

        // Store reference for external updates
        row.updateValue = (newVal) => {
            slider.value = newVal;
            numInput.value = newVal;
        };

        return row;
    }

     * @param {boolean} showRandomize - Show randomize button

    function createTextInput(label, value, onChange, showRandomize = false) {

        const labelEl = document.createElement('label');
        labelEl.textContent = label;

            textInput.value = newVal;

        return row;

    /**
     * Convert hex color to RGB object
     * @param {string} hex - Hex color string
     * @returns {{r: number, g: number, b: number}} RGB object (0-255)
     */
    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : { r: 255, g: 0, b: 255 };
    }

    /**
     * Blend two colors
     * @param {{r: number, g: number, b: number}} c1 - First color
     * @param {{r: number, g: number, b: number}} c2 - Second color
     * @param {number} factor - Blend factor (0-1)
     * @returns {{r: number, g: number, b: number}} Blended color
     */
    function blendColors(c1, c2, factor) {
        return {
            r: Math.round(c1.r * (1 - factor) + c2.r * factor),
            g: Math.round(c1.g * (1 - factor) + c2.g * factor),
            b: Math.round(c1.b * (1 - factor) + c2.b * factor)
        };
    }

    // ============================================
    // PREVIEW RENDERER
    // ============================================

    /**
     * PreviewRenderer - handles all preview rendering modes
     */
    class PreviewRenderer {
        /**
         * @param {HTMLCanvasElement} canvas - Preview canvas
         * @param {TerrainGenerator} generator - Terrain generator
         * @param {TerrainParams} params - Terrain parameters
         */
        constructor(canvas, generator, params) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.generator = generator;
            this.params = params;

            this.offsetX = 0;
            this.offsetZ = 0;
            this.zoom = 1;
            this.yLevel = 64;
            this.mode = 'heightmap';

            this.layers = {
                terrain: true,
                biomes: true,
                caves: true,
                rivers: true
            };

            this.renderPending = false;
            this.renderTimeout = null;
        }

        /**
         * Schedule a render with debouncing
         */
        scheduleRender() {
            if (this.renderTimeout) {
                clearTimeout(this.renderTimeout);
            }
            this.renderTimeout = setTimeout(() => {
                this.render();
            }, 100);
        }

        /**
         * Render the preview based on current mode
         */
        render() {
            const loadingOverlay = document.getElementById('loading-overlay');
            loadingOverlay.classList.add('visible');

            // Use requestAnimationFrame for smooth rendering
            requestAnimationFrame(() => {
                switch (this.mode) {
                    case 'heightmap':
                        this.renderHeightmap();
                        break;
                    case 'biome':
                        this.renderBiomeMap();
                        break;
                    case 'caves':
                        this.renderCaveSlice();
                        break;
                    case 'combined':
                        this.renderCombined();
                        break;
                }

                loadingOverlay.classList.remove('visible');
                this.updateViewInfo();
            });
        }

        /**
         * Render heightmap mode
         */
        renderHeightmap() {
            const width = this.canvas.width;
            const height = this.canvas.height;
            const imageData = this.ctx.createImageData(width, height);
            const data = imageData.data;

            const p = this.params.params;
            const seaLevel = p.terrain.seaLevel;

            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const wx = (px - width / 2) / this.zoom + this.offsetX;
                    const wz = (py - height / 2) / this.zoom + this.offsetZ;

                    const h = this.generator.getHeight(wx, wz);

                    // Normalize height to 0-255
                    const normalized = Math.max(0, Math.min(255, (h / 200) * 255));

                    const i = (py * width + px) * 4;

                    if (h < seaLevel) {
                        // Water - blue tint
                        const depth = (seaLevel - h) / seaLevel;
                        data[i] = Math.round(normalized * 0.3);
                        data[i + 1] = Math.round(normalized * 0.5 + 40);
                        data[i + 2] = Math.round(normalized * 0.3 + 150 * (1 - depth * 0.5));
                    } else {
                        // Land - grayscale with green tint
                        data[i] = Math.round(normalized * 0.9);
                        data[i + 1] = normalized;
                        data[i + 2] = Math.round(normalized * 0.8);
                    }
                    data[i + 3] = 255;
                }
            }

            this.ctx.putImageData(imageData, 0, 0);
        }

        /**
         * Render biome map mode
         */
        renderBiomeMap() {
            const width = this.canvas.width;
            const height = this.canvas.height;
            const imageData = this.ctx.createImageData(width, height);
            const data = imageData.data;

            const p = this.params.params;
            const seaLevel = p.terrain.seaLevel;

            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const wx = (px - width / 2) / this.zoom + this.offsetX;
                    const wz = (py - height / 2) / this.zoom + this.offsetZ;

                    const h = this.generator.getHeight(wx, wz);
                    const biome = this.generator.getBiome(wx, wz);
                    const color = hexToRgb(biome ? biome.color : '#ff00ff');

                    // Apply height shading
                    const shade = 0.6 + (h / 200) * 0.4;

                    const i = (py * width + px) * 4;

                    if (h < seaLevel) {
                        // Water overlay
                        data[i] = Math.round(color.r * shade * 0.3 + 30);
                        data[i + 1] = Math.round(color.g * shade * 0.4 + 60);
                        data[i + 2] = Math.round(color.b * shade * 0.3 + 150);
                    } else {
                        data[i] = Math.round(color.r * shade);
                        data[i + 1] = Math.round(color.g * shade);
                        data[i + 2] = Math.round(color.b * shade);
                    }
                    data[i + 3] = 255;
                }
            }

            this.ctx.putImageData(imageData, 0, 0);
        }

        /**
         * Render cave slice mode
         */
        renderCaveSlice() {
            const width = this.canvas.width;
            const height = this.canvas.height;
            const imageData = this.ctx.createImageData(width, height);
            const data = imageData.data;

            const caves = this.params.params.caves;

            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const wx = (px - width / 2) / this.zoom + this.offsetX;
                    const wz = (py - height / 2) / this.zoom + this.offsetZ;

                    const i = (py * width + px) * 4;

                    // Check if Y is in cave range
                    if (this.yLevel < caves.minY || this.yLevel > caves.maxY || !caves.enabled) {
                        // Outside cave range - solid stone
                        data[i] = 60;
                        data[i + 1] = 60;
                        data[i + 2] = 70;
                    } else {
                        const isCave = this.generator.isCave(wx, this.yLevel, wz);

                        if (isCave) {
                            if (this.yLevel <= caves.lavaLevel) {
                                // Lava
                                data[i] = 255;
                                data[i + 1] = 100;
                                data[i + 2] = 30;
                            } else {
                                // Cave - dark
                                data[i] = 20;
                                data[i + 1] = 20;
                                data[i + 2] = 25;
                            }
                        } else {
                            // Solid - medium gray
                            data[i] = 80;
                            data[i + 1] = 80;
                            data[i + 2] = 90;
                        }
                    }
                    data[i + 3] = 255;
                }
            }

            this.ctx.putImageData(imageData, 0, 0);
        }

        /**
         * Render combined mode with all layers
         */
        renderCombined() {
            const width = this.canvas.width;
            const height = this.canvas.height;
            const imageData = this.ctx.createImageData(width, height);
            const data = imageData.data;

            const p = this.params.params;
            const seaLevel = p.terrain.seaLevel;

            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const wx = (px - width / 2) / this.zoom + this.offsetX;
                    const wz = (py - height / 2) / this.zoom + this.offsetZ;

                    let r, g, b;

                    // Base terrain height
                    const h = this.layers.terrain ? this.generator.getHeight(wx, wz) : p.terrain.baseHeight;
                    const shade = 0.5 + (h / 200) * 0.5;

                    if (this.layers.biomes) {
                        // Use biome color
                        const biome = this.generator.getBiome(wx, wz);
                        const color = hexToRgb(biome ? biome.color : '#808080');
                        r = color.r * shade;
                        g = color.g * shade;
                        b = color.b * shade;
                    } else {
                        // Grayscale terrain
                        r = g = b = (h / 200) * 255;
                    }

                    // Water
                    if (h < seaLevel) {
                        const waterBlend = Math.min(1, (seaLevel - h) / 20);
                        r = r * (1 - waterBlend) + 40 * waterBlend;
                        g = g * (1 - waterBlend) + 80 * waterBlend;
                        b = b * (1 - waterBlend) + 180 * waterBlend;
                    }

                    // River overlay
                    if (this.layers.rivers && h >= seaLevel) {
                        const riverVal = this.generator.getRiverValue(wx, wz);
                        if (riverVal > 0) {
                            r = r * (1 - riverVal) + 50 * riverVal;
                            g = g * (1 - riverVal) + 100 * riverVal;
                            b = b * (1 - riverVal) + 200 * riverVal;
                        }
                    }

                    // Cave entrance overlay
                    if (this.layers.caves && h >= seaLevel) {
                        const surfaceY = Math.floor(h);
                        if (this.generator.isCave(wx, surfaceY - 1, wz)) {
                            r *= 0.4;
                            g *= 0.4;
                            b *= 0.4;
                        }
                    }

                    const i = (py * width + px) * 4;
                    data[i] = Math.round(Math.max(0, Math.min(255, r)));
                    data[i + 1] = Math.round(Math.max(0, Math.min(255, g)));
                    data[i + 2] = Math.round(Math.max(0, Math.min(255, b)));
                    data[i + 3] = 255;
                }
            }

            this.ctx.putImageData(imageData, 0, 0);
        }

        /**
         * Update view info display
         */
        updateViewInfo() {
            document.getElementById('view-offset').textContent =
                `${Math.round(this.offsetX)}, ${Math.round(this.offsetZ)}`;
            document.getElementById('view-zoom').textContent =
                `${this.zoom.toFixed(1)}x`;
        }

        /**
         * Get terrain info at pixel coordinates
         * @param {number} px - Pixel X
         * @param {number} py - Pixel Y
         * @returns {Object} Terrain info
         */
        getInfoAt(px, py) {
            const width = this.canvas.width;
            const height = this.canvas.height;

            const wx = (px - width / 2) / this.zoom + this.offsetX;
            const wz = (py - height / 2) / this.zoom + this.offsetZ;

            const h = this.generator.getHeight(wx, wz);
            const biome = this.generator.getBiome(wx, wz);
            const temp = this.generator.getTemperature(wx, wz);
            const humid = this.generator.getHumidity(wx, wz);

            return {
                x: Math.round(wx),
                z: Math.round(wz),
                height: h.toFixed(1),
                biome: biome ? biome.id : 'unknown',
                temperature: temp.toFixed(2),
                humidity: humid.toFixed(2)
            };
        }

        /**
         * Pan the view
         * @param {number} dx - Delta X in pixels
         * @param {number} dy - Delta Y in pixels
         */
        pan(dx, dy) {
            this.offsetX -= dx / this.zoom;
            this.offsetZ -= dy / this.zoom;
            this.scheduleRender();
        }

        /**
         * Zoom the view
         * @param {number} factor - Zoom factor (> 1 to zoom in)
         * @param {number} centerX - Center X in pixels
         * @param {number} centerY - Center Y in pixels
         */
        zoomAt(factor, centerX, centerY) {
            const width = this.canvas.width;
            const height = this.canvas.height;

            // World coords at center before zoom
            const wxBefore = (centerX - width / 2) / this.zoom + this.offsetX;
            const wzBefore = (centerY - height / 2) / this.zoom + this.offsetZ;

            // Apply zoom
            this.zoom = Math.max(0.1, Math.min(10, this.zoom * factor));

            // World coords at center after zoom
            const wxAfter = (centerX - width / 2) / this.zoom + this.offsetX;
            const wzAfter = (centerY - height / 2) / this.zoom + this.offsetZ;

            // Adjust offset to keep center fixed
            this.offsetX += wxBefore - wxAfter;
            this.offsetZ += wzBefore - wzAfter;

            this.scheduleRender();
        }

        /**
         * Reset view to origin
         */
        resetView() {
            this.offsetX = 0;
            this.offsetZ = 0;
            this.zoom = 1;
            this.scheduleRender();
        }

        /**
         * Set preview mode
         * @param {string} mode - 'heightmap', 'biome', 'caves', or 'combined'
         */
        setMode(mode) {
            this.mode = mode;
            this.scheduleRender();
        }

        /**
         * Set Y level for cave slice
         * @param {number} y - Y level
         */
        setYLevel(y) {
            this.yLevel = y;
            if (this.mode === 'caves') {
                this.scheduleRender();
            }
        }

        /**
         * Set canvas size
         * @param {number} size - Canvas size in pixels
         */
        setSize(size) {
            this.canvas.width = size;
            this.canvas.height = size;
            this.scheduleRender();
        }

        /**
         * Set layer visibility
         * @param {string} layer - Layer name
         * @param {boolean} visible - Visibility
         */
        setLayerVisible(layer, visible) {
            this.layers[layer] = visible;
            if (this.mode === 'combined') {
                this.scheduleRender();
            }
        }
    }

    // UNDO/REDO SYSTEM
    // ============================================

    /**
     * History manager for undo/redo
     */
    class HistoryManager {
        constructor(maxStates = 20) {
            this.states = [];
            this.currentIndex = -1;
            this.maxStates = maxStates;
            this.isRestoring = false;
        }

        /**
         * Push a new state
         * @param {Object} state - State to save
         */
        push(state) {
            if (this.isRestoring) return;

            // Remove any states after current index
            this.states = this.states.slice(0, this.currentIndex + 1);

            // Add new state
            this.states.push(JSON.stringify(state));

            // Trim to max size
            if (this.states.length > this.maxStates) {
                this.states.shift();
            }

            this.currentIndex = this.states.length - 1;
            this.updateButtons();
        }

        /**
         * Undo to previous state
         * @returns {Object|null} Previous state or null
         */
        undo() {
            if (this.currentIndex <= 0) return null;
            this.currentIndex--;
            this.updateButtons();
            return JSON.parse(this.states[this.currentIndex]);
        }

        /**
         * Redo to next state
         * @returns {Object|null} Next state or null
         */
        redo() {
            if (this.currentIndex >= this.states.length - 1) return null;
            this.currentIndex++;
            this.updateButtons();
            return JSON.parse(this.states[this.currentIndex]);
        }

        /**
         * Check if can undo
         * @returns {boolean}
         */
        canUndo() {
            return this.currentIndex > 0;
        }

        /**
         * Check if can redo
         * @returns {boolean}
         */
        canRedo() {
            return this.currentIndex < this.states.length - 1;
        }

        /**
         * Update undo/redo buttons
         */
        updateButtons() {
            document.getElementById('btn-undo').disabled = !this.canUndo();
            document.getElementById('btn-redo').disabled = !this.canRedo();
        }
    }

    /**
     * Preset manager class
     */
    class PresetManager {
        constructor(params) {
            this.params = params;
            this.userPresets = this.loadUserPresets();
        }

        /**
         * Load user presets from localStorage
         * @returns {Object} User presets
         */
        loadUserPresets() {
            try {
                const saved = localStorage.getItem('voxex_terrain_presets');
                return saved ? JSON.parse(saved) : {};
            } catch (e) {
                return {};
            }
        }

        /**
         * Save user presets to localStorage
         */
        saveUserPresets() {
            try {
                localStorage.setItem('voxex_terrain_presets', JSON.stringify(this.userPresets));
            } catch (e) {
                console.error('Failed to save presets:', e);
            }
        }

        /**
         * Get all presets (default + user)
         * @returns {Object} All presets
         */
        getAllPresets() {
            return { ...DEFAULT_PRESETS, ...this.userPresets };
        }

        /**
         * Check if preset is user-defined
         * @param {string} name - Preset name
         * @returns {boolean}
         */
        isUserPreset(name) {
            return name in this.userPresets;
        }

        /**
         * Save current params as preset
         * @param {string} name - Preset name
         */
        savePreset(name) {
            this.userPresets[name] = this.params.toJSON();
            this.saveUserPresets();
        }

        /**
         * Delete a user preset
         * @param {string} name - Preset name
         * @returns {boolean} True if deleted
         */
        deletePreset(name) {
            if (this.isUserPreset(name)) {
                delete this.userPresets[name];
                this.saveUserPresets();
                return true;
            }
            return false;
        }

        /**
         * Load a preset
         * @param {string} name - Preset name
         * @returns {boolean} True if loaded
         */
        loadPreset(name) {
            const allPresets = this.getAllPresets();
            if (name in allPresets) {
                this.params.loadFromJSON(allPresets[name]);
                return true;
            }
            return false;
        }
    }

    /**
     * Create biome editor UI
     * @param {TerrainParams} params - Terrain parameters
     * @param {function} onUpdate - Update callback
     * @returns {HTMLElement} Biome editor element
     */
    function createBiomeEditor(params, onUpdate) {
        const container = document.createElement('div');
        container.className = 'biome-list';

        function renderBiomes() {
            container.innerHTML = '';
            const biomes = params.params.biomes.types;

            biomes.forEach((biome, index) => {
                const item = document.createElement('div');
                item.className = 'biome-item';
                item.style.borderLeftColor = biome.color;

                item.innerHTML = `
                    <div class="biome-header">
                        <input type="text" value="${biome.id}" class="biome-name" data-field="id">
                        <input type="color" value="${biome.color}" class="biome-color" data-field="color">
                        <button class="btn-danger btn-small biome-delete" ${biomes.length <= 1 ? 'disabled' : ''}>X</button>
                    </div>
                    <div class="biome-ranges">
                        <div class="biome-range-row">
                            <label>Temp:</label>
                            <input type="number" value="${biome.tempMin}" step="0.05" min="0" max="1" data-field="tempMin">
                            <span>-</span>
                            <input type="number" value="${biome.tempMax}" step="0.05" min="0" max="1" data-field="tempMax">
                        </div>
                        <div class="biome-range-row">
                            <label>Humid:</label>
                            <input type="number" value="${biome.humidMin}" step="0.05" min="0" max="1" data-field="humidMin">
                            <span>-</span>
                            <input type="number" value="${biome.humidMax}" step="0.05" min="0" max="1" data-field="humidMax">
                        </div>
                        <div class="biome-range-row" style="grid-column: span 2;">
                            <label>Height Mod:</label>
                            <input type="number" value="${biome.heightMod}" step="1" min="-32" max="64" data-field="heightMod" style="width: 60px;">
                        </div>
                    </div>
                `;

                // Event listeners
                item.querySelectorAll('input').forEach(input => {
                    input.addEventListener('change', () => {
                        const field = input.dataset.field;
                        let value = input.value;

                        if (field !== 'id' && field !== 'color') {
                            value = parseFloat(value);
                        }

                        biome[field] = value;

                        if (field === 'color') {
                            item.style.borderLeftColor = value;
                        }

                        onUpdate();
                    });
                });

                item.querySelector('.biome-delete').addEventListener('click', () => {
                    if (biomes.length > 1) {
                        params.params.biomes.types.splice(index, 1);
                        renderBiomes();
                        onUpdate();
                    }
                });

                container.appendChild(item);
            });

            // Add biome button
            if (biomes.length < 12) {
                const addBtn = document.createElement('button');
                addBtn.className = 'btn-secondary btn-small add-biome-btn';
                addBtn.textContent = '+ Add Biome';
                addBtn.addEventListener('click', () => {
                    params.params.biomes.types.push({
                        id: 'new_biome',
                        color: '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'),
                        tempMin: 0,
                        tempMax: 1,
                        humidMin: 0,
                        humidMax: 1,
                        heightMod: 0
                    });
                    renderBiomes();
                    onUpdate();
                });
                container.appendChild(addBtn);
            }
        }

        renderBiomes();

        // Return both container and refresh function
        container.refresh = renderBiomes;
        return container;
    }

    /**
     * Create biome threshold chart
     * @param {TerrainParams} params - Terrain parameters
     * @returns {HTMLCanvasElement} Chart canvas
     */
    function createBiomeChart(params) {
        const canvas = document.createElement('canvas');
        canvas.id = 'biome-chart-canvas';
        canvas.width = 200;
        canvas.height = 150;

        function render() {
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const biomes = params.params.biomes.types;

            ctx.fillStyle = '#252540';
            ctx.fillRect(0, 0, width, height);

            // Render each cell
            const cellSize = 10;
            for (let tx = 0; tx < width; tx += cellSize) {
                for (let ty = 0; ty < height; ty += cellSize) {
                    const temp = tx / width;
                    const humid = 1 - ty / height;

                    // Find matching biome
                    let matchedBiome = null;
                    for (const b of biomes) {
                        if (temp >= b.tempMin && temp <= b.tempMax &&
                            humid >= b.humidMin && humid <= b.humidMax) {
                            matchedBiome = b;
                            break;
                        }
                    }

                    ctx.fillStyle = matchedBiome ? matchedBiome.color : '#333';
                    ctx.fillRect(tx, ty, cellSize - 1, cellSize - 1);
                }
            }

            // Axis labels
            ctx.fillStyle = '#666';
            ctx.font = '10px sans-serif';
            ctx.fillText('Cold', 2, height - 2);
            ctx.fillText('Hot', width - 20, height - 2);
            ctx.save();
            ctx.translate(10, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('Humid', -20, 0);
            ctx.restore();
        }

        render();
        canvas.refresh = render;
        return canvas;
    }
