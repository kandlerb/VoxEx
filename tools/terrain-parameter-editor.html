     * Main application class
     */
    class TerrainEditor {
        constructor() {
            this.params = new TerrainParams();
            this.generator = new TerrainGenerator(this.params);
            this.history = new HistoryManager();
            this.presets = new PresetManager(this.params);

            this.canvas = document.getElementById('preview-canvas');
            this.renderer = new PreviewRenderer(this.canvas, this.generator, this.params);

            this.uiControls = {};
            this.biomeEditor = null;
            this.biomeChart = null;

            this.init();
        }

        /**
         * Initialize the application
         */
        init() {
            this.buildUI();
            this.setupEventListeners();
            this.loadAutoSave();
            this.history.push(this.params.toJSON());
            this.renderer.render();
            this.updatePresetsUI();
            this.updateJSONPreview();
        }

        /**
         * Build the parameter UI
         */
        buildUI() {
            const paramsPanel = document.getElementById('params-panel');

            // === SEED SECTION ===
            const seedSection = createSection('Seed');
            const seedContent = seedSection.querySelector('.section-content');

            const seedInput = createTextInput('World Seed', this.params.params.seed, (val) => {
                this.params.set('seed', val);
                this.onParamChange();
            }, true);
            this.uiControls.seed = seedInput;
            seedContent.appendChild(seedInput);

            paramsPanel.appendChild(seedSection);

            // === TERRAIN SECTION ===
            const terrainSection = createSection('Terrain');
            const terrainContent = terrainSection.querySelector('.section-content');

            const seaLevelSlider = createSlider('Sea Level', 0, 128, this.params.params.terrain.seaLevel, 1, (val) => {
                this.params.set('terrain.seaLevel', val);
                this.onParamChange();
            });
            this.uiControls['terrain.seaLevel'] = seaLevelSlider;
            terrainContent.appendChild(seaLevelSlider);

            const baseHeightSlider = createSlider('Base Height', 32, 128, this.params.params.terrain.baseHeight, 1, (val) => {
                this.params.set('terrain.baseHeight', val);
                this.onParamChange();
            });
            this.uiControls['terrain.baseHeight'] = baseHeightSlider;
            terrainContent.appendChild(baseHeightSlider);

            const amplitudeSlider = createSlider('Amplitude', 8, 96, this.params.params.terrain.heightAmplitude, 1, (val) => {
                this.params.set('terrain.heightAmplitude', val);
                this.onParamChange();
            });
            this.uiControls['terrain.heightAmplitude'] = amplitudeSlider;
            terrainContent.appendChild(amplitudeSlider);

            // Noise subsection
            const noiseSubsection = createSubsection('Noise Settings');

            const octavesSlider = createSlider('Octaves', 1, 8, this.params.params.terrain.noise.octaves, 1, (val) => {
                this.params.set('terrain.noise.octaves', val);
                this.onParamChange();
            });
            this.uiControls['terrain.noise.octaves'] = octavesSlider;
            noiseSubsection.appendChild(octavesSlider);

            const freqSlider = createSlider('Frequency', 0.001, 0.05, this.params.params.terrain.noise.frequency, 0.001, (val) => {
                this.params.set('terrain.noise.frequency', val);
                this.onParamChange();
            });
            this.uiControls['terrain.noise.frequency'] = freqSlider;
            noiseSubsection.appendChild(freqSlider);

            const lacunaritySlider = createSlider('Lacunarity', 1.0, 4.0, this.params.params.terrain.noise.lacunarity, 0.1, (val) => {
                this.params.set('terrain.noise.lacunarity', val);
                this.onParamChange();
            });
            this.uiControls['terrain.noise.lacunarity'] = lacunaritySlider;
            noiseSubsection.appendChild(lacunaritySlider);

            const persistenceSlider = createSlider('Persistence', 0.1, 0.9, this.params.params.terrain.noise.persistence, 0.05, (val) => {
                this.params.set('terrain.noise.persistence', val);
                this.onParamChange();
            });
            this.uiControls['terrain.noise.persistence'] = persistenceSlider;
            noiseSubsection.appendChild(persistenceSlider);

            terrainContent.appendChild(noiseSubsection);
            paramsPanel.appendChild(terrainSection);

            // === BIOMES SECTION ===
            const biomesSection = createSection('Biomes');
            const biomesContent = biomesSection.querySelector('.section-content');

            // Temperature noise
            const tempSubsection = createSubsection('Temperature Noise');

            const tempOctaves = createSlider('Octaves', 1, 4, this.params.params.biomes.tempNoise.octaves, 1, (val) => {
                this.params.set('biomes.tempNoise.octaves', val);
                this.onParamChange();
            });
            this.uiControls['biomes.tempNoise.octaves'] = tempOctaves;
            tempSubsection.appendChild(tempOctaves);

            const tempFreq = createSlider('Frequency', 0.001, 0.02, this.params.params.biomes.tempNoise.frequency, 0.001, (val) => {
                this.params.set('biomes.tempNoise.frequency', val);
                this.onParamChange();
            });
            this.uiControls['biomes.tempNoise.frequency'] = tempFreq;
            tempSubsection.appendChild(tempFreq);

            biomesContent.appendChild(tempSubsection);

            // Humidity noise
            const humidSubsection = createSubsection('Humidity Noise');

            const humidOctaves = createSlider('Octaves', 1, 4, this.params.params.biomes.humidNoise.octaves, 1, (val) => {
                this.params.set('biomes.humidNoise.octaves', val);
                this.onParamChange();
            });
            this.uiControls['biomes.humidNoise.octaves'] = humidOctaves;
            humidSubsection.appendChild(humidOctaves);

            const humidFreq = createSlider('Frequency', 0.001, 0.02, this.params.params.biomes.humidNoise.frequency, 0.001, (val) => {
                this.params.set('biomes.humidNoise.frequency', val);
                this.onParamChange();
            });
            this.uiControls['biomes.humidNoise.frequency'] = humidFreq;
            humidSubsection.appendChild(humidFreq);

            biomesContent.appendChild(humidSubsection);

            // Biome types
            const typesSubsection = createSubsection('Biome Types');
            this.biomeEditor = createBiomeEditor(this.params, () => this.onParamChange());
            typesSubsection.appendChild(this.biomeEditor);

            // Biome chart
            const chartDiv = document.createElement('div');
            chartDiv.className = 'biome-chart';
            chartDiv.innerHTML = '<div class="biome-chart-title">Temperature vs Humidity Map</div>';
            this.biomeChart = createBiomeChart(this.params);
            chartDiv.appendChild(this.biomeChart);
            typesSubsection.appendChild(chartDiv);

            biomesContent.appendChild(typesSubsection);
            paramsPanel.appendChild(biomesSection);

            // === CAVES SECTION ===
            const cavesSection = createSection('Caves');
            const cavesContent = cavesSection.querySelector('.section-content');

            const cavesEnabled = createCheckbox('Enabled', this.params.params.caves.enabled, (val) => {
                this.params.set('caves.enabled', val);
                this.onParamChange();
            });
            this.uiControls['caves.enabled'] = cavesEnabled;
            cavesContent.appendChild(cavesEnabled);

            const caveThreshold = createSlider('Threshold', 0.3, 0.7, this.params.params.caves.threshold, 0.01, (val) => {
                this.params.set('caves.threshold', val);
                this.onParamChange();
            });
            this.uiControls['caves.threshold'] = caveThreshold;
            cavesContent.appendChild(caveThreshold);

            const caveScale = createSlider('Scale', 0.02, 0.15, this.params.params.caves.scale, 0.005, (val) => {
                this.params.set('caves.scale', val);
                this.onParamChange();
            });
            this.uiControls['caves.scale'] = caveScale;
            cavesContent.appendChild(caveScale);

            const caveOctaves = createSlider('Octaves', 1, 4, this.params.params.caves.octaves, 1, (val) => {
                this.params.set('caves.octaves', val);
                this.onParamChange();
            });
            this.uiControls['caves.octaves'] = caveOctaves;
            cavesContent.appendChild(caveOctaves);

            const caveMinY = createSlider('Min Y', 0, 64, this.params.params.caves.minY, 1, (val) => {
                this.params.set('caves.minY', val);
                this.onParamChange();
            });
            this.uiControls['caves.minY'] = caveMinY;
            cavesContent.appendChild(caveMinY);

            const caveMaxY = createSlider('Max Y', 64, 256, this.params.params.caves.maxY, 1, (val) => {
                this.params.set('caves.maxY', val);
                this.onParamChange();
            });
            this.uiControls['caves.maxY'] = caveMaxY;
            cavesContent.appendChild(caveMaxY);

            const caveLava = createSlider('Lava Level', 0, 32, this.params.params.caves.lavaLevel, 1, (val) => {
                this.params.set('caves.lavaLevel', val);
                this.onParamChange();
            });
            this.uiControls['caves.lavaLevel'] = caveLava;
            cavesContent.appendChild(caveLava);

            paramsPanel.appendChild(cavesSection);

            // === RIVERS SECTION ===
            const riversSection = createSection('Rivers');
            const riversContent = riversSection.querySelector('.section-content');

            const riversEnabled = createCheckbox('Enabled', this.params.params.rivers.enabled, (val) => {
                this.params.set('rivers.enabled', val);
                this.onParamChange();
            });
            this.uiControls['rivers.enabled'] = riversEnabled;
            riversContent.appendChild(riversEnabled);

            const riverThreshold = createSlider('Threshold', 0.85, 0.98, this.params.params.rivers.threshold, 0.01, (val) => {
                this.params.set('rivers.threshold', val);
                this.onParamChange();
            });
            this.uiControls['rivers.threshold'] = riverThreshold;
            riversContent.appendChild(riverThreshold);

            const riverFreq = createSlider('Frequency', 0.001, 0.01, this.params.params.rivers.frequency, 0.001, (val) => {
                this.params.set('rivers.frequency', val);
                this.onParamChange();
            });
            this.uiControls['rivers.frequency'] = riverFreq;
            riversContent.appendChild(riverFreq);

            const riverWidth = createSlider('Width', 1, 8, this.params.params.rivers.width, 1, (val) => {
                this.params.set('rivers.width', val);
                this.onParamChange();
            });
            this.uiControls['rivers.width'] = riverWidth;
            riversContent.appendChild(riverWidth);

            const riverDepth = createSlider('Depth', 2, 16, this.params.params.rivers.depth, 1, (val) => {
                this.params.set('rivers.depth', val);
                this.onParamChange();
            });
            this.uiControls['rivers.depth'] = riverDepth;
            riversContent.appendChild(riverDepth);

            paramsPanel.appendChild(riversSection);
        }

        /**
         * Setup event listeners
         */
        setupEventListeners() {
            // Preview mode buttons
            document.querySelectorAll('.preview-modes button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.preview-modes button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const mode = btn.dataset.mode;
                    this.renderer.setMode(mode);

                    // Show/hide Y level slider
                    document.getElementById('y-level-slider').style.display = mode === 'caves' ? 'flex' : 'none';

                    // Show/hide layer toggles
                    document.getElementById('layer-toggles').style.display = mode === 'combined' ? 'flex' : 'none';
                });
            });

            // Y level slider
            const yLevelSlider = document.getElementById('y-level');
            const yLevelValue = document.getElementById('y-level-value');
            yLevelSlider.addEventListener('input', () => {
                yLevelValue.textContent = yLevelSlider.value;
                this.renderer.setYLevel(parseInt(yLevelSlider.value));
            });

            // Quality selector
            document.getElementById('preview-quality').addEventListener('change', (e) => {
                this.renderer.setSize(parseInt(e.target.value));
            });

            // Layer toggles
            ['terrain', 'biomes', 'caves', 'rivers'].forEach(layer => {
                document.getElementById(`layer-${layer}`).addEventListener('change', (e) => {
                    this.renderer.setLayerVisible(layer, e.target.checked);
                });
            });

            // Zoom controls
            document.getElementById('zoom-in').addEventListener('click', () => {
                this.renderer.zoomAt(1.5, this.canvas.width / 2, this.canvas.height / 2);
            });

            document.getElementById('zoom-out').addEventListener('click', () => {
                this.renderer.zoomAt(0.67, this.canvas.width / 2, this.canvas.height / 2);
            });

            document.getElementById('zoom-reset').addEventListener('click', () => {
                this.renderer.resetView();
            });

            // Canvas pan/zoom
            let isDragging = false;
            let lastX, lastY;

            this.canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastX = e.clientX;
                lastY = e.clientY;
            });

            window.addEventListener('mousemove', (e) => {
                // Update cursor info
                const rect = this.canvas.getBoundingClientRect();
                const px = e.clientX - rect.left;
                const py = e.clientY - rect.top;

                if (px >= 0 && px < this.canvas.width && py >= 0 && py < this.canvas.height) {
                    const info = this.renderer.getInfoAt(px, py);
                    document.getElementById('cursor-pos').textContent = `X: ${info.x}, Z: ${info.z}`;
                    document.getElementById('cursor-height').textContent = info.height;
                    document.getElementById('cursor-biome').textContent = info.biome;
                    document.getElementById('cursor-climate').textContent = `${info.temperature} / ${info.humidity}`;
                }

                // Pan
                if (isDragging) {
                    const dx = e.clientX - lastX;
                    const dy = e.clientY - lastY;
                    this.renderer.pan(dx, dy);
                    lastX = e.clientX;
                    lastY = e.clientY;
                }
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
            });

            this.canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const factor = e.deltaY < 0 ? 1.2 : 0.83;
                this.renderer.zoomAt(factor, x, y);
            });

            // Header buttons
            document.getElementById('btn-randomize-all').addEventListener('click', () => {
                this.randomizeAll();
            });

            document.getElementById('btn-reset-all').addEventListener('click', () => {
                this.params.reset();
                this.updateAllUI();
                this.onParamChange();
            });

            document.getElementById('btn-undo').addEventListener('click', () => {
                const state = this.history.undo();
                if (state) {
                    this.history.isRestoring = true;
                    this.params.loadFromJSON(state);
                    this.updateAllUI();
                    this.renderer.scheduleRender();
                    this.updateJSONPreview();
                    this.history.isRestoring = false;
                }
            });

            document.getElementById('btn-redo').addEventListener('click', () => {
                const state = this.history.redo();
                if (state) {
                    this.history.isRestoring = true;
                    this.params.loadFromJSON(state);
                    this.updateAllUI();
                    this.renderer.scheduleRender();
                    this.updateJSONPreview();
                    this.history.isRestoring = false;
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'z') {
                        e.preventDefault();
                        document.getElementById('btn-undo').click();
                    } else if (e.key === 'y') {
                        e.preventDefault();
                        document.getElementById('btn-redo').click();
                    }
                }
            });

            // Preset buttons
            document.getElementById('btn-save-preset').addEventListener('click', () => {
                const name = prompt('Enter preset name:');
                if (name && name.trim()) {
                    this.presets.savePreset(name.trim());
                    this.updatePresetsUI();
                }
            });

            // Export/Import buttons
            document.getElementById('btn-export-json').addEventListener('click', () => {
                this.exportJSON();
            });

            document.getElementById('btn-copy-json').addEventListener('click', () => {
                this.copyToClipboard(JSON.stringify(this.params.toJSON(), null, 2));
            });

            document.getElementById('btn-copy-voxex').addEventListener('click', () => {
                const json = JSON.stringify(this.params.toJSON(), null, 2);
                this.copyToClipboard(`const TERRAIN_PARAMS = ${json};`);
            });

            document.getElementById('btn-import-json').addEventListener('click', () => {
                document.getElementById('import-file').click();
            });

            document.getElementById('import-file').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    this.importJSON(file);
                }
                e.target.value = '';
            });
        }

        /**
         * Handle parameter change
         */
        onParamChange() {
            this.generator.updateNoise();
            this.renderer.scheduleRender();
            this.history.push(this.params.toJSON());
            this.autoSave();
            this.updateJSONPreview();

            if (this.biomeChart) {
                this.biomeChart.refresh();
            }
        }

        /**
         * Update all UI controls from current params
         */
        updateAllUI() {
            // Update simple controls
            Object.entries(this.uiControls).forEach(([path, control]) => {
                if (control.updateValue) {
                    const value = this.params.get(path);
                    control.updateValue(value);
                }
            });

            // Update biome editor
            if (this.biomeEditor && this.biomeEditor.refresh) {
                this.biomeEditor.refresh();
            }

            // Update biome chart
            if (this.biomeChart && this.biomeChart.refresh) {
                this.biomeChart.refresh();
            }
        }

        /**
         * Update presets UI
         */
        updatePresetsUI() {
            const list = document.getElementById('presets-list');
            list.innerHTML = '';

            const allPresets = this.presets.getAllPresets();

            Object.keys(allPresets).forEach(name => {
                const item = document.createElement('div');
                item.className = 'preset-item';

                const isUser = this.presets.isUserPreset(name);

                item.innerHTML = `
                    <div>
                        <div class="preset-name">${name}</div>
                        <div class="preset-type">${isUser ? 'User' : 'Default'}</div>
                    </div>
                    <div class="preset-actions">
                        <button class="btn-primary btn-small preset-load">Load</button>
                        ${isUser ? '<button class="btn-danger btn-small preset-delete">Del</button>' : ''}
                    </div>
                `;

                item.querySelector('.preset-load').addEventListener('click', () => {
                    this.presets.loadPreset(name);
                    this.updateAllUI();
                    this.onParamChange();
                });

                if (isUser) {
                    item.querySelector('.preset-delete').addEventListener('click', () => {
                        if (confirm(`Delete preset "${name}"?`)) {
                            this.presets.deletePreset(name);
                            this.updatePresetsUI();
                        }
                    });
                }

                list.appendChild(item);
            });
        }

        /**
         * Update JSON preview
         */
        updateJSONPreview() {
            const preview = document.getElementById('json-preview');
            preview.value = JSON.stringify(this.params.toJSON(), null, 2);
        }

        /**
         * Export JSON to file
         */
        exportJSON() {
            const json = JSON.stringify(this.params.toJSON(), null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'terrain_params.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        /**
         * Import JSON from file
         * @param {File} file - JSON file
         */
        importJSON(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    this.params.loadFromJSON(json);
                    this.updateAllUI();
                    this.onParamChange();
                } catch (err) {
                    alert('Invalid JSON file: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        /**
         * Copy text to clipboard
         * @param {string} text - Text to copy
         */
        copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Visual feedback could be added here
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        /**
         * Randomize all parameters
         */
        randomizeAll() {
            const rng = mulberry32(Date.now());

            this.params.set('seed', Math.floor(rng() * 2147483647).toString());
            this.params.set('terrain.seaLevel', Math.floor(40 + rng() * 40));
            this.params.set('terrain.baseHeight', Math.floor(50 + rng() * 40));
            this.params.set('terrain.heightAmplitude', Math.floor(20 + rng() * 60));
            this.params.set('terrain.noise.octaves', Math.floor(2 + rng() * 5));
            this.params.set('terrain.noise.frequency', 0.003 + rng() * 0.02);
            this.params.set('caves.threshold', 0.35 + rng() * 0.3);
            this.params.set('caves.scale', 0.03 + rng() * 0.08);

            this.updateAllUI();
            this.onParamChange();
        }

        /**
         * Auto-save to localStorage
         */
        autoSave() {
            try {
                localStorage.setItem('voxex_terrain_autosave', JSON.stringify(this.params.toJSON()));
            } catch (e) {
                // Ignore storage errors
            }
        }

        /**
         * Load auto-save from localStorage
         */
        loadAutoSave() {
            try {
                const saved = localStorage.getItem('voxex_terrain_autosave');
                if (saved) {
                    this.params.loadFromJSON(JSON.parse(saved));
                    this.updateAllUI();
                }
            } catch (e) {
                // Ignore errors
            }
        }
    }

    // ============================================
    // INITIALIZATION
    // ============================================

    window.addEventListener('DOMContentLoaded', () => {
        window.terrainEditor = new TerrainEditor();
    });
    </script>
</body>
</html>
