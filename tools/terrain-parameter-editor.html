    // ============================================

    /**
     * PreviewRenderer - handles all preview rendering modes
     */
    class PreviewRenderer {
        /**
         * @param {HTMLCanvasElement} canvas - Preview canvas
         * @param {TerrainGenerator} generator - Terrain generator
         * @param {TerrainParams} params - Terrain parameters
         */
        constructor(canvas, generator, params) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.generator = generator;
            this.params = params;

            this.offsetX = 0;
            this.offsetZ = 0;
            this.zoom = 1;
            this.yLevel = 64;
            this.mode = 'heightmap';

            this.layers = {
                terrain: true,
                biomes: true,
                caves: true,
                rivers: true
            };

            this.renderPending = false;
            this.renderTimeout = null;
        }

        /**
         * Schedule a render with debouncing
         */
        scheduleRender() {
            if (this.renderTimeout) {
                clearTimeout(this.renderTimeout);
            }
            this.renderTimeout = setTimeout(() => {
                this.render();
            }, 100);
        }

        /**
         * Render the preview based on current mode
         */
        render() {
            const loadingOverlay = document.getElementById('loading-overlay');
            loadingOverlay.classList.add('visible');

            // Use requestAnimationFrame for smooth rendering
            requestAnimationFrame(() => {
                switch (this.mode) {
                    case 'heightmap':
                        this.renderHeightmap();
                        break;
                    case 'biome':
                        this.renderBiomeMap();
                        break;
                    case 'caves':
                        this.renderCaveSlice();
                        break;
                    case 'combined':
                        this.renderCombined();
                        break;
                }

                loadingOverlay.classList.remove('visible');
                this.updateViewInfo();
            });
        }

        /**
         * Render heightmap mode with terrain-style coloring and contour lines.
         * Uses a color gradient from deep water to snow-capped peaks.
         */
        renderHeightmap() {
            const width = this.canvas.width;
            const height = this.canvas.height;
            const imageData = this.ctx.createImageData(width, height);
            const data = imageData.data;

            const p = this.params.params;
            const seaLevel = p.terrain.seaLevel;

            // First pass: find min/max heights in view for dynamic scaling
            let minH = Infinity, maxH = -Infinity;
            const heights = new Float32Array(width * height);

            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const wx = (px - width / 2) / this.zoom + this.offsetX;
                    const wz = (py - height / 2) / this.zoom + this.offsetZ;
                    const h = this.generator.getHeight(wx, wz);
                    heights[py * width + px] = h;
                    if (h < minH) minH = h;
                    if (h > maxH) maxH = h;
                }
            }

            // Ensure reasonable range
            const range = Math.max(maxH - minH, 10);
            const contourInterval = Math.max(5, Math.round(range / 20)); // ~20 contour lines

            // Second pass: render with colors and contours
            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const h = heights[py * width + px];
                    const i = (py * width + px) * 4;

                    // Get terrain color based on height
                    const color = this.getHeightColor(h, seaLevel, minH, maxH);

                    // Check for contour line (draw darker line at elevation intervals)
                    let isContour = false;
                    if (px > 0 && py > 0) {
                        const hLeft = heights[py * width + (px - 1)];
                        const hUp = heights[(py - 1) * width + px];
                        const contourH = Math.floor(h / contourInterval);
                        const contourLeft = Math.floor(hLeft / contourInterval);
                        const contourUp = Math.floor(hUp / contourInterval);
                        if (contourH !== contourLeft || contourH !== contourUp) {
                            isContour = true;
                        }
                    }

                    if (isContour) {
                        // Darken contour lines
                        data[i] = Math.round(color.r * 0.6);
                        data[i + 1] = Math.round(color.g * 0.6);
                        data[i + 2] = Math.round(color.b * 0.6);
                    } else {
                        data[i] = color.r;
                        data[i + 1] = color.g;
                        data[i + 2] = color.b;
                    }
                    data[i + 3] = 255;
                }
            }

            this.ctx.putImageData(imageData, 0, 0);

            // Draw height legend
            this.drawHeightLegend(minH, maxH, seaLevel);
        }

        /**
         * Get color for a height value using terrain-style gradient.
         * @param {number} h - Height value
         * @param {number} seaLevel - Sea level
         * @param {number} minH - Minimum height in view
         * @param {number} maxH - Maximum height in view
         * @returns {{r: number, g: number, b: number}} RGB color
         */
        getHeightColor(h, seaLevel, minH, maxH) {
            if (h < seaLevel) {
                // Water: deep blue to light blue based on depth
                const depth = (seaLevel - h) / Math.max(seaLevel - minH, 1);
                const t = Math.max(0, Math.min(1, 1 - depth));
                return {
                    r: Math.round(20 + t * 40),
                    g: Math.round(60 + t * 80),
                    b: Math.round(120 + t * 80)
                };
            }

            // Land: use elevation-based color gradient
            const landRange = maxH - seaLevel;
            const t = landRange > 0 ? (h - seaLevel) / landRange : 0;

            // Color stops: beach (tan) -> grass (green) -> rock (gray) -> snow (white)
            if (t < 0.05) {
                // Beach/shore - sandy tan
                return { r: 210, g: 190, b: 140 };
            } else if (t < 0.3) {
                // Lowlands - green
                const lt = (t - 0.05) / 0.25;
                return {
                    r: Math.round(100 - lt * 30),
                    g: Math.round(160 - lt * 20),
                    b: Math.round(60 - lt * 20)
                };
            } else if (t < 0.6) {
                // Highlands - darker green to brown
                const lt = (t - 0.3) / 0.3;
                return {
                    r: Math.round(70 + lt * 60),
                    g: Math.round(140 - lt * 50),
                    b: Math.round(40 + lt * 30)
                };
            } else if (t < 0.85) {
                // Mountains - gray rock
                const lt = (t - 0.6) / 0.25;
                return {
                    r: Math.round(130 + lt * 40),
                    g: Math.round(90 + lt * 50),
                    b: Math.round(70 + lt * 50)
                };
            } else {
                // Peaks - snow white
                const lt = (t - 0.85) / 0.15;
                return {
                    r: Math.round(170 + lt * 85),
                    g: Math.round(140 + lt * 115),
                    b: Math.round(120 + lt * 135)
                };
            }
        }

        /**
         * Draw height legend on the canvas.
         * @param {number} minH - Minimum height
         * @param {number} maxH - Maximum height
         * @param {number} seaLevel - Sea level
         */
        drawHeightLegend(minH, maxH, seaLevel) {
            const ctx = this.ctx;
            const legendWidth = 20;
            const legendHeight = 150;
            const x = this.canvas.width - legendWidth - 50;
            const y = 60;

            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(x - 5, y - 25, legendWidth + 50, legendHeight + 50);

            // Draw gradient bar
            for (let i = 0; i < legendHeight; i++) {
                const t = 1 - i / legendHeight;
                const h = minH + t * (maxH - minH);
                const color = this.getHeightColor(h, seaLevel, minH, maxH);
                ctx.fillStyle = `rgb(${color.r}, ${color.g}, ${color.b})`;
                ctx.fillRect(x, y + i, legendWidth, 1);
            }

            // Border
            ctx.strokeStyle = '#444';
            ctx.strokeRect(x, y, legendWidth, legendHeight);

            // Labels
            ctx.fillStyle = '#fff';
            ctx.font = '10px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`${Math.round(maxH)}`, x + legendWidth + 4, y + 10);
            ctx.fillText(`${Math.round(minH)}`, x + legendWidth + 4, y + legendHeight);

            // Sea level marker
            if (seaLevel >= minH && seaLevel <= maxH) {
                const seaY = y + (1 - (seaLevel - minH) / (maxH - minH)) * legendHeight;
                ctx.strokeStyle = '#4cf';
                ctx.beginPath();
                ctx.moveTo(x - 3, seaY);
                ctx.lineTo(x + legendWidth + 3, seaY);
                ctx.stroke();
                ctx.fillStyle = '#4cf';
                ctx.fillText(`~${Math.round(seaLevel)}`, x + legendWidth + 4, seaY + 3);
            }

            // Title
            ctx.fillStyle = '#888';
            ctx.fillText('Height', x, y - 10);
        }

        /**
         * Render biome map mode with height-based shading.
         */
        renderBiomeMap() {
            const width = this.canvas.width;
            const height = this.canvas.height;
            const imageData = this.ctx.createImageData(width, height);
            const data = imageData.data;

            const p = this.params.params;
            const seaLevel = p.terrain.seaLevel;

            // First pass: find height range
            let minH = Infinity, maxH = -Infinity;
            const heights = new Float32Array(width * height);

            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const wx = (px - width / 2) / this.zoom + this.offsetX;
                    const wz = (py - height / 2) / this.zoom + this.offsetZ;
                    const h = this.generator.getHeight(wx, wz);
                    heights[py * width + px] = h;
                    if (h < minH) minH = h;
                    if (h > maxH) maxH = h;
                }
            }

            const range = Math.max(maxH - minH, 10);

            // Second pass: render
            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const wx = (px - width / 2) / this.zoom + this.offsetX;
                    const wz = (py - height / 2) / this.zoom + this.offsetZ;

                    const h = heights[py * width + px];
                    const biome = this.generator.getBiome(wx, wz);
                    const color = hexToRgb(biome ? biome.color : '#ff00ff');

                    // Apply height-based shading (darker at low, brighter at high)
                    const shade = 0.5 + 0.5 * ((h - minH) / range);

                    const i = (py * width + px) * 4;

                    if (h < seaLevel) {
                        // Water overlay - blend biome color with water blue
                        const waterDepth = Math.min(1, (seaLevel - h) / 20);
                        data[i] = Math.round(color.r * shade * (1 - waterDepth * 0.7) + 40 * waterDepth);
                        data[i + 1] = Math.round(color.g * shade * (1 - waterDepth * 0.5) + 80 * waterDepth);
                        data[i + 2] = Math.round(color.b * shade * (1 - waterDepth * 0.3) + 180 * waterDepth);
                    } else {
                        data[i] = Math.round(color.r * shade);
                        data[i + 1] = Math.round(color.g * shade);
                        data[i + 2] = Math.round(color.b * shade);
                    }
                    data[i + 3] = 255;
                }
            }

            this.ctx.putImageData(imageData, 0, 0);
        }

        /**
         * Render cave slice mode
         */
        renderCaveSlice() {
            const width = this.canvas.width;
            const height = this.canvas.height;
            const imageData = this.ctx.createImageData(width, height);
            const data = imageData.data;

            const caves = this.params.params.caves;

            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const wx = (px - width / 2) / this.zoom + this.offsetX;
                    const wz = (py - height / 2) / this.zoom + this.offsetZ;

                    const i = (py * width + px) * 4;

                    // Check if Y is in cave range
                    if (this.yLevel < caves.minY || this.yLevel > caves.maxY || !caves.enabled) {
                        // Outside cave range - solid stone
                        data[i] = 60;
                        data[i + 1] = 60;
                        data[i + 2] = 70;
                    } else {
                        const isCave = this.generator.isCave(wx, this.yLevel, wz);

                        if (isCave) {
                            if (this.yLevel <= caves.lavaLevel) {
                                // Lava
                                data[i] = 255;
                                data[i + 1] = 100;
                                data[i + 2] = 30;
                            } else {
                                // Cave - dark
                                data[i] = 20;
                                data[i + 1] = 20;
                                data[i + 2] = 25;
                            }
                        } else {
                            // Solid - medium gray
                            data[i] = 80;
                            data[i + 1] = 80;
                            data[i + 2] = 90;
                        }
                    }
                    data[i + 3] = 255;
                }
            }

            this.ctx.putImageData(imageData, 0, 0);
        }

        /**
         * Render combined mode with all layers
         */
        renderCombined() {
            const width = this.canvas.width;
            const height = this.canvas.height;
            const imageData = this.ctx.createImageData(width, height);
            const data = imageData.data;

            const p = this.params.params;
            const seaLevel = p.terrain.seaLevel;

            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const wx = (px - width / 2) / this.zoom + this.offsetX;
                    const wz = (py - height / 2) / this.zoom + this.offsetZ;

                    let r, g, b;

                    // Base terrain height
                    const h = this.layers.terrain ? this.generator.getHeight(wx, wz) : p.terrain.baseHeight;
                    const shade = 0.5 + (h / 200) * 0.5;

                    if (this.layers.biomes) {
                        // Use biome color
                        const biome = this.generator.getBiome(wx, wz);
                        const color = hexToRgb(biome ? biome.color : '#808080');
                        r = color.r * shade;
                        g = color.g * shade;
                        b = color.b * shade;
                    } else {
                        // Grayscale terrain
                        r = g = b = (h / 200) * 255;
                    }

                    // Water
                    if (h < seaLevel) {
                        const waterBlend = Math.min(1, (seaLevel - h) / 20);
                        r = r * (1 - waterBlend) + 40 * waterBlend;
                        g = g * (1 - waterBlend) + 80 * waterBlend;
                        b = b * (1 - waterBlend) + 180 * waterBlend;
                    }

                    // River overlay
                    if (this.layers.rivers && h >= seaLevel) {
                        const riverVal = this.generator.getRiverValue(wx, wz);
                        if (riverVal > 0) {
                            r = r * (1 - riverVal) + 50 * riverVal;
                            g = g * (1 - riverVal) + 100 * riverVal;
                            b = b * (1 - riverVal) + 200 * riverVal;
                        }
                    }

                    // Cave entrance overlay
                    if (this.layers.caves && h >= seaLevel) {
                        const surfaceY = Math.floor(h);
                        if (this.generator.isCave(wx, surfaceY - 1, wz)) {
                            r *= 0.4;
                            g *= 0.4;
                            b *= 0.4;
                        }
                    }

                    const i = (py * width + px) * 4;
                    data[i] = Math.round(Math.max(0, Math.min(255, r)));
                    data[i + 1] = Math.round(Math.max(0, Math.min(255, g)));
                    data[i + 2] = Math.round(Math.max(0, Math.min(255, b)));
                    data[i + 3] = 255;
                }
            }

            this.ctx.putImageData(imageData, 0, 0);
        }

        /**
         * Update view info display
         */
        updateViewInfo() {
            document.getElementById('view-offset').textContent =
                `${Math.round(this.offsetX)}, ${Math.round(this.offsetZ)}`;
            document.getElementById('view-zoom').textContent =
                `${this.zoom.toFixed(1)}x`;
        }

        /**
         * Get terrain info at pixel coordinates
         * @param {number} px - Pixel X
         * @param {number} py - Pixel Y
         * @returns {Object} Terrain info
         */
        getInfoAt(px, py) {
            const width = this.canvas.width;
            const height = this.canvas.height;

            const wx = (px - width / 2) / this.zoom + this.offsetX;
            const wz = (py - height / 2) / this.zoom + this.offsetZ;

            const h = this.generator.getHeight(wx, wz);
            const biome = this.generator.getBiome(wx, wz);
            const biomeNoise = this.generator.getBiomeNoiseValue(wx, wz);

            return {
                x: Math.round(wx),
                z: Math.round(wz),
                height: h.toFixed(1),
                biome: biome ? biome.id : 'unknown',
                biomeNoise: biomeNoise.toFixed(3),
                weight: biome ? (biome.weight || 1) : '--'
            };
        }

        /**
         * Pan the view
         * @param {number} dx - Delta X in pixels
         * @param {number} dy - Delta Y in pixels
         */
        pan(dx, dy) {
            this.offsetX -= dx / this.zoom;
            this.offsetZ -= dy / this.zoom;
            this.scheduleRender();
        }

        /**
         * Zoom the view
         * @param {number} factor - Zoom factor (> 1 to zoom in)
         * @param {number} centerX - Center X in pixels
         * @param {number} centerY - Center Y in pixels
         */
        zoomAt(factor, centerX, centerY) {
            const width = this.canvas.width;
            const height = this.canvas.height;

            // World coords at center before zoom
            const wxBefore = (centerX - width / 2) / this.zoom + this.offsetX;
            const wzBefore = (centerY - height / 2) / this.zoom + this.offsetZ;

            // Apply zoom
            this.zoom = Math.max(0.1, Math.min(10, this.zoom * factor));

            // World coords at center after zoom
            const wxAfter = (centerX - width / 2) / this.zoom + this.offsetX;
            const wzAfter = (centerY - height / 2) / this.zoom + this.offsetZ;

            // Adjust offset to keep center fixed
            this.offsetX += wxBefore - wxAfter;
            this.offsetZ += wzBefore - wzAfter;

            this.scheduleRender();
        }

        /**
         * Reset view to origin
         */
        resetView() {
            this.offsetX = 0;
            this.offsetZ = 0;
            this.zoom = 1;
            this.scheduleRender();
        }

        /**
         * Set preview mode
         * @param {string} mode - 'heightmap', 'biome', 'caves', or 'combined'
         */
        setMode(mode) {
            this.mode = mode;
            this.scheduleRender();
        }

        /**
         * Set Y level for cave slice
         * @param {number} y - Y level
         */
        setYLevel(y) {
            this.yLevel = y;
            if (this.mode === 'caves') {
                this.scheduleRender();
            }
        }

        /**
         * Set canvas size
         * @param {number} size - Canvas size in pixels
         */
        setSize(size) {
            this.canvas.width = size;
            this.canvas.height = size;
            this.scheduleRender();
        }

        /**
         * Set layer visibility
         * @param {string} layer - Layer name
         * @param {boolean} visible - Visibility
         */
        setLayerVisible(layer, visible) {
            this.layers[layer] = visible;
            if (this.mode === 'combined') {
                this.scheduleRender();
            }
        }
    }

    // UNDO/REDO SYSTEM
    // ============================================

    /**
     * History manager for undo/redo
     */
    class HistoryManager {
        constructor(maxStates = 20) {
            this.states = [];
            this.currentIndex = -1;
            this.maxStates = maxStates;
            this.isRestoring = false;
        }

        /**
         * Push a new state
         * @param {Object} state - State to save
         */
        push(state) {
            if (this.isRestoring) return;

            // Remove any states after current index
            this.states = this.states.slice(0, this.currentIndex + 1);

            // Add new state
            this.states.push(JSON.stringify(state));

            // Trim to max size
            if (this.states.length > this.maxStates) {
                this.states.shift();
            }

            this.currentIndex = this.states.length - 1;
            this.updateButtons();
        }

        /**
         * Undo to previous state
         * @returns {Object|null} Previous state or null
         */
        undo() {
            if (this.currentIndex <= 0) return null;
            this.currentIndex--;
            this.updateButtons();
            return JSON.parse(this.states[this.currentIndex]);
        }

        /**
         * Redo to next state
         * @returns {Object|null} Next state or null
         */
        redo() {
            if (this.currentIndex >= this.states.length - 1) return null;
            this.currentIndex++;
            this.updateButtons();
            return JSON.parse(this.states[this.currentIndex]);
        }

        /**
         * Check if can undo
         * @returns {boolean}
         */
        canUndo() {
            return this.currentIndex > 0;
        }

        /**
         * Check if can redo
         * @returns {boolean}
         */
        canRedo() {
            return this.currentIndex < this.states.length - 1;
        }

        /**
         * Update undo/redo buttons
         */
        updateButtons() {
            document.getElementById('btn-undo').disabled = !this.canUndo();
            document.getElementById('btn-redo').disabled = !this.canRedo();
        }
    }

    /**
     * Preset manager class
     */
    class PresetManager {
        constructor(params) {
            this.params = params;
            this.userPresets = this.loadUserPresets();
        }

        /**
         * Load user presets from localStorage
         * @returns {Object} User presets
         */
        loadUserPresets() {
            try {
                const saved = localStorage.getItem('voxex_terrain_presets');
                return saved ? JSON.parse(saved) : {};
            } catch (e) {
                return {};
            }
        }

        /**
         * Save user presets to localStorage
         */
        saveUserPresets() {
            try {
                localStorage.setItem('voxex_terrain_presets', JSON.stringify(this.userPresets));
            } catch (e) {
                console.error('Failed to save presets:', e);
            }
        }

        /**
         * Get all presets (default + user)
         * @returns {Object} All presets
         */
        getAllPresets() {
            return { ...DEFAULT_PRESETS, ...this.userPresets };
        }

        /**
         * Check if preset is user-defined
         * @param {string} name - Preset name
         * @returns {boolean}
         */
        isUserPreset(name) {
            return name in this.userPresets;
        }

        /**
         * Save current params as preset
         * @param {string} name - Preset name
         */
        savePreset(name) {
            this.userPresets[name] = this.params.toJSON();
            this.saveUserPresets();
        }

        /**
         * Delete a user preset
         * @param {string} name - Preset name
         * @returns {boolean} True if deleted
         */
        deletePreset(name) {
            if (this.isUserPreset(name)) {
                delete this.userPresets[name];
                this.saveUserPresets();
                return true;
            }
            return false;
        }

        /**
         * Load a preset
         * @param {string} name - Preset name
         * @returns {boolean} True if loaded
         */
        loadPreset(name) {
            const allPresets = this.getAllPresets();
            if (name in allPresets) {
                this.params.loadFromJSON(allPresets[name]);
                return true;
            }
            return false;
        }
    }

    /**
     * Create biome editor UI
     * @param {TerrainParams} params - Terrain parameters
     * @param {function} onUpdate - Update callback
     * @returns {HTMLElement} Biome editor element
     */
    function createBiomeEditor(params, onUpdate) {
        const container = document.createElement('div');
        container.className = 'biome-list';

        function renderBiomes() {
            container.innerHTML = '';
            const biomes = params.params.biomes.types;

            biomes.forEach((biome, index) => {
                const item = document.createElement('div');
                item.className = 'biome-item';
                item.style.borderLeftColor = biome.color;

                // Biome UI matching BIOME_CONFIG structure from voxEx.html
                item.innerHTML = `
                    <div class="biome-header">
                        <input type="text" value="${biome.id}" class="biome-name" data-field="id">
                        <input type="color" value="${biome.color}" class="biome-color" data-field="color">
                        <button class="btn-danger btn-small biome-delete" ${biomes.length <= 1 ? 'disabled' : ''}>X</button>
                    </div>
                    <div class="biome-ranges">
                        <div class="biome-range-row">
                            <label>Weight:</label>
                            <input type="number" value="${biome.weight ?? 1}" step="1" min="1" max="10" data-field="weight" style="width: 45px;">
                        </div>
                        <div class="biome-range-row">
                            <label>Rough:</label>
                            <input type="number" value="${biome.roughness ?? 0.01}" step="0.001" min="0.001" max="0.1" data-field="roughness" style="width: 60px;">
                        </div>
                        <div class="biome-range-row">
                            <label>Amp:</label>
                            <input type="number" value="${biome.amplitude ?? 15}" step="1" min="1" max="200" data-field="amplitude" style="width: 45px;">
                        </div>
                        <div class="biome-range-row">
                            <label>Base H:</label>
                            <input type="number" value="${biome.baseHeight ?? 64}" step="1" min="32" max="128" data-field="baseHeight" style="width: 45px;">
                        </div>
                        <div class="biome-range-row" style="grid-column: span 2;">
                            <label>Trees:</label>
                            <input type="number" value="${biome.trees?.density ?? 0}" step="0.01" min="0" max="1" data-field="trees.density" style="width: 50px;">
                            <select data-field="trees.canopyShape" style="width: 80px;">
                                <option value="spherical" ${biome.trees?.canopyShape === 'spherical' ? 'selected' : ''}>Spherical</option>
                                <option value="conical" ${biome.trees?.canopyShape === 'conical' ? 'selected' : ''}>Conical</option>
                                <option value="round" ${biome.trees?.canopyShape === 'round' ? 'selected' : ''}>Round</option>
                            </select>
                        </div>
                        <div class="biome-range-row" style="grid-column: span 2;">
                            <label>Tags:</label>
                            <input type="text" value="${(biome.tags ?? []).join(', ')}" data-field="tags" style="width: 140px;" placeholder="mountain, forested">
                        </div>
                    </div>
                `;

                // Event listeners for inputs and selects
                item.querySelectorAll('input, select').forEach(el => {
                    el.addEventListener('change', () => {
                        const field = el.dataset.field;
                        let value = el.value;

                        // Handle nested fields (e.g., trees.density)
                        if (field.includes('.')) {
                            const [parent, child] = field.split('.');
                            if (!biome[parent]) biome[parent] = {};
                            if (child === 'density') {
                                biome[parent][child] = parseFloat(value);
                            } else {
                                biome[parent][child] = value;
                            }
                        } else if (field === 'tags') {
                            // Parse comma-separated tags
                            biome.tags = value.split(',').map(t => t.trim()).filter(t => t.length > 0);
                        } else if (field !== 'id' && field !== 'color') {
                            value = parseFloat(value);
                            biome[field] = value;
                        } else {
                            biome[field] = value;
                        }

                        if (field === 'color') {
                            item.style.borderLeftColor = value;
                        }

                        onUpdate();
                    });
                });

                item.querySelector('.biome-delete').addEventListener('click', () => {
                    if (biomes.length > 1) {
                        params.params.biomes.types.splice(index, 1);
                        renderBiomes();
                        onUpdate();
                    }
                });

                container.appendChild(item);
            });

            // Add biome button
            if (biomes.length < 12) {
                const addBtn = document.createElement('button');
                addBtn.className = 'btn-secondary btn-small add-biome-btn';
                addBtn.textContent = '+ Add Biome';
                addBtn.addEventListener('click', () => {
                    // New biome with BIOME_CONFIG-compatible structure
                    params.params.biomes.types.push({
                        id: 'new_biome',
                        color: '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'),
                        weight: 1,
                        roughness: 0.01,
                        amplitude: 15,
                        baseHeight: 64,
                        trees: { density: 0, canopyShape: 'spherical' },
                        tags: []
                    });
                    renderBiomes();
                    onUpdate();
                });
                container.appendChild(addBtn);
            }
        }

        renderBiomes();

        // Return both container and refresh function
        container.refresh = renderBiomes;
        return container;
    }

    /**
     * Create biome weight distribution chart.
     * Shows weighted distribution matching voxEx.html's cell-based biome system.
     * @param {TerrainParams} params - Terrain parameters
     * @returns {HTMLCanvasElement} Chart canvas
     */
    function createBiomeChart(params) {
        const canvas = document.createElement('canvas');
        canvas.id = 'biome-chart-canvas';
        canvas.width = 200;
        canvas.height = 150;

        function render() {
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const biomes = params.params.biomes.types;

            ctx.fillStyle = '#252540';
            ctx.fillRect(0, 0, width, height);

            // Calculate total weight
            let totalWeight = 0;
            for (const b of biomes) {
                totalWeight += b.weight || 1;
            }

            // Draw weight bar distribution
            let x = 0;
            const barHeight = 40;
            const barY = 10;

            for (const b of biomes) {
                const w = ((b.weight || 1) / totalWeight) * width;
                ctx.fillStyle = b.color;
                ctx.fillRect(x, barY, w - 1, barHeight);
                x += w;
            }

            // Draw biome legend below
            const legendY = barY + barHeight + 15;
            const legendItemWidth = width / Math.min(biomes.length, 3);
            let col = 0;
            let row = 0;

            ctx.font = '9px sans-serif';
            for (const b of biomes) {
                const lx = col * legendItemWidth;
                const ly = legendY + row * 18;

                ctx.fillStyle = b.color;
                ctx.fillRect(lx, ly, 10, 10);
                ctx.fillStyle = '#aaa';
                ctx.fillText(`${b.id} (${b.weight || 1})`, lx + 14, ly + 9);

                col++;
                if (col >= 3) {
                    col = 0;
                    row++;
                }
            }

            // Title
            ctx.fillStyle = '#666';
            ctx.font = '10px sans-serif';
            ctx.fillText('Biome Weight Distribution', 2, height - 2);
        }

        render();
        canvas.refresh = render;
        return canvas;
    }

        /**
         * Setup event listeners
         */
        setupEventListeners() {
            // Preview mode buttons
            document.querySelectorAll('.preview-modes button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.preview-modes button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const mode = btn.dataset.mode;
                    this.renderer.setMode(mode);

                    // Show/hide Y level slider
                    document.getElementById('y-level-slider').style.display = mode === 'caves' ? 'flex' : 'none';

                    // Show/hide layer toggles
                    document.getElementById('layer-toggles').style.display = mode === 'combined' ? 'flex' : 'none';
                });
            });

            // Y level slider
            const yLevelSlider = document.getElementById('y-level');
            const yLevelValue = document.getElementById('y-level-value');
            yLevelSlider.addEventListener('input', () => {
                yLevelValue.textContent = yLevelSlider.value;
                this.renderer.setYLevel(parseInt(yLevelSlider.value));
            });

            // Quality selector
            document.getElementById('preview-quality').addEventListener('change', (e) => {
                this.renderer.setSize(parseInt(e.target.value));
            });

            // Layer toggles
            ['terrain', 'biomes', 'caves', 'rivers'].forEach(layer => {
                document.getElementById(`layer-${layer}`).addEventListener('change', (e) => {
                    this.renderer.setLayerVisible(layer, e.target.checked);
                });
            });

            // Zoom controls
            document.getElementById('zoom-in').addEventListener('click', () => {
                this.renderer.zoomAt(1.5, this.canvas.width / 2, this.canvas.height / 2);
            });

            document.getElementById('zoom-out').addEventListener('click', () => {
                this.renderer.zoomAt(0.67, this.canvas.width / 2, this.canvas.height / 2);
            });

            document.getElementById('zoom-reset').addEventListener('click', () => {
                this.renderer.resetView();
            });

            // Canvas pan/zoom
            let isDragging = false;
            let lastX, lastY;

            this.canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastX = e.clientX;
                lastY = e.clientY;
            });

            window.addEventListener('mousemove', (e) => {
                // Update cursor info
                const rect = this.canvas.getBoundingClientRect();
                const px = e.clientX - rect.left;
                const py = e.clientY - rect.top;

                if (px >= 0 && px < this.canvas.width && py >= 0 && py < this.canvas.height) {
                    const info = this.renderer.getInfoAt(px, py);
                    document.getElementById('cursor-pos').textContent = `X: ${info.x}, Z: ${info.z}`;
                    document.getElementById('cursor-height').textContent = info.height;
                    document.getElementById('cursor-biome').textContent = info.biome;
                    document.getElementById('cursor-climate').textContent = `n: ${info.biomeNoise}, w: ${info.weight}`;
                }

                // Pan
                if (isDragging) {
                    const dx = e.clientX - lastX;
                    const dy = e.clientY - lastY;
                    this.renderer.pan(dx, dy);
                    lastX = e.clientX;
                    lastY = e.clientY;
                }
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
            });

            this.canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const factor = e.deltaY < 0 ? 1.2 : 0.83;
                this.renderer.zoomAt(factor, x, y);
            });

            // Header buttons
            document.getElementById('btn-randomize-all').addEventListener('click', () => {
                this.randomizeAll();
            });

            document.getElementById('btn-reset-all').addEventListener('click', () => {
                this.params.reset();
                this.updateAllUI();
                this.onParamChange();
            });

            document.getElementById('btn-undo').addEventListener('click', () => {
                const state = this.history.undo();
                if (state) {
                    this.history.isRestoring = true;
                    this.params.loadFromJSON(state);
                    this.updateAllUI();
                    this.renderer.scheduleRender();
                    this.updateJSONPreview();
                    this.history.isRestoring = false;
                }
            });

            document.getElementById('btn-redo').addEventListener('click', () => {
                const state = this.history.redo();
                if (state) {
                    this.history.isRestoring = true;
                    this.params.loadFromJSON(state);
                    this.updateAllUI();
                    this.renderer.scheduleRender();
                    this.updateJSONPreview();
                    this.history.isRestoring = false;
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'z') {
                        e.preventDefault();
                        document.getElementById('btn-undo').click();
                    } else if (e.key === 'y') {
                        e.preventDefault();
                        document.getElementById('btn-redo').click();
                    }
                }
            });

            // Preset buttons
            document.getElementById('btn-save-preset').addEventListener('click', () => {
                const name = prompt('Enter preset name:');
                if (name && name.trim()) {
                    this.presets.savePreset(name.trim());
                    this.updatePresetsUI();
                }
            });

            // Export/Import buttons
            document.getElementById('btn-export-json').addEventListener('click', () => {
                this.exportJSON();
            });

            document.getElementById('btn-copy-json').addEventListener('click', () => {
                this.copyToClipboard(JSON.stringify(this.params.toJSON(), null, 2));
            });

            document.getElementById('btn-copy-voxex').addEventListener('click', () => {
                // Generate valid BIOME_CONFIG entries for voxEx.html
                const voxExConfig = this.generateVoxExBiomeConfig();
                this.copyToClipboard(voxExConfig);
            });

            document.getElementById('btn-import-json').addEventListener('click', () => {
                document.getElementById('import-file').click();
            });

            document.getElementById('import-file').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    this.importJSON(file);
                }
                e.target.value = '';
            });
        }

        /**
         * Handle parameter change
         */
        onParamChange() {
            this.generator.updateNoise();
            this.renderer.scheduleRender();
            this.history.push(this.params.toJSON());
            this.autoSave();
            this.updateJSONPreview();

            if (this.biomeChart) {
                this.biomeChart.refresh();
            }
        }

        /**
         * Update all UI controls from current params
         */
        updateAllUI() {
            // Update simple controls
            Object.entries(this.uiControls).forEach(([path, control]) => {
                if (control.updateValue) {
                    const value = this.params.get(path);
                    control.updateValue(value);
                }
            });

            // Update biome editor
            if (this.biomeEditor && this.biomeEditor.refresh) {
                this.biomeEditor.refresh();
            }

            // Update biome chart
            if (this.biomeChart && this.biomeChart.refresh) {
                this.biomeChart.refresh();
            }
        }

        /**
         * Update presets UI
         */
        updatePresetsUI() {
            const list = document.getElementById('presets-list');
            list.innerHTML = '';

            const allPresets = this.presets.getAllPresets();

            Object.keys(allPresets).forEach(name => {
                const item = document.createElement('div');
                item.className = 'preset-item';

                const isUser = this.presets.isUserPreset(name);

                item.innerHTML = `
                    <div>
                        <div class="preset-name">${name}</div>
                        <div class="preset-type">${isUser ? 'User' : 'Default'}</div>
                    </div>
                    <div class="preset-actions">
                        <button class="btn-primary btn-small preset-load">Load</button>
                        ${isUser ? '<button class="btn-danger btn-small preset-delete">Del</button>' : ''}
                    </div>
                `;

                item.querySelector('.preset-load').addEventListener('click', () => {
                    this.presets.loadPreset(name);
                    this.updateAllUI();
                    this.onParamChange();
                });

                if (isUser) {
                    item.querySelector('.preset-delete').addEventListener('click', () => {
                        if (confirm(`Delete preset "${name}"?`)) {
                            this.presets.deletePreset(name);
                            this.updatePresetsUI();
                        }
                    });
                }

                list.appendChild(item);
            });
        }

        /**
         * Update JSON preview
         */
        updateJSONPreview() {
            const preview = document.getElementById('json-preview');
            preview.value = JSON.stringify(this.params.toJSON(), null, 2);
        }

        /**
         * Export JSON to file
         */
        exportJSON() {
            const json = JSON.stringify(this.params.toJSON(), null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'terrain_params.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        /**
         * Import JSON from file
         * @param {File} file - JSON file
         */
        importJSON(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    this.params.loadFromJSON(json);
                    this.updateAllUI();
                    this.onParamChange();
                } catch (err) {
                    alert('Invalid JSON file: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        /**
         * Copy text to clipboard
         * @param {string} text - Text to copy
         */
        copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Visual feedback could be added here
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        /**
         * Generate BIOME_CONFIG entries compatible with voxEx.html.
         * Output format matches the structure in voxEx.html lines 3946-4084.
         * @returns {string} JavaScript code for BIOME_CONFIG entries
         */
        generateVoxExBiomeConfig() {
            const biomes = this.params.params.biomes.types;
            const lines = ['// BIOME_CONFIG entries for voxEx.html', '// Paste these into the BIOME_CONFIG object', ''];

            for (const biome of biomes) {
                const id = biome.id || 'unnamed';
                const entry = [];

                entry.push(`${id}: {`);
                entry.push(`    weight: ${biome.weight ?? 1},`);
                entry.push(`    roughness: ${biome.roughness ?? 0.01},`);
                entry.push(`    amplitude: ${biome.amplitude ?? 15},`);
                entry.push(`    baseHeight: ${biome.baseHeight ?? 64},`);
                entry.push(`    heightFunc: defaultHeightFunc,`);
                entry.push(`    trees: {`);
                entry.push(`        density: ${biome.trees?.density ?? 0},`);
                entry.push(`        canopy: {`);
                entry.push(`            shape: "${biome.trees?.canopyShape ?? 'spherical'}",`);
                entry.push(`            noiseStrength: 0.3,`);
                entry.push(`            branchChance: 0.1,`);
                entry.push(`        },`);
                entry.push(`    },`);

                // Format tags array
                const tags = biome.tags ?? [];
                if (tags.length > 0) {
                    entry.push(`    tags: [${tags.map(t => `"${t}"`).join(', ')}],`);
                } else {
                    entry.push(`    tags: [],`);
                }

                entry.push(`    decorateColumn: null,`);
                entry.push(`},`);

                lines.push(entry.join('\n'));
                lines.push('');
            }

            return lines.join('\n');
        }

        /**
         * Randomize all parameters
         */
        randomizeAll() {
            const rng = mulberry32(Date.now());

            this.params.set('seed', Math.floor(rng() * 2147483647).toString());
            this.params.set('terrain.seaLevel', Math.floor(40 + rng() * 40));
            this.params.set('terrain.baseHeight', Math.floor(50 + rng() * 40));
            this.params.set('terrain.heightAmplitude', Math.floor(20 + rng() * 60));
            this.params.set('terrain.noise.octaves', Math.floor(2 + rng() * 5));
            this.params.set('terrain.noise.frequency', 0.003 + rng() * 0.02);
            this.params.set('caves.threshold', 0.35 + rng() * 0.3);
            this.params.set('caves.scale', 0.03 + rng() * 0.08);

            this.updateAllUI();
            this.onParamChange();
        }

        /**
         * Auto-save to localStorage
         */
        autoSave() {
            try {
                localStorage.setItem('voxex_terrain_autosave', JSON.stringify(this.params.toJSON()));
            } catch (e) {
                // Ignore storage errors
            }
        }

        /**
         * Load auto-save from localStorage
         */
        loadAutoSave() {
            try {
                const saved = localStorage.getItem('voxex_terrain_autosave');
                if (saved) {
                    this.params.loadFromJSON(JSON.parse(saved));
                    this.updateAllUI();
                }
            } catch (e) {
                // Ignore errors
            }
        }
    }

    // ============================================
    // INITIALIZATION
    // ============================================

    window.addEventListener('DOMContentLoaded', () => {
        window.terrainEditor = new TerrainEditor();
    });
    </script>
</body>
